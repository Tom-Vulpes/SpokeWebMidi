<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPOKE — Story Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#362d3d;
  --panel:#9f83bc33;
  --blue:#a6cbe9;
  --pink:#d44977;
  --lav:#9f83bc;
  --txt:#fbf8ff;
}
html,body{margin:0;height:100%;font-family:Comfortaa;background:var(--bg);color:var(--txt);}
.app{display:grid;grid-template-rows:auto auto 1fr auto;height:100vh}

/* Header */
header{padding:12px 16px;font-size:14px}
header strong{color:var(--blue)}

/* Turn bar */
.turn{
  margin:8px 14px;
  padding:10px 14px;
  background:var(--panel);
  border-radius:14px;
  text-align:center;
}
.turn span{color:var(--pink);font-weight:700}
.turn button{
  margin-left:10px;
  background:var(--blue);
  border:none;
  border-radius:20px;
  padding:6px 14px;
  font-weight:700;
  cursor:pointer;
}

/* Canvas stage */
.stage{display:flex;justify-content:center;align-items:center}
canvas{width:540px;height:540px;max-width:90vw}

/* Bottom panels */
.bottom{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:12px;
  padding:12px;
}
.panel{
  background:var(--panel);
  border-radius:16px;
  padding:12px;
}
h3{
  margin:0 0 10px;
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--blue);
}

/* Sound cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.card{
  background:rgba(255,255,255,.12);
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  transition:.15s;
}
.card:hover{background:rgba(255,255,255,.22)}
.icon{font-size:28px}
.name{font-weight:700;font-size:13px}
.desc{font-size:11px;opacity:.75}

/* Recorder */
.rec{
  margin-top:10px;
  background:rgba(0,0,0,.25);
  border-radius:12px;
  padding:10px;
  text-align:center;
}
.rec button{
  background:var(--pink);
  color:white;
  border:none;
  border-radius:20px;
  padding:8px 16px;
  font-weight:700;
}

/* Mobile */
@media(max-width:900px){
  .bottom{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="app">

<header>
  <strong>SPOKE — Story Mode</strong> · tell a story with sound
</header>

<div class="turn">
  🎤 <span id="player">Student 1</span>'s turn to add a sound
  <button onclick="nextTurn()">Pass turn</button>
</div>

<div class="stage">
  <canvas id="board" width="540" height="540"></canvas>
</div>

<div class="bottom">

  <div class="panel">
    <h3>Sound Library</h3>
    <input id="search" placeholder="search sounds…" style="width:100%;margin-bottom:8px">
    <button onclick="doSearch()">Search</button>
    <div class="grid" id="results"></div>
  </div>

  <div class="panel">
    <h3>Narration</h3>
    <p>Tap a story button, then record your voice.</p>
    <div class="rec">
      <button id="recBtn">🎤 Record narration</button>
      <div id="recStatus"></div>
    </div>
  </div>

</div>
</div>

<script>
/* CONFIG */
const API_KEY = 'PASTE_YOUR_FREESOUND_API_KEY_HERE';
const STUDENTS = ['Student 1','Student 2','Student 3','Student 4'];

/* AUDIO */
const AC = new (window.AudioContext||webkitAudioContext)();
const master = AC.createGain();
master.gain.value = 0.9;
master.connect(AC.destination);

/* STATE */
let turn=0, selectedSound=null, selectedPad=null;
const pads = Array.from({length:27},()=>({
  sound:null,
  narration:null
}));

/* TURN */
function nextTurn(){
  turn=(turn+1)%STUDENTS.length;
  document.getElementById('player').textContent=STUDENTS[turn];
}

/* CANVAS */
const c = document.getElementById('board');
const ctx = c.getContext('2d');
const C = 270, R = 210;

const butterfly = new Image();
butterfly.src = 'graphics/Butterfly.png';

function draw(){
  ctx.clearRect(0,0,540,540);
  ctx.strokeStyle='rgba(255,255,255,.25)';
  ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(C,C,R,0,Math.PI*2);ctx.stroke();

  pads.forEach((p,i)=>{
    const a=(Math.PI*2/27)*i-Math.PI/2;
    const x=C+Math.cos(a)*R;
    const y=C+Math.sin(a)*R;
    ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);
    ctx.fillStyle=p.sound?'#a6cbe9':'rgba(255,255,255,.3)';
    ctx.fill();
    ctx.fillStyle='#241e2b';
    ctx.font='10px Comfortaa';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(i+1,x,y);
  });

  if(butterfly.complete){
    ctx.drawImage(butterfly,C-40,C-40,80,80);
  }
  requestAnimationFrame(draw);
}
draw();

/* BOARD CLICK */
c.addEventListener('click',e=>{
  const r=c.getBoundingClientRect();
  const x=(e.clientX-r.left)*(c.width/r.width);
  const y=(e.clientY-r.top)*(c.height/r.height);

  pads.forEach((p,i)=>{
    const a=(Math.PI*2/27)*i-Math.PI/2;
    const px=C+Math.cos(a)*R;
    const py=C+Math.sin(a)*R;
    if(Math.hypot(x-px,y-py)<22){
      selectedPad=i;
      if(selectedSound && !p.sound){
        p.sound = selectedSound;
        selectedSound=null;
        nextTurn();
      } else if(p.sound){
        playPad(i);
      }
    }
  });
});

/* PLAY */
function playPad(i){
  const p=pads[i];
  if(p.narration){
    const n=AC.createBufferSource();
    n.buffer=p.narration;
    n.connect(master);
    n.start();
  }
  if(p.sound){
    const s=AC.createBufferSource();
    s.buffer=p.sound;
    s.connect(master);
    s.start(AC.currentTime+0.15);
  }
}

/* FREESOUND */
async function doSearch(){
  const q=document.getElementById('search').value;
  const res=await fetch(
    `https://freesound.org/apiv2/search/text/?query=${encodeURIComponent(q)}&token=${API_KEY}&fields=id,name,previews`
  ).then(r=>r.json());
  const grid=document.getElementById('results');
  grid.innerHTML='';
  res.results.slice(0,8).forEach(s=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div class="icon">🎵</div><div class="name">${s.name}</div><div class="desc">tap to select</div>`;
    d.onclick=async ()=>{
      const ab=await fetch(s.previews['preview-hq-mp3']).then(r=>r.arrayBuffer());
      selectedSound=await AC.decodeAudioData(ab);
    };
    grid.appendChild(d);
  });
}

/* NARRATION RECORDING */
let recorder, recChunks=[];
const recBtn=document.getElementById('recBtn');
const recStatus=document.getElementById('recStatus');

recBtn.onclick=async()=>{
  if(selectedPad==null){recStatus.textContent='Select a story button first';return;}
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  recorder=new MediaRecorder(stream);
  recChunks=[];
  recorder.ondataavailable=e=>recChunks.push(e.data);
  recorder.onstop=async()=>{
    const blob=new Blob(recChunks);
    const ab=await blob.arrayBuffer();
    pads[selectedPad].narration=await AC.decodeAudioData(ab);
    recStatus.textContent='Narration saved!';
  };
  recorder.start();
  recStatus.textContent='Recording… click again to stop';
  recBtn.onclick=()=>recorder.stop();
};
</script>

</body>
</html>
