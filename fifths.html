<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOKE — MIDI Visual</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080809;--bg2:#0f0f11;--bg3:#161618;--bg4:#1e1e21;
  --bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.1);
  --tx:#d8d8dc;--mt:#555560;
  --ac:#00e5a0;--ac2:#7c6dfa;--wn:#f5a623;
  --fn:'Comfortaa',cursive;--mn:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:var(--fn);color:var(--tx);}
.shell{display:grid;grid-template-columns:200px 1fr 200px;height:100vh;}
.sidebar{background:var(--bg2);display:flex;flex-direction:column;padding:16px 12px;gap:12px;overflow:hidden;}
.sl{border-right:1px solid var(--bdr);}
.sr{border-left:1px solid var(--bdr);}
.center{display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mt);margin-bottom:5px;}
.btn{font-family:var(--fn);font-size:10px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid var(--bdr2);background:var(--bg3);color:var(--tx);cursor:pointer;transition:background .13s;width:100%;text-align:center;}
.btn:hover{background:var(--bg4);}
.btn.on{background:rgba(0,229,160,.15);border-color:rgba(0,229,160,.4);color:var(--ac);}
.vtog{font-family:var(--fn);font-size:10px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--mt);cursor:pointer;text-align:left;transition:all .13s;width:100%;}
.vtog.on{border-color:var(--bdr2);color:var(--tx);}
.vtog .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
.note-pip{width:20px;height:20px;border-radius:50%;border:1px solid var(--bdr2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--mt);transition:all .13s;}
.note-pip.lit{background:rgba(0,229,160,.25);border-color:var(--ac);color:var(--ac);}
.divider{height:1px;background:var(--bdr);flex-shrink:0;}
.stat{font-family:var(--mn);font-size:11px;color:var(--ac);min-height:14px;word-break:break-all;}
.chord-name{font-size:13px;font-weight:700;color:var(--tx);min-height:18px;}
.il{font-size:10px;color:var(--mt);line-height:1.8;}
.il span{color:var(--ac2);}
.status-bar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--mt);white-space:nowrap;font-family:var(--mn);pointer-events:none;}
.synth-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.sy{font-family:var(--fn);font-size:9px;font-weight:600;padding:4px 0;border-radius:5px;border:1px solid var(--bdr);background:transparent;color:var(--mt);cursor:pointer;text-align:center;transition:all .13s;}
.sy.on{border-color:var(--bdr2);color:var(--tx);}
input[type=range]{width:100%;accent-color:var(--ac);}
</style>
</head>
<body>
<div class="shell">

<!-- ── LEFT ── -->
<div class="sidebar sl">

  <div>
    <div class="lbl">MIDI</div>
    <button class="btn" id="midiBtn">Connect MIDI</button>
    <div style="margin-top:5px;font-size:9px;color:var(--mt);line-height:1.6;" id="midiStatus">No device — click pads or use keyboard A–K / W E T Y U</div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Sound</div>
    <div class="synth-grid" id="waveGrid">
      <button class="sy on" data-w="triangle">Triangle</button>
      <button class="sy" data-w="sine">Sine</button>
      <button class="sy" data-w="sawtooth">Saw</button>
      <button class="sy" data-w="square">Square</button>
    </div>
    <div style="margin-top:8px;" class="lbl">Attack</div>
    <input type="range" id="atkSlider" min="1" max="500" value="10" step="1">
    <div style="margin-top:5px;" class="lbl">Release</div>
    <input type="range" id="relSlider" min="100" max="4000" value="900" step="10">
    <div style="margin-top:5px;" class="lbl">Volume</div>
    <input type="range" id="volSlider" min="1" max="100" value="60" step="1">
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Active notes</div>
    <div class="stat" id="activeNoteNames">—</div>
    <div style="margin-top:5px;" class="chord-name" id="chordName"></div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Intervals</div>
    <div class="il" id="intervalList">—</div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Key centre</div>
    <div style="font-size:17px;font-weight:700;color:var(--ac);min-height:22px;" id="keyCentre">—</div>
    <div style="font-size:9px;color:var(--mt);margin-top:1px;" id="keyMode"></div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Chromatic</div>
    <div style="display:flex;gap:2px;flex-wrap:wrap;" id="chromaRow"></div>
  </div>

</div>

<!-- ── CENTER ── -->
<div class="center">
  <canvas id="mainCanvas"></canvas>
  <div class="status-bar" id="statusBar">click SPOKE pads · outer ring plays root note · keys A–K W E T Y U</div>
</div>

<!-- ── RIGHT ── -->
<div class="sidebar sr">

  <div>
    <div class="lbl">Layers</div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <button class="vtog on" data-v="chordWeb"><span class="dot" style="background:#00e5a0;"></span>Chord web</button>
      <button class="vtog on" data-v="intervalArcs"><span class="dot" style="background:#7c6dfa;"></span>Interval arcs</button>
      <button class="vtog on" data-v="fifthLines"><span class="dot" style="background:#f5a623;"></span>Fifth lines</button>
      <button class="vtog on" data-v="trailFade"><span class="dot" style="background:#e056a0;"></span>Particle trail</button>
      <button class="vtog on" data-v="spokeLines"><span class="dot" style="background:#7c6dfa;"></span>Pad to wheel</button>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Note history</div>
    <canvas id="histCanvas" height="56" style="width:100%;border-radius:5px;background:var(--bg3);display:block;"></canvas>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Sustain</div>
    <button class="vtog on" id="sustainBtn"><span class="dot" style="background:#e056a0;"></span>Hold notes</button>
    <div style="margin-top:7px;" class="lbl">Trail decay</div>
    <input type="range" id="decaySlider" min="1" max="20" value="7" step="1">
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Scope</div>
    <canvas id="scopeCanvas" height="44" style="width:100%;border-radius:5px;background:var(--bg3);display:block;"></canvas>
  </div>

  <div class="divider"></div>

  <div>
    <div class="lbl">Played</div>
    <div style="font-family:var(--mn);font-size:20px;font-weight:700;color:var(--ac);" id="noteCount">0</div>
    <button class="btn" id="clearBtn" style="margin-top:5px;">Clear all</button>
  </div>

</div>
</div><!-- end .shell -->

<script>
// ── SPOKE ORIGINAL MIDI NOTES ──
const SPOKE_NOTES=[98,96,93,91,88,86,84,81,79,76,74,72,69,67,64,62,60,57,55,52,50,48,45,43,40,38,36];

// Circle of fifths: sector i corresponds to semitone COF_ORDER[i]
const COF_ORDER=[0,7,2,9,4,11,6,1,8,3,10,5]; // C G D A E B F# Db Ab Eb Bb F
const COF_LABELS=['C','G','D','A','E','B','F♯','D♭','A♭','E♭','B♭','F'];
const COF_MIN  =['Am','Em','Bm','F♯m','C♯m','G♯m','D♯m','B♭m','Fm','Cm','Gm','Dm'];
const NOTE_NAMES=['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const INTERVAL_NAMES=['P1','m2','M2','m3','M3','P4','TT','P5','m6','M6','m7','M7'];
const COF_HUE=[160,130,100,70,40,10,340,310,280,250,220,190];

// ── MAP SPOKE PADS TO CIRCLE OF FIFTHS POSITIONS ──
// Group pads by their semitone's CoF sector, then arrange radially:
//   - Each sector gets its own angular position on the wheel
//   - Multiple pads per sector (different octaves) stack inward to outward by pitch
function buildPadLayout(){
  const sectors=Array.from({length:12},()=>[]);
  SPOKE_NOTES.forEach((midi,padIdx)=>{
    const sector=COF_ORDER.indexOf(midi%12);
    if(sector>=0)sectors[sector].push({padIdx,midi});
  });
  sectors.forEach(s=>s.sort((a,b)=>a.midi-b.midi)); // low pitch inward
  return sectors;
}
const SECTORS=buildPadLayout();

// Compute screen position of a pad based on CoF layout
// Returns {x,y} relative to canvas origin (added at draw time)
function padPos(padIdx,cx,cy){
  const midi=SPOKE_NOTES[padIdx];
  const sector=COF_ORDER.indexOf(midi%12);
  const sArr=SECTORS[sector];
  const posInSector=sArr.findIndex(p=>p.padIdx===padIdx);
  const total=sArr.length;
  // r: innermost ring (lowest pitch) out to near CoF_INNER
  const ri=cofInner();
  const r=ri*0.15+(posInSector/Math.max(total-1,1))*ri*0.78;
  const baseAngle=cofAngle(sector);
  // slight fan spread so same-sector pads don't stack
  const spread=total>1?(posInSector-(total-1)/2)*0.15:0;
  const a=baseAngle+spread;
  return {x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r};
}

// ── THEORY TABLES ──
const CHORD_PATS={
  'maj':[0,4,7],'min':[0,3,7],'dim':[0,3,6],'aug':[0,4,8],
  'maj7':[0,4,7,11],'min7':[0,3,7,10],'dom7':[0,4,7,10],'dim7':[0,3,6,9],
  'sus2':[0,2,7],'sus4':[0,5,7],'5':[0,7],'add9':[0,2,4,7]
};
const SCALE_PATS={
  'major':[0,2,4,5,7,9,11],'nat minor':[0,2,3,5,7,8,10],
  'dorian':[0,2,3,5,7,9,10],'mixolydian':[0,2,4,5,7,9,10],
  'pentatonic':[0,2,4,7,9],'blues':[0,3,5,6,7,10]
};
const KEY_KB={'a':60,'w':61,'s':62,'e':63,'d':64,'f':65,'t':66,'g':67,'y':68,'h':69,'u':70,'j':71,'k':72};

// ── STATE ──
let vis={chordWeb:true,intervalArcs:true,fifthLines:true,trailFade:true,spokeLines:true};
let sustain=true, decay=7;
let waveform='triangle', attackMs=10, releaseMs=900, volume=0.6;
let noteCount=0;

const activeNotes=new Map(); // midi → {vel,osc,env,time}
const trailParticles=[];
let histData=[];
let midiAccess=null;

// ── AUDIO ──
let AC=null, masterGain=null, masterAna=null;
function initAC(){
  if(AC)return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=AC.createGain();masterGain.gain.value=volume;
  masterAna=AC.createAnalyser();masterAna.fftSize=2048;
  masterGain.connect(masterAna);masterAna.connect(AC.destination);
  runScope();
}
function midiFreq(m){return 440*Math.pow(2,(m-69)/12);}

function startNote(midi,vel){
  if(!AC)return;
  if(activeNotes.has(midi)){
    try{activeNotes.get(midi).osc.stop();}catch(e){}
    activeNotes.delete(midi);
  }
  const osc=AC.createOscillator(), env=AC.createGain();
  osc.type=waveform;
  osc.frequency.value=midiFreq(midi);
  env.gain.setValueAtTime(0,AC.currentTime);
  env.gain.linearRampToValueAtTime((vel/127)*0.7,AC.currentTime+attackMs/1000);
  osc.connect(env);env.connect(masterGain);
  osc.start(AC.currentTime);
  activeNotes.set(midi,{vel,osc,env,time:Date.now()});
}
function stopNote(midi,fast=false){
  if(!activeNotes.has(midi)||!AC)return;
  const {osc,env}=activeNotes.get(midi);
  const now=AC.currentTime, rel=fast?0.02:releaseMs/1000;
  env.gain.cancelScheduledValues(now);
  env.gain.setValueAtTime(env.gain.value,now);
  env.gain.exponentialRampToValueAtTime(0.0001,now+rel);
  osc.stop(now+rel+0.01);
  activeNotes.delete(midi);
}
function noteOn(midi,vel=100){
  if(!activeNotes.has(midi)){noteCount++;document.getElementById('noteCount').textContent=noteCount;}
  startNote(midi,vel);
  histData.push({midi,t:Date.now()});if(histData.length>200)histData.shift();
}
function noteOff(midi){if(!sustain)stopNote(midi);}
function clearAll(){[...activeNotes.keys()].forEach(m=>stopNote(m,true));}

// ── CANVAS ──
const canvas=document.getElementById('mainCanvas');
const ctx=canvas.getContext('2d');
function resize(){
  const p=canvas.parentElement;
  canvas.width=p.offsetWidth;canvas.height=p.offsetHeight;
}
resize();window.addEventListener('resize',resize);

const W=()=>canvas.width, H=()=>canvas.height;
const CX=()=>W()/2, CY=()=>H()/2;
const baseR=()=>Math.min(W(),H())*0.43;
const cofOuter=()=>baseR();
const cofMid=()=>baseR()*0.76;
const cofInner=()=>baseR()*0.52;

function cofAngle(i){return (Math.PI*2/12)*i-Math.PI/2;}
function noteHue(semi){const i=COF_ORDER.indexOf(semi%12);return i>=0?COF_HUE[i]:180;}
function iColor(semi,a=1){
  const c=['#00e5a0','#ff6b9d','#a8e063','#7c6dfa','#f5a623','#00c9ff','#ff4757','#f5a623','#7c6dfa','#a8e063','#ff6b9d','#00e5a0'];
  return (c[semi%12]||'#888')+Math.round(a*255).toString(16).padStart(2,'0');
}

function detectChord(notes){
  if(notes.length<2)return '';
  const semis=[...new Set(notes.map(m=>m%12))].sort((a,b)=>a-b);
  for(const[name,pat]of Object.entries(CHORD_PATS))
    for(let r=0;r<12;r++){
      const s=pat.map(x=>(x+r)%12).sort((a,b)=>a-b);
      if(s.length===semis.length&&s.every((x,i)=>x===semis[i]))return NOTE_NAMES[r]+' '+name;
    }
  if(semis.length>=4)
    for(const[sc,pat]of Object.entries(SCALE_PATS))
      for(let r=0;r<12;r++){
        const s=new Set(pat.map(x=>(x+r)%12));
        if(semis.every(x=>s.has(x)))return NOTE_NAMES[r]+' '+sc;
      }
  return '';
}
function detectKey(notes){
  if(notes.length<2)return null;
  const semis=[...new Set(notes.map(m=>m%12))];
  let best=null,bs=0;
  for(const[sc,pat]of Object.entries(SCALE_PATS))
    for(let r=0;r<12;r++){
      const s=new Set(pat.map(x=>(x+r)%12));
      const score=semis.filter(x=>s.has(x)).length;
      if(score>bs){bs=score;best={root:r,scale:sc};}
    }
  return best&&bs>=2?best:null;
}
function getIntervals(notes){
  if(notes.length<2)return [];
  const s=[...new Set(notes.map(m=>m%12))].sort((a,b)=>a-b);
  const r=new Set();
  for(let i=0;i<s.length;i++)for(let j=i+1;j<s.length;j++)
    r.add(Math.min(s[j]-s[i],12-(s[j]-s[i])));
  return [...r].sort((a,b)=>a-b);
}

// ── MAIN DRAW ──
function draw(){
  const cx=CX(),cy=CY();
  const notes=[...activeNotes.keys()];
  const semis=[...new Set(notes.map(m=>m%12))];

  ctx.fillStyle=vis.trailFade?'rgba(8,8,9,.17)':'#080809';
  ctx.fillRect(0,0,W(),H());

  drawWheel(semis,cx,cy);
  drawPads(notes,semis,cx,cy);
  if(vis.fifthLines)drawFifths(semis,cx,cy);
  if(vis.chordWeb)drawWeb(semis,cx,cy);
  if(vis.intervalArcs)drawArcs(semis,cx,cy);

  if(vis.trailFade){
    for(let i=trailParticles.length-1;i>=0;i--){
      const p=trailParticles[i];
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},70%,62%,${p.life*.5})`;ctx.fill();
      p.life-=decay/1000;p.x+=p.vx;p.y+=p.vy;
      if(p.life<=0)trailParticles.splice(i,1);
    }
  }

  updateSidebar(notes,semis);
  requestAnimationFrame(draw);
}

function drawWheel(semis,cx,cy){
  const ro=cofOuter(),rm=cofMid(),ri=cofInner();
  const sl=(Math.PI*2)/12;
  for(let i=0;i<12;i++){
    const a1=cofAngle(i)-sl/2,a2=a1+sl,mid=(a1+a2)/2;
    const semi=COF_ORDER[i],isAct=semis.includes(semi),hue=COF_HUE[i];
    // outer segment
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,ro,a1,a2);ctx.closePath();
    ctx.fillStyle=isAct?`hsla(${hue},58%,36%,.62)`:`hsla(${hue},22%,9%,.55)`;ctx.fill();
    ctx.strokeStyle=isAct?`hsla(${hue},70%,55%,.7)`:'rgba(255,255,255,.03)';
    ctx.lineWidth=isAct?1.5:.4;ctx.stroke();
    // inner segment
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rm,a1,a2);ctx.closePath();
    ctx.fillStyle=`rgba(124,109,250,${isAct?.22:.06})`;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=.3;ctx.stroke();
    // major label
    const tx=cx+Math.cos(mid)*(ro+rm)/2,ty=cy+Math.sin(mid)*(ro+rm)/2;
    ctx.fillStyle=isAct?`hsla(${hue},80%,78%,1)`:'rgba(255,255,255,.22)';
    ctx.font=`${isAct?'700':'500'} ${isAct?13:11}px Comfortaa,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(COF_LABELS[i],tx,ty);
    // relative minor label
    const mx=cx+Math.cos(mid)*(rm+ri)/2,my=cy+Math.sin(mid)*(rm+ri)/2;
    ctx.fillStyle=isAct?'rgba(164,139,255,.85)':'rgba(124,109,250,.2)';
    ctx.font=`${isAct?'600':'400'} 9px Comfortaa,sans-serif`;
    ctx.fillText(COF_MIN[i],mx,my);
  }
  // centre circle
  ctx.beginPath();ctx.arc(cx,cy,ri,0,Math.PI*2);
  ctx.fillStyle='rgba(8,8,9,.97)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.8;ctx.stroke();
  // centre label
  const kc=detectKey([...activeNotes.keys()]);
  if(kc){
    ctx.fillStyle='#00e5a0';ctx.font="bold 15px Comfortaa,sans-serif";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(NOTE_NAMES[kc.root],cx,cy-9);
    ctx.fillStyle='rgba(255,255,255,.28)';ctx.font="500 9px Comfortaa,sans-serif";
    ctx.fillText(kc.scale,cx,cy+9);
  } else {
    ctx.fillStyle='rgba(255,255,255,.07)';ctx.font="500 10px Comfortaa,sans-serif";
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SPOKE',cx,cy);
  }
}

function drawPads(notes,semis,cx,cy){
  // draw pad→wheel lines first
  if(vis.spokeLines){
    notes.forEach(midi=>{
      const pi=SPOKE_NOTES.indexOf(midi);if(pi<0)return;
      const {x:px,y:py}=padPos(pi,cx,cy);
      const sector=COF_ORDER.indexOf(midi%12);if(sector<0)return;
      const ro=cofOuter(),rm=cofMid();
      const ang=cofAngle(sector);
      const wx=cx+Math.cos(ang)*(ro+rm)/2,wy=cy+Math.sin(ang)*(ro+rm)/2;
      const hue=COF_HUE[sector];
      ctx.beginPath();ctx.moveTo(px,py);
      const cpx=(px+wx)/2+(wy-py)*0.1,cpy=(py+wy)/2-(wx-px)*0.1;
      ctx.quadraticCurveTo(cpx,cpy,wx,wy);
      ctx.strokeStyle=`hsla(${hue},65%,55%,.22)`;ctx.lineWidth=1;ctx.stroke();
    });
  }
  // draw pads
  for(let pi=0;pi<27;pi++){
    const midi=SPOKE_NOTES[pi];
    const {x,y}=padPos(pi,cx,cy);
    const isAct=notes.includes(midi);
    const hue=noteHue(midi%12);
    const sz=isAct?6:4;
    if(isAct){
      ctx.beginPath();ctx.arc(x,y,sz+6,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},65%,50%,.15)`;ctx.fill();
      trailParticles.push({x,y,hue,life:1,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*2.5+.8});
    }
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
    ctx.fillStyle=isAct?`hsla(${hue},65%,55%,1)`:'rgba(20,20,24,1)';ctx.fill();
    ctx.strokeStyle=isAct?`hsla(${hue},70%,72%,.9)`:'rgba(255,255,255,.06)';
    ctx.lineWidth=isAct?1.5:.4;ctx.stroke();
    if(isAct){
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.font="bold 5px Comfortaa,sans-serif";
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(NOTE_NAMES[midi%12],x,y);
    }
  }
}

function drawWeb(semis,cx,cy){
  if(semis.length<2)return;
  const ro=cofOuter(),rm=cofMid();
  for(let i=0;i<semis.length;i++)for(let j=i+1;j<semis.length;j++){
    const s1=semis[i],s2=semis[j];
    const c1=COF_ORDER.indexOf(s1),c2=COF_ORDER.indexOf(s2);
    if(c1<0||c2<0)continue;
    const a1=cofAngle(c1),a2=cofAngle(c2);
    const x1=cx+Math.cos(a1)*(ro+rm)/2,y1=cy+Math.sin(a1)*(ro+rm)/2;
    const x2=cx+Math.cos(a2)*(ro+rm)/2,y2=cy+Math.sin(a2)*(ro+rm)/2;
    const diff=Math.min(Math.abs(s2-s1),12-Math.abs(s2-s1));
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle=iColor(diff,.52);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.38)';ctx.font="bold 8px Comfortaa,sans-serif";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(INTERVAL_NAMES[diff],(x1+x2)/2,(y1+y2)/2);
  }
}

function drawArcs(semis,cx,cy){
  if(semis.length<2)return;
  const ro=cofOuter();
  for(let i=0;i<semis.length;i++)for(let j=i+1;j<semis.length;j++){
    const s1=semis[i],s2=semis[j];
    const c1=COF_ORDER.indexOf(s1),c2=COF_ORDER.indexOf(s2);
    if(c1<0||c2<0)continue;
    const a1=cofAngle(c1),a2=cofAngle(c2);
    const diff=Math.min(Math.abs(s2-s1),12-Math.abs(s2-s1));
    ctx.beginPath();ctx.arc(cx,cy,ro*(0.25+diff*.048),Math.min(a1,a2),Math.max(a1,a2));
    ctx.strokeStyle=iColor(diff,.24);ctx.lineWidth=.7;ctx.stroke();
  }
}

function drawFifths(semis,cx,cy){
  if(!semis.length)return;
  const ro=cofOuter();
  semis.forEach(s=>{
    [[7,.4,true],[5,.2,false]].forEach(([ivl,alpha,solid])=>{
      const t=(s+ivl)%12;
      if(!semis.includes(t))return;
      const c1=COF_ORDER.indexOf(s),c2=COF_ORDER.indexOf(t);
      if(c1<0||c2<0)return;
      const a1=cofAngle(c1),a2=cofAngle(c2);
      const x1=cx+Math.cos(a1)*ro*.86,y1=cy+Math.sin(a1)*ro*.86;
      const x2=cx+Math.cos(a2)*ro*.86,y2=cy+Math.sin(a2)*ro*.86;
      ctx.beginPath();ctx.moveTo(x1,y1);
      ctx.bezierCurveTo(cx+(x1-cx)*.35,cy+(y1-cy)*.35,cx+(x2-cx)*.35,cy+(y2-cy)*.35,x2,y2);
      ctx.strokeStyle=`rgba(245,166,35,${alpha})`;
      ctx.lineWidth=solid?1.5:1;
      ctx.setLineDash(solid?[]:[3,5]);ctx.stroke();ctx.setLineDash([]);
    });
  });
}

// ── OSCILLOSCOPE ──
function runScope(){
  const sc=document.getElementById('scopeCanvas');
  const sctx=sc.getContext('2d');
  (function loop(){
    requestAnimationFrame(loop);
    sc.width=sc.offsetWidth||176;
    const sw=sc.width,sh=44;
    sctx.fillStyle='rgba(8,8,9,.35)';sctx.fillRect(0,0,sw,sh);
    if(!masterAna)return;
    const d=new Uint8Array(masterAna.frequencyBinCount);
    masterAna.getByteTimeDomainData(d);
    const active=d.some(v=>Math.abs(v-128)>2);
    sctx.lineWidth=1.2;sctx.strokeStyle=active?'#00e5a0':'rgba(255,255,255,.04)';
    sctx.beginPath();
    d.forEach((v,i)=>{const x=i*(sw/d.length),y=(v/128)*(sh/2);i?sctx.lineTo(x,y):sctx.moveTo(x,y);});
    sctx.lineTo(sw,sh/2);sctx.stroke();
  })();
}

// ── HISTORY ──
function drawHistory(){
  const hc=document.getElementById('histCanvas');if(!hc)return;
  const hctx=hc.getContext('2d');
  hc.width=hc.offsetWidth||176;
  const hw=hc.width,hh=56;
  hctx.clearRect(0,0,hw,hh);hctx.fillStyle='#0f0f11';hctx.fillRect(0,0,hw,hh);
  const now=Date.now(),span=10000;
  histData.forEach(d=>{
    const age=now-d.t;if(age>span)return;
    const x=(1-age/span)*hw;
    const y=hh-(((d.midi-36)/62)*(hh-10)+5);
    hctx.beginPath();hctx.arc(x,y,2,0,Math.PI*2);
    hctx.fillStyle=`hsla(${noteHue(d.midi%12)},70%,60%,${1-age/span})`;hctx.fill();
  });
}
setInterval(drawHistory,80);

// ── SIDEBAR ──
function updateSidebar(notes,semis){
  const names=notes.map(m=>NOTE_NAMES[m%12]+(Math.floor(m/12)-1));
  document.getElementById('activeNoteNames').textContent=names.length?names.join(' · '):'—';
  document.getElementById('chordName').textContent=detectChord(notes);
  const ivs=getIntervals(notes);
  document.getElementById('intervalList').innerHTML=ivs.length?ivs.map(i=>`<span>${INTERVAL_NAMES[i]}</span> `).join(''):'—';
  const kc=detectKey(notes);
  document.getElementById('keyCentre').textContent=kc?NOTE_NAMES[kc.root]:'—';
  document.getElementById('keyMode').textContent=kc?kc.scale:'';
  document.querySelectorAll('.note-pip').forEach(p=>p.classList.toggle('lit',semis.includes(parseInt(p.dataset.semi))));
}

// ── CHROMATIC PIPS ──
const chromaRow=document.getElementById('chromaRow');
for(let i=0;i<12;i++){
  const pip=document.createElement('div');
  pip.className='note-pip';pip.textContent=NOTE_NAMES[i];pip.dataset.semi=i;
  chromaRow.appendChild(pip);
}

// ── CANVAS INTERACTION ──
canvas.addEventListener('mousedown',e=>{
  initAC();
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W()/r.width);
  const my=(e.clientY-r.top)*(H()/r.height);
  const cx=CX(),cy=CY();
  // hit SPOKE pads
  for(let pi=0;pi<27;pi++){
    const {x,y}=padPos(pi,cx,cy);
    if(Math.hypot(mx-x,my-y)<=9){noteOn(SPOKE_NOTES[pi],100);return;}
  }
  // hit CoF outer ring → root note
  const ro=cofOuter(),rm=cofMid();
  const dist=Math.hypot(mx-cx,my-cy);
  if(dist>rm&&dist<ro){
    let a=Math.atan2(my-cy,mx-cx)+Math.PI/2+Math.PI/12;
    if(a<0)a+=Math.PI*2;if(a>=Math.PI*2)a-=Math.PI*2;
    noteOn(60+COF_ORDER[Math.floor(a/(Math.PI*2/12))%12],100);
  }
});
canvas.addEventListener('mouseup',()=>{if(!sustain)clearAll();});

// ── KEYBOARD ──
window.addEventListener('keydown',e=>{
  if(e.repeat||!KEY_KB[e.key])return;
  initAC();noteOn(KEY_KB[e.key],100);
});
window.addEventListener('keyup',e=>{
  if(!KEY_KB[e.key])return;
  if(!sustain)noteOff(KEY_KB[e.key]);
});

// ── MIDI ──
document.getElementById('midiBtn').addEventListener('click',async()=>{
  try{
    midiAccess=await navigator.requestMIDIAccess();
    const names=[];
    midiAccess.inputs.forEach(inp=>{
      names.push(inp.name);
      inp.onmidimessage=ev=>{
        const[st,note,vel]=ev.data,cmd=st&0xf0;
        if(cmd===0x90&&vel>0){initAC();noteOn(note,vel);}
        else if(cmd===0x80||(cmd===0x90&&vel===0))noteOff(note);
      };
    });
    const btn=document.getElementById('midiBtn');
    btn.textContent='MIDI connected';btn.classList.add('on');
    document.getElementById('midiStatus').textContent=names.length?names.join(', '):'No devices — plug in and retry';
    document.getElementById('statusBar').textContent='MIDI · '+names.join(', ');
  }catch(err){
    document.getElementById('midiStatus').textContent='Error: '+err.message;
  }
});

// ── UI ──
document.querySelectorAll('[data-v]').forEach(btn=>{
  if(btn.id==='sustainBtn'){
    btn.addEventListener('click',()=>{sustain=!sustain;btn.classList.toggle('on',sustain);if(!sustain)clearAll();});
    return;
  }
  btn.addEventListener('click',()=>{const v=btn.dataset.v;vis[v]=!vis[v];btn.classList.toggle('on',vis[v]);});
});
document.querySelectorAll('[data-w]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    waveform=btn.dataset.w;
    document.querySelectorAll('[data-w]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  });
});
document.getElementById('atkSlider').addEventListener('input',e=>attackMs=+e.target.value);
document.getElementById('relSlider').addEventListener('input',e=>releaseMs=+e.target.value);
document.getElementById('volSlider').addEventListener('input',e=>{
  volume=e.target.value/100;if(masterGain)masterGain.gain.value=volume;
});
document.getElementById('decaySlider').addEventListener('input',e=>decay=+e.target.value);
document.getElementById('clearBtn').addEventListener('click',clearAll);

draw();
</script>
