<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freesound API Test - SPOKE Sampler</title>
    <style>

        .btn:disabled {

        .info-text {

        /* Suggested Searches */

        }
        
        .suggested-btn {

        }
        
        .suggested-btn:hover {
            background: rgba(33, 150, 243, 0.4);
            border-color: #2196F3;
            transform: translateY(-2px);
        }
        
        /* Search Section */
        .search-section {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .search-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #4CAF50;
        }
        
        .search-btn {
            background: rgba(33, 150, 243, 0.3);
            border: 2px solid #2196F3;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            background: rgba(33, 150, 243, 0.5);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-group label {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .filter-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);

        .filter-select option {

        /* Results */
        .results-section {
            background: rgba(0, 0, 0, 0.3);

        }
        
        .results-header {
            display: flex;

        }
        
        .results-title {

        .sound-list {

</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">FREESOUND API TEST</h1>
            <p class="subtitle">Search and download sounds for SPOKE</p>
        </div>
        
        <!-- Top Section: Suggested Searches + SPOKE Board -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
            <!-- Suggested Searches -->
            <div class="api-key-section">
                <div class="api-key-title">🎵 Popular Sample Categories</div>
                <div class="suggested-searches">
                    <button class="suggested-btn" data-search="bird chirp">🐦 Bird Chirps</button>
                    <button class="suggested-btn" data-search="drum kick">🥁 Drum Kicks</button>
                    <button class="suggested-btn" data-search="808 bass">🔊 808 Bass</button>
                    <button class="suggested-btn" data-search="piano note">🎹 Piano Notes</button>
                    <button class="suggested-btn" data-search="synth pad">🎛️ Synth Pads</button>
                    <button class="suggested-btn" data-search="clap">👏 Claps</button>
                    <button class="suggested-btn" data-search="snare">🥁 Snares</button>
                    <button class="suggested-btn" data-search="hi-hat">🎶 Hi-Hats</button>
                    <button class="suggested-btn" data-search="ambient drone">🌌 Ambient Drones</button>
                    <button class="suggested-btn" data-search="trumpet">🎺 Trumpet</button>
                    <button class="suggested-btn" data-search="violin">🎻 Violin</button>
                    <button class="suggested-btn" data-search="nature sounds">🌿 Nature Sounds</button>
                </div>
            </div>
            
            <!-- SPOKE Board -->
            <div class="api-key-section">
                <div class="api-key-title" style="margin-bottom: 10px;">🎛️ SPOKE Board</div>
                <div style="display: flex; justify-content: center; margin-bottom: 15px;">
                    <canvas id="spokeCanvas" width="400" height="400"></canvas>
                </div>
                
                <!-- Audio Scope -->
                <div style="position: relative; height: 80px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.5); border-radius: 10px; overflow: hidden;">
                    <canvas id="scopeCanvas" width="400" height="80"></canvas>
                </div>
                
                <!-- Now Playing Info -->
                <div id="nowPlayingInfo" style="background: rgba(0, 0, 0, 0.5); border-radius: 10px; padding: 12px; margin-bottom: 15px; min-height: 60px; display: flex; align-items: center; justify-content: center;">
                    <div style="text-align: center; opacity: 0.6; font-size: 13px;">
                        No sound playing
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
                    <button class="btn" id="connectMidiBtn" style="flex: 1;">Connect MIDI</button>
                    <button class="btn" id="clearBoardBtn" style="flex: 1;">Clear Board</button>
                </div>
                <div class="info-text" style="text-align: center;">
                    <span id="loadedCount">0 / 27 sounds loaded</span><br>
                    Click pads to test or use MIDI controller
                </div>
            </div>
        </div>
        
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-controls">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Search for sounds (e.g., 'bird chirp', 'drum kit', 'piano')..."
                >
                <button class="search-btn" id="searchBtn">Search</button>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>License:</label>
                    <select class="filter-select" id="licenseFilter">
                        <option value="">Any License</option>
                        <option value="Attribution">CC BY (Attribution)</option>
                        <option value="Creative Commons 0">CC0 (Public Domain)</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Duration:</label>
                    <select class="filter-select" id="durationFilter">
                        <option value="">Any Duration</option>
                        <option value="[0 TO 2]">0-2 seconds</option>
                        <option value="[2 TO 5]">2-5 seconds</option>
                        <option value="[5 TO 10]">5-10 seconds</option>
                        <option value="[10 TO 30]">10-30 seconds</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Sort by:</label>
                    <select class="filter-select" id="sortFilter">
                        <option value="score">Relevance</option>
                        <option value="rating_desc">Rating (High to Low)</option>
                        <option value="downloads_desc">Most Downloaded</option>
                        <option value="created_desc">Newest First</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Results Section -->
        <div class="results-section">
            <div class="results-header">
                <div class="results-title">Search Results</div>
                <div class="results-count" id="resultsCount"></div>
            </div>
            
            <div id="soundList" class="sound-list">
                <div class="status-message">Enter a search query to find sounds</div>
            </div>
            
            <div class="load-more" id="loadMoreContainer" style="display: none;">
                <button class="btn" id="loadMoreBtn">Load More Results</button>
            </div>
        </div>
    </div>

    <script>
        // Embedded API key
        const API_KEY = 'ENXBH14HDdboFnq4ttqKQGed9tV7xxYJOghOaPbo';
        
        // SPOKE configuration
        const SPOKE_NOTES = [98, 96, 93, 91, 88, 86, 84, 81, 79, 76, 74, 72, 69, 67, 64, 62, 60, 57, 55, 52, 50, 48, 45, 43, 40, 38, 36];
        
        // State
        let apiKey = API_KEY;
        let currentQuery = '';
        let currentPage = 1;
        let totalResults = 0;
        let audioElements = new Map();
        
        // SPOKE state
        let audioContext;
        let masterGain;
        let midiAccess = null;
        const spokeSounds = new Map(); // Map of padIndex -> {buffer, url, name}
        const activeSources = new Map();
        let loadedSoundsCount = 0;
        
        // Scope visualization
        let scopeAnalyser;
        let scopeAnimationId;
        
        // Elements
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const soundList = document.getElementById('soundList');
        const resultsCount = document.getElementById('resultsCount');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        const spokeCanvas = document.getElementById('spokeCanvas');
        const scopeCanvas = document.getElementById('scopeCanvas');
        const connectMidiBtn = document.getElementById('connectMidiBtn');
        const clearBoardBtn = document.getElementById('clearBoardBtn');
        const loadedCount = document.getElementById('loadedCount');
        const nowPlayingInfo = document.getElementById('nowPlayingInfo');
        
        // Suggested search buttons
        document.querySelectorAll('.suggested-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const searchTerm = btn.getAttribute('data-search');
                searchInput.value = searchTerm;
                performSearch();
            });
        });
        
        // Search
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        
        // Load more
        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            performSearch(true);
        });
        
        // SPOKE Board Controls
        connectMidiBtn.addEventListener('click', connectMIDI);
        clearBoardBtn.addEventListener('click', clearBoard);
        
        async function performSearch(append = false) {
            const query = searchInput.value.trim();
            if (!query && !append) {
                soundList.innerHTML = '<div class="status-message">Enter a search query to find sounds</div>';
                return;
            }
            
            if (!append) {
                currentPage = 1;
                currentQuery = query;
                soundList.innerHTML = ''; // Clear existing results for new search
            }
            
            // Build URL with filters
            const licenseFilter = document.getElementById('licenseFilter').value;
            const durationFilter = document.getElementById('durationFilter').value;
            const sortFilter = document.getElementById('sortFilter').value;
            
            let url = `https://freesound.org/apiv2/search/text/?query=${encodeURIComponent(currentQuery)}&page=${currentPage}&page_size=15&token=${apiKey}&fields=id,name,tags,description,username,duration,license,previews`;
            
            if (licenseFilter) {
                url += `&filter=license:"${encodeURIComponent(licenseFilter)}"`;
            }
            if (durationFilter) {
                url += `${licenseFilter ? ' ' : '&filter='}duration:${durationFilter}`;
            }
            if (sortFilter) {
                url += `&sort=${sortFilter}`;
            }
            
            try {
                if (!append) {
                    soundList.innerHTML = '<div class="status-message">Searching...</div>';
                }
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                totalResults = data.count;
                
                if (data.results.length === 0 && !append) {
                    soundList.innerHTML = '<div class="status-message">No sounds found. Try a different search query.</div>';
                    resultsCount.textContent = '';
                    loadMoreContainer.style.display = 'none';
                    return;
                }
                
                // Display results
                if (!append) {
                    soundList.innerHTML = '';
                }
                
                data.results.forEach(sound => {
                    const soundItem = createSoundItem(sound);
                    soundList.appendChild(soundItem);
                });
                
                // Update count
                const displayedCount = soundList.children.length;
                resultsCount.textContent = `Showing ${displayedCount} of ${totalResults} results`;
                
                // Show/hide load more
                if (data.next) {
                    loadMoreContainer.style.display = 'block';
                } else {
                    loadMoreContainer.style.display = 'none';
                }
                
            } catch (error) {
                console.error('Search error:', error);
                soundList.innerHTML = `<div class="error-message">Error: ${error.message}<br>Make sure your API key is valid.</div>`;
                loadMoreContainer.style.display = 'none';
            }
        }
        
        function createSoundItem(sound) {
            const div = document.createElement('div');
            div.className = 'sound-item';
            
            // Format duration
            const duration = Math.round(sound.duration * 10) / 10;
            
            // Get tags (first 5)
            const tags = sound.tags.slice(0, 5).map(tag => 
                `<span class="tag">${tag}</span>`
            ).join('');
            
            div.innerHTML = `
                <div class="sound-header">
                    <div class="sound-info">
                        <div class="sound-name">${sound.name}</div>
                        <div class="sound-user">by ${sound.username}</div>
                        <div class="sound-meta">
                            <span>⏱️ ${duration}s</span>
                            <span>📜 ${sound.license}</span>
                        </div>
                        ${tags ? `<div class="sound-tags">${tags}</div>` : ''}
                    </div>
                    <div class="sound-actions">
                        <button class="action-btn play-btn" data-id="${sound.id}">▶ Play</button>
                        <button class="action-btn load-btn" data-id="${sound.id}" data-url="${sound.previews['preview-hq-mp3']}" data-name="${sound.name}">📥 Load to SPOKE</button>
                        <button class="action-btn" onclick="window.open('https://freesound.org/people/${sound.username}/sounds/${sound.id}/', '_blank')">🔗 View</button>
                    </div>
                </div>
            `;
            
            // Add play button functionality
            const playBtn = div.querySelector('.play-btn');
            playBtn.addEventListener('click', () => togglePlay(sound.id, sound.previews['preview-hq-mp3'], playBtn));
            
            // Add load to SPOKE button functionality
            const loadBtn = div.querySelector('.load-btn');
            loadBtn.addEventListener('click', () => {
                loadToSpoke(sound.previews['preview-hq-mp3'], sound.name, sound.id);
                loadBtn.textContent = '✓ Loaded';
                loadBtn.disabled = true;
                loadBtn.style.opacity = '0.5';
            });
            
            return div;
        }
        
        function togglePlay(soundId, previewUrl, button) {
            // Stop any currently playing audio
            audioElements.forEach((audio, id) => {
                if (id !== soundId && !audio.paused) {
                    audio.pause();
                    audio.currentTime = 0;
                    const otherBtn = document.querySelector(`[data-id="${id}"]`);
                    if (otherBtn) {
                        otherBtn.textContent = '▶ Play';
                        otherBtn.classList.remove('playing');
                    }
                }
            });
            
            // Toggle current audio
            if (!audioElements.has(soundId)) {
                const audio = new Audio(previewUrl);
                audio.addEventListener('ended', () => {
                    button.textContent = '▶ Play';
                    button.classList.remove('playing');
                });
                audioElements.set(soundId, audio);
            }
            
            const audio = audioElements.get(soundId);
            
            if (audio.paused) {
                audio.play();
                button.textContent = '⏸ Pause';
                button.classList.add('playing');
            } else {
                audio.pause();
                audio.currentTime = 0;
                button.textContent = '▶ Play';
                button.classList.remove('playing');
            }
        }
        
        // ===== SPOKE BOARD FUNCTIONS =====
        
        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create analyser for scope
                scopeAnalyser = audioContext.createAnalyser();
                scopeAnalyser.fftSize = 2048;
                
                masterGain = audioContext.createGain();
                masterGain.gain.value = 0.8;
                masterGain.connect(scopeAnalyser);
                scopeAnalyser.connect(audioContext.destination);
                
                // Start scope animation
                drawScope();
            }
        }
        
        // Draw audio scope
        function drawScope() {
            const scopeCtx = scopeCanvas.getContext('2d');
            const scopeWidth = scopeCanvas.width;
            const scopeHeight = scopeCanvas.height;
            
            if (!scopeAnalyser) {
                scopeCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                scopeCtx.fillRect(0, 0, scopeWidth, scopeHeight);
                scopeAnimationId = requestAnimationFrame(drawScope);
                return;
            }
            
            const bufferLength = scopeAnalyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            scopeAnalyser.getByteTimeDomainData(dataArray);
            
            // Check if there's actual audio signal
            let hasSignal = false;
            for (let i = 0; i < bufferLength; i++) {
                if (Math.abs(dataArray[i] - 128) > 2) {
                    hasSignal = true;
                    break;
                }
            }
            
            scopeCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            scopeCtx.fillRect(0, 0, scopeWidth, scopeHeight);
            
            scopeCtx.lineWidth = 2;
            scopeCtx.strokeStyle = hasSignal ? '#4CAF50' : 'rgba(76, 175, 80, 0.3)';
            scopeCtx.beginPath();
            
            const sliceWidth = scopeWidth / bufferLength;
            let x = 0;
            
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * scopeHeight / 2;
                
                if (i === 0) {
                    scopeCtx.moveTo(x, y);
                } else {
                    scopeCtx.lineTo(x, y);
                }
                
                x += sliceWidth;
            }
            
            scopeCtx.lineTo(scopeWidth, scopeHeight / 2);
            scopeCtx.stroke();
            
            scopeAnimationId = requestAnimationFrame(drawScope);
        }
        
        // Update now playing info
        function updateNowPlaying(padIndex) {
            if (spokeSounds.has(padIndex)) {
                const sound = spokeSounds.get(padIndex);
                nowPlayingInfo.innerHTML = `
                    <div style="text-align: center;">
                        <div style="font-size: 16px; font-weight: 700; margin-bottom: 5px;">
                            🔊 Pad ${padIndex + 1}
                        </div>
                        <div style="font-size: 13px; opacity: 0.8;">
                            ${sound.name}
                        </div>
                    </div>
                `;
            }
        }
        
        // Clear now playing info after a delay
        function clearNowPlaying() {
            setTimeout(() => {
                // Only clear if no sounds are currently playing
                if (activeSources.size === 0) {
                    nowPlayingInfo.innerHTML = `
                        <div style="text-align: center; opacity: 0.6; font-size: 13px;">
                            No sound playing
                        </div>
                    `;
                }
            }, 2000);
        }
        
        // Connect MIDI
        async function connectMIDI() {
            try {
                midiAccess = await navigator.requestMIDIAccess();
                const inputs = Array.from(midiAccess.inputs.values());
                
                if (inputs.length === 0) {
                    alert('No MIDI devices found');
                    return;
                }
                
                inputs.forEach(input => input.onmidimessage = handleMIDIMessage);
                
                connectMidiBtn.textContent = 'MIDI Connected ✓';
                connectMidiBtn.style.background = 'rgba(76, 175, 80, 0.5)';
                
            } catch (error) {
                alert('MIDI Error: ' + error.message);
            }
        }
        
        // Handle MIDI messages
        function handleMIDIMessage(message) {
            const [status, midiNote, velocity] = message.data;
            const command = status & 0xf0;
            const padIndex = SPOKE_NOTES.indexOf(midiNote);
            
            if (padIndex === -1) return;
            
            // Note On
            if (command === 0x90 && velocity > 0) {
                playSpokeSound(padIndex, velocity);
            }
        }
        
        // Play SPOKE sound
        function playSpokeSound(padIndex, velocity = 127) {
            if (!spokeSounds.has(padIndex)) return;
            
            initAudio();
            
            // Update now playing info
            updateNowPlaying(padIndex);
            
            // Stop previous
            if (activeSources.has(padIndex)) {
                try { activeSources.get(padIndex).source.stop(); } catch (e) {}
                activeSources.delete(padIndex);
            }
            
            const source = audioContext.createBufferSource();
            const gainNode = audioContext.createGain();
            
            source.buffer = spokeSounds.get(padIndex).buffer;
            gainNode.gain.value = velocity / 127;
            
            source.connect(gainNode);
            gainNode.connect(masterGain);
            source.start(0);
            
            activeSources.set(padIndex, { source, gainNode });
            
            // Visual feedback
            if (pads[padIndex]) {
                pads[padIndex].trigger();
            }
            
            source.onended = () => {
                if (activeSources.get(padIndex)?.source === source) {
                    activeSources.delete(padIndex);
                    clearNowPlaying();
                }
            };
        }
        
        // Load sound to SPOKE board
        async function loadToSpoke(soundUrl, soundName, soundId) {
            if (loadedSoundsCount >= 27) {
                alert('Maximum 27 sounds loaded. Clear the board to add more.');
                return;
            }
            
            try {
                initAudio();
                
                const response = await fetch(soundUrl);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                const padIndex = loadedSoundsCount;
                spokeSounds.set(padIndex, {
                    buffer: audioBuffer,
                    url: soundUrl,
                    name: soundName,
                    id: soundId
                });
                
                loadedSoundsCount++;
                updateLoadedCount();
                drawBoard();
                
            } catch (error) {
                console.error('Error loading sound:', error);
                alert('Failed to load sound: ' + error.message);
            }
        }
        
        // Clear board
        function clearBoard() {
            spokeSounds.clear();
            activeSources.forEach((sourceObj) => {
                try { sourceObj.source.stop(); } catch (e) {}
            });
            activeSources.clear();
            loadedSoundsCount = 0;
            updateLoadedCount();
            drawBoard();
        }
        
        // Update loaded count display
        function updateLoadedCount() {
            loadedCount.textContent = `${loadedSoundsCount} / 27 sounds loaded`;
        }
        
        // SPOKE Board Visualization
        const ctx = spokeCanvas.getContext('2d');
        const width = 400;  // Updated to match new canvas size
        const height = 400; // Updated to match new canvas size
        
        class Pad {
            constructor(index, angle, midiNote) {
                this.index = index;
                this.angle = angle;
                this.midiNote = midiNote;
                
                const radius = Math.min(width, height) * 0.38;
                this.x = width / 2 + Math.cos(angle) * radius;
                this.y = height / 2 + Math.sin(angle) * radius;
                this.size = 18; // Smaller size for compact canvas
                this.active = false;
                this.activePulse = 0;
            }
            
            update() {
                if (this.active) {
                    this.activePulse += 0.15;
                    if (this.activePulse > Math.PI * 2) {
                        this.active = false;
                        this.activePulse = 0;
                    }
                }
            }
            
            draw() {
                const hasSound = spokeSounds.has(this.index);
                
                let color = '#333';
                let borderColor = '#666';
                
                if (this.active) {
                    color = '#4CAF50';
                    borderColor = '#fff';
                } else if (hasSound) {
                    color = '#2e7d32';
                    borderColor = '#4CAF50';
                }
                
                // Glow
                if (this.active) {
                    const glowSize = this.size + Math.sin(this.activePulse) * 20;
                    const gradient = ctx.createRadialGradient(this.x, this.y, this.size * 0.3, this.x, this.y, glowSize);
                    gradient.addColorStop(0, '#4CAF50cc');
                    gradient.addColorStop(1, '#4CAF5000');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Main pad
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = hasSound ? 3 : 2;
                ctx.stroke();
                
                // Label
                ctx.fillStyle = '#fff';
                ctx.font = hasSound ? 'bold 12px Arial' : '11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.index + 1, this.x, this.y);
            }
            
            trigger() {
                this.active = true;
                this.activePulse = 0;
            }
            
            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return Math.sqrt(dx * dx + dy * dy) <= this.size;
            }
        }
        
        // Create pads
        const pads = [];
        const angleStep = (Math.PI * 2) / SPOKE_NOTES.length;
        SPOKE_NOTES.forEach((midiNote, index) => {
            const angle = angleStep * index - Math.PI / 2;
            pads.push(new Pad(index, angle, midiNote));
        });
        
        // Draw board
        function drawBoard() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);
            
            // Board circle
            const boardRadius = Math.min(width, height) * 0.42;
            ctx.beginPath();
            ctx.arc(width / 2, height / 2, boardRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Center
            ctx.beginPath();
            ctx.arc(width / 2, height / 2, boardRadius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0f';
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial'; // Smaller for compact canvas
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SPOKE', width / 2, height / 2 - 10);
            
            ctx.font = '12px Arial'; // Smaller for compact canvas
            ctx.fillStyle = '#4CAF50';
            ctx.fillText(`${loadedSoundsCount}/27`, width / 2, height / 2 + 20);
            
            // Pads
            pads.forEach(pad => {
                pad.update();
                pad.draw();
            });
        }
        
        function animate() {
            drawBoard();
            requestAnimationFrame(animate);
        }
        
        // Click to play
        spokeCanvas.addEventListener('click', (e) => {
            const rect = spokeCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            pads.forEach(pad => {
                if (pad.contains(x, y)) {
                    playSpokeSound(pad.index);
                }
            });
        });
        
        // Start animation
        animate();
        
        // Popular searches
        const popularSearches = ['bird chirp', 'drum kick', 'piano note', 'synth bass', 'ambient pad'];
        searchInput.placeholder = `Search for sounds (e.g., '${popularSearches[Math.floor(Math.random() * popularSearches.length)]}')...`;
    </script>
</body>
</html>
