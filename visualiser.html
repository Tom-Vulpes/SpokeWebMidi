<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOKE — Visual Synth</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #midi-dot {
    position: fixed; bottom: 24px; left: 24px;
    font: 9px/1 'Courier New', monospace; letter-spacing: .3em; color: #444;
    transition: color .4s; pointer-events: none;
  }
  #note-bar {
    position: fixed; bottom: 24px; right: 24px;
    font: 9px/1 'Courier New', monospace; letter-spacing: .2em; color: #444;
    pointer-events: none;
  }
  #prog-track { position: fixed; bottom: 0; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,.04); }
  #prog-fill  { height: 100%; width: 0; transition: background-color .8s; }
  #pause-btn {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: none; border: 1px solid rgba(255,255,255,.18);
    color: rgba(255,255,255,.36); font: 11px/1 'Courier New', monospace;
    letter-spacing: .2em; padding: 7px 18px; cursor: pointer;
    transition: border-color .3s, color .3s; user-select: none;
  }
  #pause-btn:hover { border-color: rgba(255,255,255,.5); color: rgba(255,255,255,.7); }
  #flash { position: fixed; top:0;left:0;width:100%;height:100%; pointer-events:none; opacity:0; transition:opacity .06s; }
  #hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font: 11px/2.2 'Courier New', monospace; letter-spacing: .3em; color: #444;
    text-transform: uppercase; text-align: center; pointer-events: none; transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="midi-dot">◌ MIDI</div>
<div id="note-bar">— —</div>
<div id="prog-track"><div id="prog-fill"></div></div>
<button id="pause-btn">&#9646;&#9646;</button>
<div id="hint">Click to activate audio<br>SPACE = next style &nbsp;&nbsp; A-K = notes</div>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const ACCENTS = ['#00ffd4','#ff8c40','#ff1880','#d4a020','#ff4444','#ff71ce','#ffffff'];
const STYLE_DURATION = 26000;

// Stained-glass jewel colours  [dark base, bright highlight]
const JEWEL = [
  [208,16, 28],   // ruby
  [16, 28,210],   // sapphire
  [16,160, 40],   // emerald
  [195,110, 10],  // amber
  [110, 14,165],  // amethyst
  [12, 148,148],  // teal
];

// ══════════════════════════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initMountains(); initCyberBuildings(); initJD();
}
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let T = 0, prevT = 0;
let currentStyle = 0, styleStart = 0;
let paused = false, pausedAt = 0;
let audioReady = false, audioCtx, masterGain;
let pulses = [], particles = [], ambients = [];
let windowFlash = 0;   // medieval stained-glass flash intensity

// ══════════════════════════════════════════════════════════════
//  PAUSE
// ══════════════════════════════════════════════════════════════
document.getElementById('pause-btn').addEventListener('click', () => {
  paused = !paused;
  if (paused) {
    pausedAt = T;
    document.getElementById('pause-btn').innerHTML = '&#9654;';
  } else {
    styleStart += T - pausedAt;
    document.getElementById('pause-btn').innerHTML = '&#9646;&#9646;';
  }
});

// ══════════════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════════════
function initAudio() {
  if (audioReady) return;
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.52;
  const rev = audioCtx.createConvolver();
  const sr = audioCtx.sampleRate, len = sr * 2.8;
  const buf = audioCtx.createBuffer(2, len, sr);
  for (let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.6);}
  rev.buffer=buf;
  const rs=audioCtx.createGain(); rs.gain.value=0.3;
  masterGain.connect(rs); rs.connect(rev); rev.connect(audioCtx.destination);
  masterGain.connect(audioCtx.destination);
  audioReady=true;
  const h=document.getElementById('hint');
  if(h){h.style.opacity='0';setTimeout(()=>h.remove(),1100);}
}

function noteFreq(n){return 440*Math.pow(2,(n-69)/12);}

function playNote(note,velocity){
  if(!audioReady)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  const freq=noteFreq(note),vel=velocity/127,now=audioCtx.currentTime,s=currentStyle;
  const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),filt=audioCtx.createBiquadFilter();
  osc.connect(filt);filt.connect(gain);gain.connect(masterGain);

  if(s===0){
    osc.type='square';filt.type='lowpass';filt.frequency.value=900+vel*1800;
    gain.gain.setValueAtTime(vel*.27,now);gain.gain.exponentialRampToValueAtTime(.0001,now+.35);
    osc.frequency.value=freq;osc.start(now);osc.stop(now+.4);
  }else if(s===1){
    osc.type='sine';filt.type='lowpass';filt.frequency.value=1100;
    gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(vel*.36,now+.1);
    gain.gain.exponentialRampToValueAtTime(.0001,now+2.2);osc.frequency.value=freq;
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.value=freq*1.5;
    g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(vel*.1,now+.12);
    g2.gain.exponentialRampToValueAtTime(.0001,now+1.8);
    o2.connect(g2);g2.connect(masterGain);o2.start(now);o2.stop(now+2.3);
    osc.start(now);osc.stop(now+2.3);
  }else if(s===2){
    osc.type='sawtooth';filt.type='lowpass';filt.Q.value=9;
    filt.frequency.setValueAtTime(3500+vel*5000,now);filt.frequency.exponentialRampToValueAtTime(350,now+.42);
    gain.gain.setValueAtTime(vel*.3,now);gain.gain.exponentialRampToValueAtTime(.0001,now+.55);
    osc.frequency.value=freq;osc.start(now);osc.stop(now+.6);
  }else if(s===3){
    // STAINED GLASS — cathedral bell / struck glass
    osc.type='sine';filt.type='lowpass';filt.frequency.value=3000;
    gain.gain.setValueAtTime(vel*.44,now);gain.gain.exponentialRampToValueAtTime(.0001,now+1.6);
    osc.frequency.value=freq;
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.value=freq*2.756; // inharmonic partial (bell character)
    g2.gain.setValueAtTime(vel*.22,now);g2.gain.exponentialRampToValueAtTime(.0001,now+.9);
    o2.connect(g2);g2.connect(masterGain);o2.start(now);o2.stop(now+2);
    const o3=audioCtx.createOscillator(),g3=audioCtx.createGain();
    o3.type='sine';o3.frequency.value=freq*4.95;
    g3.gain.setValueAtTime(vel*.1,now);g3.gain.exponentialRampToValueAtTime(.0001,now+.45);
    o3.connect(g3);g3.connect(masterGain);o3.start(now);o3.stop(now+.6);
    osc.start(now);osc.stop(now+2.2);
  }else if(s===4){
    osc.type='triangle';filt.type='highpass';filt.frequency.value=130;
    gain.gain.setValueAtTime(vel*.42,now);gain.gain.exponentialRampToValueAtTime(.0001,now+.48);
    osc.frequency.setValueAtTime(freq*2.06,now);osc.frequency.exponentialRampToValueAtTime(freq,now+.09);
    osc.start(now);osc.stop(now+.55);
  }else if(s===5){
    osc.type='sine';filt.type='lowpass';filt.frequency.value=750;
    gain.gain.setValueAtTime(vel*.33,now);gain.gain.setTargetAtTime(0,now+.25,1.2);
    osc.frequency.value=freq;osc.start(now);osc.stop(now+4.5);
  }else{
    osc.type='sine';filt.type='bandpass';filt.frequency.value=freq;filt.Q.value=10;
    gain.gain.setValueAtTime(vel*.52,now);gain.gain.exponentialRampToValueAtTime(.0001,now+1.8);
    osc.frequency.value=freq;osc.start(now);osc.stop(now+2.2);
  }
}

// ══════════════════════════════════════════════════════════════
//  MIDI
// ══════════════════════════════════════════════════════════════
function initMIDI(){
  const el=document.getElementById('midi-dot');
  if(!navigator.requestMIDIAccess){el.textContent='NO MIDI';return;}
  navigator.requestMIDIAccess().then(access=>{
    function connect(){access.inputs.forEach(inp=>inp.onmidimessage=onMIDI);if(access.inputs.size>0){el.textContent='● SPOKE';el.style.color=ACCENTS[currentStyle];}}
    connect();access.onstatechange=connect;
  }).catch(()=>el.textContent='DENIED');
}

function onMIDI(e){
  const[st,d1,d2]=e.data,type=st&0xf0;
  if(type===0x90&&d2>0){
    document.getElementById('note-bar').textContent=`${d1} v${d2}`;
    initAudio();playNote(d1,d2);triggerVisual(d1,d2);
    if(d1>90||d2===127)nextStyle();
  }else if(type===0xb0){
    if(d1===64&&d2>63)nextStyle();
    if(d1===1&&masterGain)masterGain.gain.value=.25+(d2/127)*.55;
  }
}

// ══════════════════════════════════════════════════════════════
//  STYLE CYCLING
// ══════════════════════════════════════════════════════════════
function nextStyle(){
  currentStyle=(currentStyle+1)%ACCENTS.length;styleStart=T;
  document.getElementById('prog-fill').style.backgroundColor=ACCENTS[currentStyle];
  document.getElementById('midi-dot').style.color=ACCENTS[currentStyle];
  const fl=document.getElementById('flash');fl.style.background=ACCENTS[currentStyle];fl.style.opacity='.13';
  setTimeout(()=>fl.style.opacity='0',100);
}

// ══════════════════════════════════════════════════════════════
//  TRIGGERS
// ══════════════════════════════════════════════════════════════
function triggerVisual(note,velocity){
  const vel=velocity/127,xNorm=Math.max(0,Math.min(1,(note-36)/60));
  if(currentStyle===6){jdAddPeak(xNorm,vel,note);return;}
  if(currentStyle===3){
    // Flash the whole window + centred expanding ring
    windowFlash=Math.min(1,windowFlash+vel*.75);
    const cx=W/2,cy=H*.45,R=Math.min(W,H)*.365;
    const hue=((note*7)+20)%360;
    pulses.push({x:cx,y:cy,r:R*.06,maxR:R*1.05,life:1,style:3,note,vel,hue});
    return;
  }
  const x=W*.14+Math.random()*W*.72,y=H*.12+Math.random()*H*.76;
  pulses.push({x,y,r:6,maxR:60+vel*370,life:1,style:currentStyle,note,vel});
  const count=Math.floor(5+vel*22);
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*vel*8;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,size:3+Math.random()*7,rot:Math.random()*Math.PI*2,style:currentStyle});}
}

function spawnAmbient(){
  const s=currentStyle;
  if(s===0)ambients.push({x:Math.random()*W,y:H+5,vx:(Math.random()-.5)*.4,vy:-.5-Math.random()*1.5,life:1,size:1+Math.random()*2,s});
  else if(s===1&&Math.random()<.35)ambients.push({x:Math.random()*W,y:H+5,vx:(Math.random()-.5)*.4,vy:-.5-Math.random(),life:1,size:2+Math.random()*3,s});
  else if(s===3&&Math.random()<.15){
    // Slow golden dust motes drifting upward
    const cx=W/2,cy=H*.45,R=Math.min(W,H)*.365;
    const a=Math.random()*Math.PI*2,r=(Math.random()*.9)*R;
    ambients.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,vx:(Math.random()-.5)*.25,vy:-.15-Math.random()*.4,life:1,size:1+Math.random()*2.5,s});
  }
  else if(s===5&&Math.random()<.18)ambients.push({x:Math.random()*W,y:H+5,vx:(Math.random()-.5)*.4,vy:-.5-Math.random(),life:1,size:4+Math.random()*8,rot:Math.random()*Math.PI*2,s});
}

// ══════════════════════════════════════════════════════════════
//  STYLE 0: RETRO FUTURISTIC
// ══════════════════════════════════════════════════════════════
function drawRetro(){
  ctx.fillStyle='#020210';ctx.fillRect(0,0,W,H);
  const hz=H*.44,sp=(T*.00025)%1;
  ctx.strokeStyle='rgba(0,240,210,.22)';ctx.lineWidth=1;
  for(let i=0;i<=24;i++){const p=((i/24)+sp)%1,y=hz+(H-hz)*Math.pow(p,2.2),s=(y-hz)/(H-hz);ctx.beginPath();ctx.moveTo(W*.5-s*W*.95,y);ctx.lineTo(W*.5+s*W*.95,y);ctx.stroke();}
  for(let i=0;i<=22;i++){const gx=(i/22)*W;ctx.beginPath();ctx.moveTo(W/2+(gx-W/2)*.04,hz);ctx.lineTo(gx,H);ctx.stroke();}
  const hg=ctx.createLinearGradient(0,hz-40,0,hz+40);hg.addColorStop(0,'transparent');hg.addColorStop(.5,'rgba(255,0,180,.44)');hg.addColorStop(1,'transparent');ctx.fillStyle=hg;ctx.fillRect(0,hz-40,W,80);
  const sky=ctx.createLinearGradient(0,0,0,hz);sky.addColorStop(0,'rgba(1,3,22,1)');sky.addColorStop(1,'rgba(0,0,10,0)');ctx.fillStyle=sky;ctx.fillRect(0,0,W,hz);
  for(let i=0;i<90;i++){const sx=(i*397.3+60)%W,sy=(i*211.7+20)%(hz*.85);ctx.fillStyle=`rgba(180,240,255,${.3+.5*Math.abs(Math.sin(T*.0008+i))})`;ctx.fillRect(sx,sy,1,1);}
  const shapes=[{cx:W*.18,cy:H*.22,sz:55,sp:.5,ph:0},{cx:W*.82,cy:H*.18,sz:40,sp:.7,ph:1.8},{cx:W*.65,cy:H*.34,sz:28,sp:1.1,ph:3.2},{cx:W*.1,cy:H*.38,sz:45,sp:.35,ph:4.5}];
  shapes.forEach(({cx,cy,sz,sp,ph})=>{const a=T*.001*sp+ph,co=Math.cos(a),si=Math.sin(a);const p3=[[0,sz,0],[0,-sz,0],[sz,0,0],[-sz,0,0],[0,0,sz],[0,0,-sz]];const p2=p3.map(([x,y,z])=>{const rx=x*co-z*si,rz=x*si+z*co,sc=260/(260+rz);return[cx+rx*sc,cy+y*sc];});ctx.strokeStyle=`rgba(0,255,220,${.35+.2*Math.sin(a)})`;ctx.lineWidth=1;[[0,2],[0,3],[0,4],[0,5],[1,2],[1,3],[1,4],[1,5],[2,4],[4,3],[3,5],[5,2]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(p2[a][0],p2[a][1]);ctx.lineTo(p2[b][0],p2[b][1]);ctx.stroke();});});
  ctx.fillStyle='rgba(0,0,0,.12)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
}

// ══════════════════════════════════════════════════════════════
//  STYLE 1: MOUNTAIN LANDSCAPE
// ══════════════════════════════════════════════════════════════
let mtProfiles=[];
function initMountains(){
  mtProfiles=[];
  for(let range=0;range<5;range++){
    const pts=new Float32Array(200),sd=range*13.7;
    for(let i=0;i<200;i++){const x=i/199;let h=Math.sin(x*Math.PI*3.1+sd)*.4+Math.sin(x*Math.PI*6.7+sd*2.3)*.22+Math.sin(x*Math.PI*14.2+sd*1.1)*.12+Math.sin(x*Math.PI*28.5+sd*3.7)*.06+Math.sin(x*Math.PI*1.8+sd*.4)*.55;pts[i]=Math.max(0,h);}
    let mx=0;for(const v of pts)mx=Math.max(mx,v);for(let i=0;i<200;i++)pts[i]/=mx;mtProfiles.push(pts);
  }
}
function drawMountainLandscape(){
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#05101e');sky.addColorStop(.32,'#0d1f40');sky.addColorStop(.58,'#7a3010');sky.addColorStop(.76,'#c05c18');sky.addColorStop(.88,'#e07825');sky.addColorStop(1,'#f09030');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  for(let i=0;i<130;i++){const sx=(i*397.3+22)%W,sy=(i*211.7+8)%(H*.5);ctx.fillStyle=`rgba(210,225,255,${.1+.52*Math.abs(Math.sin(T*.0008+i*.7))})`;ctx.fillRect(sx,sy,1,1);}
  const mg=ctx.createRadialGradient(W*.2,H*.16,0,W*.2,H*.16,40);mg.addColorStop(0,'rgba(255,248,215,1)');mg.addColorStop(.6,'rgba(235,218,175,.8)');mg.addColorStop(1,'transparent');ctx.fillStyle=mg;ctx.fillRect(W*.2-42,H*.16-42,84,84);
  [{baseY:.66,heightFrac:.28,color:'#131e30'},{baseY:.70,heightFrac:.23,color:'#0f1828'},{baseY:.74,heightFrac:.26,color:'#0c1420'},{baseY:.79,heightFrac:.22,color:'#090f18'},{baseY:.845,heightFrac:.30,color:'#060b12'}].forEach(({baseY,heightFrac,color},li)=>{
    const bY=H*baseY,mH=H*heightFrac,pts=mtProfiles[li];
    ctx.beginPath();ctx.moveTo(-2,bY);for(let i=0;i<pts.length;i++)ctx.lineTo((i/(pts.length-1))*(W+4)-2,bY-pts[i]*mH);ctx.lineTo(W+2,bY);ctx.lineTo(W+2,H+2);ctx.lineTo(-2,H+2);ctx.closePath();ctx.fillStyle=color;ctx.fill();
    if(li<2){ctx.beginPath();ctx.moveTo(-2,bY);for(let i=0;i<pts.length;i++){const py=bY-pts[i]*mH,snow=Math.max(0,(pts[i]-.76))*mH*1.5;ctx.lineTo((i/(pts.length-1))*(W+4)-2,py-snow*.35);}ctx.lineTo(W+2,bY);ctx.lineTo(W+2,H+2);ctx.lineTo(-2,H+2);ctx.closePath();ctx.fillStyle=`rgba(210,225,240,${.05+li*.04})`;ctx.fill();}
  });
  const mist=ctx.createLinearGradient(0,H*.82,0,H);mist.addColorStop(0,'transparent');mist.addColorStop(.4,'rgba(130,90,50,.07)');mist.addColorStop(1,'rgba(70,50,30,.18)');ctx.fillStyle=mist;ctx.fillRect(0,H*.82,W,H*.18);
  for(let i=0;i<4;i++){const cx=((i*W*.3+T*.012)%(W+200))-100,cy=H*(.28+i*.06),r=70+i*28,cg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);cg.addColorStop(0,'rgba(170,110,55,.05)');cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.fillRect(cx-r,cy-r,r*2,r*2);}
}

// ══════════════════════════════════════════════════════════════
//  STYLE 2: CYBERPUNK NEO
// ══════════════════════════════════════════════════════════════
let cyberBuildings=[];
function initCyberBuildings(){cyberBuildings=[{xf:.00,wf:.085,hf:.26},{xf:.07,wf:.05,hf:.44},{xf:.11,wf:.065,hf:.32},{xf:.165,wf:.10,hf:.55},{xf:.255,wf:.05,hf:.36},{xf:.295,wf:.085,hf:.50},{xf:.37,wf:.12,hf:.66},{xf:.48,wf:.07,hf:.40},{xf:.54,wf:.10,hf:.56},{xf:.63,wf:.05,hf:.34},{xf:.67,wf:.085,hf:.48},{xf:.745,wf:.07,hf:.60},{xf:.81,wf:.06,hf:.38},{xf:.86,wf:.08,hf:.28},{xf:.93,wf:.07,hf:.45}];}
function wHash(wx,wy){const n=Math.sin(wx*127.1+wy*311.7)*43758.5453;return n-Math.floor(n);}
function drawCyberpunk(){
  ctx.fillStyle='#000a18';ctx.fillRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W*.5,H*.8,0,W*.5,H*.8,W*.65);bg.addColorStop(0,'rgba(0,140,255,.04)');bg.addColorStop(1,'transparent');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const gY=H*.88;
  cyberBuildings.forEach(b=>{
    const bx=b.xf*W,bw=b.wf*W,bh=b.hf*H*.65,by=gY;ctx.fillStyle='rgba(2,10,24,1)';ctx.fillRect(bx,by-bh,bw,bh);
    const wS=Math.max(7,bw*.18),hS=10;
    for(let wy=by-bh+8;wy<by-8;wy+=hS)for(let wx=bx+5;wx<bx+bw-5;wx+=wS){const h=wHash(wx,wy);if(h>.35||Math.sin(T*.0014*(1+h*4)+h*100)>.94){ctx.fillStyle=`hsla(${h>.7?195:215},100%,70%,${(Math.sin(T*.0014*(1+h*4)+h*100)>.94?1:.32+h*.3)*.44})`;ctx.fillRect(wx,wy,4,5);}}
    if(wHash(bx,bh)>.45){ctx.strokeStyle=wHash(bx,bh)>.75?'rgba(255,10,140,.38)':'rgba(0,180,255,.28)';ctx.lineWidth=1.5;ctx.strokeRect(bx,by-bh,bw,bh);}
    ctx.strokeStyle='rgba(255,20,120,.3)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+bw*.5,by-bh);ctx.lineTo(bx+bw*.5,by-bh-10+4*Math.sin(T*.003+bx));ctx.stroke();
  });
  ctx.fillStyle='rgba(0,4,14,1)';ctx.fillRect(0,gY,W,H-gY);
  cyberBuildings.forEach(b=>{const rg=ctx.createLinearGradient(0,gY,0,H);rg.addColorStop(0,'rgba(0,170,255,.035)');rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(b.xf*W,gY,b.wf*W,H-gY);});
  for(let i=0;i<80;i++){const rx=((i*397+T*.15)%W),ry=((i*277+T*.45)%(H*.88)),len=12+i%42,hue=i%3===0?310:i%3===1?185:202,rg=ctx.createLinearGradient(rx,ry,rx,ry+len);rg.addColorStop(0,'transparent');rg.addColorStop(.5,`hsla(${hue},100%,72%,.62)`);rg.addColorStop(1,'transparent');ctx.fillStyle=rg;ctx.fillRect(rx,ry,1.5,len);}
  [[W*.12,H*.28],[W*.88,H*.22],[W*.5,H*.12],[W*.72,H*.35],[W*.25,H*.55]].forEach(([hx,hy],i)=>{const r=22+10*Math.sin(T*.0022+i),p=.22+.28*Math.sin(T*.003+i*1.5);ctx.strokeStyle=`rgba(0,210,255,${p})`;ctx.lineWidth=1.5;ctx.beginPath();for(let v=0;v<6;v++){const a=(v/6)*Math.PI*2+T*.0008;v===0?ctx.moveTo(hx+Math.cos(a)*r,hy+Math.sin(a)*r):ctx.lineTo(hx+Math.cos(a)*r,hy+Math.sin(a)*r);}ctx.closePath();ctx.stroke();ctx.strokeStyle=`rgba(255,10,150,${p*.55})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(hx,hy,r*.46+4*Math.sin(T*.004+i),0,Math.PI*2);ctx.stroke();});

function jewelFill(ci, alpha){
  const [r,g,b]=JEWEL[ci%JEWEL.length];
  return `rgba(${r},${g},${b},${alpha})`;
}

function drawAnnularSeg(cx,cy,r0,r1,a0,a1){
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(a0)*r0, cy+Math.sin(a0)*r0);
  ctx.arc(cx,cy,r1,a0,a1);
  ctx.arc(cx,cy,r0,a1,a0,true);
  ctx.closePath();
}

function drawRoseWindow(cx,cy,R){
  const rot=T*.00022;
  const fl=windowFlash;

  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R*.997,0,Math.PI*2); ctx.clip();

  // ── Outer ring: 24 segments
  for(let i=0;i<24;i++){
    const a0=(i/24)*Math.PI*2+rot, a1=a0+Math.PI*2/24*.92;
    const beat=.55+.22*Math.sin(T*.0008*(1+i*.28)+i*1.9);
    drawAnnularSeg(cx,cy,R*.81,R*.997,a0,a1);
    ctx.fillStyle=jewelFill(i, beat+fl*.45); ctx.fill();
  }

  // ── Middle ring: 12 segments (offset by half step)
  for(let i=0;i<12;i++){
    const a0=(i/12)*Math.PI*2+rot+Math.PI/24, a1=a0+Math.PI*2/12*.88;
    const beat=.5+.25*Math.sin(T*.0009*(1+i*.35)+i*2.3+1);
    drawAnnularSeg(cx,cy,R*.52,R*.81,a0,a1);
    ctx.fillStyle=jewelFill(i+3, beat+fl*.4); ctx.fill();
  }

  // ── Inner ring: 12 alternating large/small segments
  for(let i=0;i<12;i++){
    const a0=(i/12)*Math.PI*2+rot, a1=a0+Math.PI*2/12*(i%2===0?.82:.65);
    const beat=.48+.28*Math.sin(T*.001*(1+i*.3)+i*1.5+2);
    drawAnnularSeg(cx,cy,R*.22,R*.52,a0,a1);
    ctx.fillStyle=jewelFill(i%2===0?i/2:i+1, beat+fl*.35); ctx.fill();
  }

  // ── Centre boss: three concentric circles
  const cb0=.5+.2*Math.sin(T*.0012);
  ctx.beginPath();ctx.arc(cx,cy,R*.22,0,Math.PI*2);
  ctx.fillStyle=jewelFill(2, cb0+fl*.35); ctx.fill();

  ctx.beginPath();ctx.arc(cx,cy,R*.12,0,Math.PI*2);
  ctx.fillStyle=jewelFill(5, cb0+fl*.4); ctx.fill();

  ctx.beginPath();ctx.arc(cx,cy,R*.055,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,220,${.55+fl*.4})`; ctx.fill();

  ctx.restore(); // end circle clip

  // ── Lead came lines drawn outside clip (sit on top)
  ctx.strokeStyle='#07050a';

  // Concentric ring arcs
  [R*.997, R*.81, R*.52, R*.22, R*.12].forEach(r=>{
    ctx.lineWidth = r>R*.5 ? 3 : 2;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  });

  // Outer-ring dividing spokes
  ctx.lineWidth=2;
  for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2+rot;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*R*.81,cy+Math.sin(a)*R*.81);ctx.lineTo(cx+Math.cos(a)*R*.997,cy+Math.sin(a)*R*.997);ctx.stroke();}

  // Middle-ring spokes
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2+rot+Math.PI/24;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*R*.52,cy+Math.sin(a)*R*.52);ctx.lineTo(cx+Math.cos(a)*R*.81,cy+Math.sin(a)*R*.81);ctx.stroke();}

  // Inner-ring spokes
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2+rot;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*R*.22,cy+Math.sin(a)*R*.22);ctx.lineTo(cx+Math.cos(a)*R*.52,cy+Math.sin(a)*R*.52);ctx.stroke();}

  // Heavy outer border
  ctx.lineWidth=5; ctx.beginPath(); ctx.arc(cx,cy,R*.997,0,Math.PI*2); ctx.stroke();
}

function drawLancet(cx,cy,hw,h){
  const ty=cy-h/2, by=cy+h/2, archCy=ty+hw;

  // Clip to pointed-arch shape
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx-hw,by); ctx.lineTo(cx-hw,archCy);
  ctx.quadraticCurveTo(cx-hw,ty, cx,ty);
  ctx.quadraticCurveTo(cx+hw,ty, cx+hw,archCy);
  ctx.lineTo(cx+hw,by); ctx.closePath();
  ctx.clip();

  // Fill panels top-to-bottom
  const nBands=7;
  for(let i=0;i<nBands;i++){
    const y0=ty+(by-ty)*i/nBands, bh=(by-ty)/nBands;
    const beat=.45+.28*Math.sin(T*.001*(1+i*.4)+i*1.6+cx*.001);
    ctx.fillStyle=jewelFill(i, beat+windowFlash*.35);
    ctx.fillRect(cx-hw,y0,hw*2,bh);
  }
  // Vertical divider down centre
  ctx.strokeStyle='#07050a'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,archCy+4); ctx.lineTo(cx,by); ctx.stroke();
  // Horizontal lead lines
  for(let i=1;i<nBands;i++){
    const y=ty+(by-ty)*i/nBands;
    ctx.beginPath(); ctx.moveTo(cx-hw,y); ctx.lineTo(cx+hw,y); ctx.stroke();
  }
  // Trefoil at apex — three small circles
  const tr=hw*.36;
  for(let k=0;k<3;k++){
    const ta=(k/3)*Math.PI*2-Math.PI/2;
    ctx.beginPath(); ctx.arc(cx+Math.cos(ta)*tr*.55,archCy-hw*.3+Math.sin(ta)*tr*.55,tr,0,Math.PI*2);
    ctx.fillStyle=jewelFill(k+3,.6+windowFlash*.3); ctx.fill();
    ctx.strokeStyle='#07050a'; ctx.lineWidth=2; ctx.stroke();
  }

  ctx.restore();

  // Lancet outline
  ctx.beginPath();
  ctx.moveTo(cx-hw,by); ctx.lineTo(cx-hw,archCy);
  ctx.quadraticCurveTo(cx-hw,ty, cx,ty);
  ctx.quadraticCurveTo(cx+hw,ty, cx+hw,archCy);
  ctx.lineTo(cx+hw,by);
  ctx.strokeStyle='#07050a'; ctx.lineWidth=4; ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-hw,by);ctx.lineTo(cx+hw,by);ctx.stroke();
}

function drawManuscriptBorder(){
  // Outer stone margin
  const m=12;
  ctx.fillStyle='#07050c';
  ctx.fillRect(0,0,W,m);ctx.fillRect(0,H-m,W,m);
  ctx.fillRect(0,m,m,H-m*2);ctx.fillRect(W-m,m,m,H-m*2);

  // Double gold line
  ctx.strokeStyle='rgba(190,140,18,.58)'; ctx.lineWidth=1.5;
  ctx.strokeRect(m+4,m+4,W-m*2-8,H-m*2-8);
  ctx.strokeStyle='rgba(190,140,18,.25)'; ctx.lineWidth=1;
  ctx.strokeRect(m+8,m+8,W-m*2-16,H-m*2-16);

  // Corner rosettes
  const corners=[[m+6,m+6],[W-m-6,m+6],[m+6,H-m-6],[W-m-6,H-m-6]];
  corners.forEach(([rcx,rcy])=>{
    ctx.beginPath();ctx.arc(rcx,rcy,9,0,Math.PI*2);
    ctx.fillStyle='rgba(175,125,15,.55)';ctx.fill();
    ctx.strokeStyle='rgba(10,8,14,.9)';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.arc(rcx+Math.cos(a)*9,rcy+Math.sin(a)*9,3,0,Math.PI*2);ctx.fillStyle='rgba(195,145,20,.45)';ctx.fill();}
  });

  // Mid-edge jewel accents (small coloured squares like manuscript miniatures)
  const edgeDots=[[W*.25,m+6,'h'],[W*.5,m+6,'h'],[W*.75,m+6,'h'],[W*.25,H-m-6,'h'],[W*.5,H-m-6,'h'],[W*.75,H-m-6,'h'],[m+6,H*.33,'v'],[m+6,H*.5,'v'],[m+6,H*.67,'v'],[W-m-6,H*.33,'v'],[W-m-6,H*.5,'v'],[W-m-6,H*.67,'v']];
  edgeDots.forEach(([ex,ey],ei)=>{
    ctx.fillStyle=jewelFill(ei,.55);
    ctx.fillRect(ex-3.5,ey-3.5,7,7);
    ctx.strokeStyle='rgba(10,8,14,.8)';ctx.lineWidth=1.5;ctx.strokeRect(ex-3.5,ey-3.5,7,7);
  });
}

function drawMedieval(){
  ctx.fillStyle='#07050c'; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H*.45, R=Math.min(W,H)*.365;

  // Warm backlight glow emanating from window
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.7);
  bg.addColorStop(0,`rgba(255,218,120,${.12+windowFlash*.1})`);
  bg.addColorStop(.55,`rgba(200,150,40,${.04+windowFlash*.05})`);
  bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Side lancet windows
  const lancetH=R*1.55, lancetHW=R*.24;
  drawLancet(cx-R*1.3, cy+R*.05, lancetHW, lancetH);
  drawLancet(cx+R*1.3, cy+R*.05, lancetHW, lancetH);

  // Rose window (the hero)
  drawRoseWindow(cx, cy, R);

  // Illuminated manuscript frame
  drawManuscriptBorder();

  // Light-ray flash on note hits
  if(windowFlash>.04){
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2+T*.0004;
      const rg=ctx.createLinearGradient(cx,cy,cx+Math.cos(a)*R*1.5,cy+Math.sin(a)*R*1.5);
      rg.addColorStop(0,`rgba(255,240,180,${windowFlash*.09})`);
      rg.addColorStop(1,'transparent');
      ctx.fillStyle=rg;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R*1.5,a-Math.PI/20,a+Math.PI/20);
      ctx.closePath();
      ctx.fill();
    }
  }
}

  [{x:W*.14,y:H*.28,r:110,c:'#ff7070',ph:0},{x:W*.86,y:H*.22,r:95,c:'#5bc8e0',ph:1.3},{x:W*.5,y:H*.72,r:140,c:'#96e0c0',ph:2.6},{x:W*.28,y:H*.78,r:85,c:'#ffd700',ph:.9},{x:W*.72,y:H*.68,r:78,c:'#ff9eb0',ph:2.1},{x:W*.5,y:H*.25,r:65,c:'#b8f0a0',ph:3.5}].forEach(b=>{

}

function drawVaporwave(){
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#050010');bg.addColorStop(.35,'#38004e');bg.addColorStop(.65,'#7b0fa0');bg.addColorStop(1,'#ff6ec7');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  const sx2=W*.5,sy2=H*.38,sr=82;const sg=ctx.createLinearGradient(0,sy2-sr,0,sy2+sr);sg.addColorStop(0,'#ff71ce');sg.addColorStop(.5,'#ff8500');sg.addColorStop(1,'#ff0080');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx2,sy2,sr,0,Math.PI*2);ctx.fill();for(let i=0;i<7;i++){ctx.fillStyle='#050010';ctx.fillRect(sx2-sr,sy2-sr*.15+i*sr*.3,sr*2,sr*.13);}
  const fY=H*.52,sO=(T*.045)%80;for(let row=0;row<14;row++){const t0=row/14,t1=(row+1)/14,y0=fY+Math.pow(t0,2.2)*(H-fY),y1=fY+Math.pow(t1,2.2)*(H-fY);for(let col=-10;col<10;col++){const s0=Math.pow(t0,2.2)*.18+.004,s1=Math.pow(t1,2.2)*.18+.004;const x0l=W*.5+(col*80-sO)*s0*10,x0r=W*.5+((col+1)*80-sO)*s0*10,x1l=W*.5+(col*80-sO)*s1*10,x1r=W*.5+((col+1)*80-sO)*s1*10;const light=(Math.floor(col+row+Math.floor(sO/80))%2===0);ctx.beginPath();ctx.moveTo(x0l,y0);ctx.lineTo(x0r,y0);ctx.lineTo(x1r,y1);ctx.lineTo(x1l,y1);ctx.closePath();ctx.fillStyle=light?'rgba(255,80,200,.38)':'rgba(18,0,40,.48)';ctx.fill();}}
  const hg=ctx.createLinearGradient(0,fY-35,0,fY+35);hg.addColorStop(0,'transparent');hg.addColorStop(.5,'rgba(255,90,200,.55)');hg.addColorStop(1,'transparent');ctx.fillStyle=hg;ctx.fillRect(0,fY-35,W,70);ctx.strokeStyle='rgba(255,90,200,.45)';ctx.lineWidth=1;for(let i=-8;i<=8;i++){ctx.beginPath();ctx.moveTo(W*.5+i*W*.065,fY);ctx.lineTo(W*.5+i*W*.75,H);ctx.stroke();}

// ══════════════════════════════════════════════════════════════
//  STYLE 6: JOY DIVISION
// ══════════════════════════════════════════════════════════════
const JD_ROWS=56,JD_COLS=180;
let jdBuf=[],jdScrollAcc=0,jdSeed=0;

function jdNewRow(seed){
  const row=new Float32Array(JD_COLS);
  for(let c=0;c<JD_COLS;c++){const x=c/JD_COLS;row[c]=Math.max(0,Math.abs(Math.sin(x*Math.PI*4.2+seed*1.7))*.03+Math.sin(x*Math.PI*9.1+seed*2.3)*.015);}
  return row;
}
function initJD(){jdBuf=[];jdSeed=0;for(let r=0;r<JD_ROWS;r++)jdBuf.push(jdNewRow(r*1.4));}
function jdUpdate(dt){
  jdScrollAcc+=dt;
  while(jdScrollAcc>110){jdScrollAcc-=110;jdSeed++;jdBuf.shift();jdBuf.push(jdNewRow(jdSeed*1.4));for(const row of jdBuf)for(let c=0;c<JD_COLS;c++)row[c]*=.985;}
}
function jdAddPeak(xNorm,vel,note){
  const noteScale=Math.max(0.15,(note-36)/60),peakAmt=noteScale*vel*3.0,spread=28+noteScale*18;
  for(let r=0;r<Math.min(5,jdBuf.length);r++){
    const idx=jdBuf.length-1-r,strength=peakAmt*(1-r*.2);
    for(let c=0;c<JD_COLS;c++){const dist=(c/JD_COLS)-xNorm;jdBuf[idx][c]=Math.min(3.5,jdBuf[idx][c]+strength*Math.exp(-dist*dist*spread));}
  }
}
function drawJoyDivision(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const topY=H*.05,botY=H*.95,mX=W*.065,dW=W*.87,n=jdBuf.length;
  for(let r=0;r<n;r++){
    const t=r/(n-1),y=topY+t*(botY-topY);
    const nextY=r<n-1?topY+((r+1)/(n-1))*(botY-topY):botY+(botY-topY)/n*1.5;
    const maxAmp=1+Math.pow(t,2.8)*160;
    const row=jdBuf[r];
    const pts=new Array(JD_COLS+1);for(let c=0;c<=JD_COLS;c++)pts[c]=[mX+(c/JD_COLS)*dW,y-row[Math.min(c,JD_COLS-1)]*maxAmp];
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(const[px,py]of pts)ctx.lineTo(px,py);ctx.lineTo(mX+dW,nextY);ctx.lineTo(mX,nextY);ctx.closePath();ctx.fillStyle='#000';ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(const[px,py]of pts)ctx.lineTo(px,py);ctx.strokeStyle=`rgba(255,255,255,${.18+t*.78})`;ctx.lineWidth=.6+t*1.1;ctx.stroke();
  }
}

//  PULSE + PARTICLE + AMBIENT
// ══════════════════════════════════════════════════════════════
function drawPulse(p){
  const{x,y,r,life:a,style:s,hue}=p;
  if(s===0){ctx.strokeStyle=`rgba(0,255,210,${a})`;ctx.lineWidth=2;ctx.shadowColor='rgba(0,255,210,.5)';ctx.shadowBlur=12;ctx.beginPath();for(let i=0;i<6;i++){const ag=(i/6)*Math.PI*2-Math.PI/6;i===0?ctx.moveTo(x+Math.cos(ag)*r,y+Math.sin(ag)*r):ctx.lineTo(x+Math.cos(ag)*r,y+Math.sin(ag)*r);}ctx.closePath();ctx.stroke();ctx.shadowBlur=0;}
  else if(s===1){for(let i=0;i<6;i++){const ag=(i/6)*Math.PI*2;ctx.beginPath();ctx.ellipse(x+Math.cos(ag)*r*.55,y+Math.sin(ag)*r*.55,r*.42,r*.18,ag,0,Math.PI*2);ctx.fillStyle=`hsla(${28+i*20},85%,62%,${a*.7})`;ctx.fill();}}
  else if(s===2){for(let ring=0;ring<3;ring++){ctx.beginPath();ctx.arc(x,y,r*(1-ring*.26),0,Math.PI*2);ctx.strokeStyle=`rgba(${ring%2?255:0},${ring%2?10:200},${ring%2?140:255},${a*(1-ring*.28)})`;ctx.lineWidth=2-ring*.5;ctx.stroke();}ctx.beginPath();ctx.moveTo(x,y-r);ctx.lineTo(x+r*.38,y);ctx.lineTo(x,y+r);ctx.lineTo(x-r*.38,y);ctx.closePath();ctx.strokeStyle=`rgba(255,10,140,${a*.6})`;ctx.lineWidth=1.5;ctx.stroke();}
  else if(s===3){
    // Coloured light ring expanding through the glass
    const h=hue||60;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${h},80%,72%,${a*.55})`;ctx.lineWidth=4+p.vel*8;ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,r*.52,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${(h+40)%360},80%,85%,${a*.3})`;ctx.lineWidth=2;ctx.stroke();
  }
  else if(s===4){ctx.beginPath();for(let i=0;i<16;i++){const ag=(i/16)*Math.PI*2-Math.PI/2,rad=i%2===0?r:r*.42;i===0?ctx.moveTo(x+Math.cos(ag)*rad,y+Math.sin(ag)*rad):ctx.lineTo(x+Math.cos(ag)*rad,y+Math.sin(ag)*rad);}ctx.closePath();ctx.fillStyle=`rgba(255,225,50,${a*.85})`;ctx.fill();ctx.strokeStyle=`rgba(20,20,20,${a})`;ctx.lineWidth=3;ctx.stroke();}
  else if(s===5){ctx.fillStyle=`rgba(255,100,200,${a*.28})`;ctx.fillRect(x-r,y-r*.3,r*2,r*.6);ctx.strokeStyle=`rgba(255,100,200,${a})`;ctx.lineWidth=1.5;ctx.strokeRect(x-r,y-r,r*2,r*2);}
}

function drawParticle(p){
  const{x,y,life,size,rot,style:s}=p;const a=life*.82;
  if(s===0){ctx.beginPath();ctx.arc(x,y,size*.5,0,Math.PI*2);ctx.fillStyle=`rgba(0,255,220,${a})`;ctx.shadowColor='rgba(0,255,210,.4)';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;}
  else if(s===1){ctx.save();ctx.translate(x,y);ctx.rotate(rot+life*.6);ctx.beginPath();ctx.ellipse(0,0,size,size*.38,0,0,Math.PI*2);ctx.fillStyle=`rgba(220,178,60,${a})`;ctx.fill();ctx.restore();}
  else if(s===2){ctx.fillStyle=`rgba(255,10,150,${a})`;ctx.fillRect(x-size*.2,y-size*.2,size*.4,size*.4);ctx.fillStyle=`rgba(0,200,255,${a*.6})`;ctx.fillRect(x-size*.1,y-size*.4,size*.2,size*.8);}
  else if(s===3){
    // Jewel-coloured sparkle
    const ci=Math.floor(rot*6)%6;const[r,g,b]=JEWEL[ci];
    ctx.beginPath();ctx.arc(x,y,size*.5,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${a})`;ctx.fill();
  }
  else if(s===4){ctx.beginPath();ctx.arc(x,y,size*.62,0,Math.PI*2);ctx.fillStyle=`hsla(${rot*200%360},90%,62%,${a})`;ctx.fill();ctx.strokeStyle=`rgba(20,20,20,${a*.8})`;ctx.lineWidth=2;ctx.stroke();}
  else{ctx.save();ctx.translate(x,y);ctx.rotate(rot+T*.001);ctx.fillStyle=`rgba(255,100,200,${a*.72})`;ctx.fillRect(-size*.4,-size*.4,size*.8,size*.8);ctx.restore();}
}

function drawAmbient(p){
  const a=p.life*.55,s=p.s;
  if(s===0){ctx.fillStyle=`rgba(0,240,210,${a*.62})`;ctx.fillRect(p.x,p.y,p.size,p.size);}
  else if(s===1){ctx.beginPath();ctx.arc(p.x,p.y,p.size*.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,220,110,${a*.42})`;ctx.fill();}
  else if(s===3){
    // Golden dust mote floating upward through the window light
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,210,80,${a*.45})`;ctx.fill();
  }
  else if(s===5){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);ctx.fillStyle=`rgba(255,100,200,${a*.4})`;ctx.fillRect(-p.size*.4,-p.size*.4,p.size*.8,p.size*.8);ctx.restore();}
}

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════
function loop(ts){
  const dt=ts-prevT;prevT=T=ts;

  if(!paused&&ts-styleStart>STYLE_DURATION)nextStyle();
  if(!paused)document.getElementById('prog-fill').style.width=(Math.min((ts-styleStart)/STYLE_DURATION,1)*100)+'%';

  windowFlash*=.93;  // decay each frame
  jdUpdate(dt);

  ctx.save();
  switch(currentStyle){
    case 0:drawRetro();break;
    case 1:drawMountainLandscape();break;
    case 2:drawCyberpunk();break;
    case 3:drawMedieval();break;
    case 4:drawCartoon();break;
    case 5:drawVaporwave();break;
    default:drawJoyDivision();
  }
  ctx.restore();

  spawnAmbient();
  ambients=ambients.filter(p=>p.life>0);ambients.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.0025;drawAmbient(p);});if(ambients.length>160)ambients=ambients.slice(-160);
  pulses=pulses.filter(p=>p.life>0);pulses.forEach(p=>{p.r+=(p.maxR-p.r)*.09;p.life-=.022;drawPulse(p);});
  particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.98;p.life-=.018;drawParticle(p);});if(particles.length>400)particles=particles.slice(-400);

  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════════
const keyMap={a:60,s:62,d:64,f:65,g:67,h:69,j:71,k:72,l:74};
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(e.key===' '){e.preventDefault();nextStyle();return;}
  const note=keyMap[e.key.toLowerCase()];
  if(note!==undefined){initAudio();const vel=75+Math.floor(Math.random()*45);playNote(note,vel);triggerVisual(note,vel);document.getElementById('note-bar').textContent=`${note} kbd`;}
});
canvas.addEventListener('pointerdown',()=>{
  initAudio();const note=48+Math.floor(Math.random()*25),vel=70+Math.floor(Math.random()*50);
  playNote(note,vel);triggerVisual(note,vel);
});

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
resize();
document.getElementById('prog-fill').style.backgroundColor=ACCENTS[0];
document.getElementById('midi-dot').style.color=ACCENTS[0];
initMIDI();
requestAnimationFrame(loop);
</script>
