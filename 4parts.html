<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOKE Collaborative Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
            letter-spacing: 2px;
        }
        
        /* Main area */
        .main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        #canvas {
            max-width: 90vmin;
            max-height: 80vh;
        }
        
        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .control-btn.connected {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
        }
        
        /* Legend */
        .legend {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .legend-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .legend-item {
            margin-bottom: 20px;
        }
        
        .legend-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-label {
            font-size: 14px;
            font-weight: 600;
        }
        
        .legend-pads {
            font-size: 11px;
            color: #666;
            margin-left: 30px;
            margin-bottom: 8px;
        }
        
        .bank-selector {
            margin-left: 30px;
            display: flex;
            gap: 6px;
        }
        
        .bank-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        
        .bank-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .bank-btn.active {
            border-width: 2px;
            transform: scale(1.1);
        }
        
        .bank-btn.drums.active {
            background: #ff6b6b;
            border-color: #ff6b6b;
        }
        
        .bank-btn.piano.active {
            background: #4ecdc4;
            border-color: #4ecdc4;
        }
        
        .bank-btn.bass.active {
            background: #95e1d3;
            border-color: #95e1d3;
        }
        
        .bank-btn.instrument.active {
            background: #f38181;
            border-color: #f38181;
        }
        
        /* Loading */
        .loading {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">SPOKE COLLABORATIVE</h1>
            <p class="subtitle">4-Section Music Workshop</p>
        </div>
        
        <div class="main-area">
            <canvas id="canvas" width="800" height="800"></canvas>
        </div>
        
        <div class="controls">
            <button class="control-btn" id="connectBtn">Connect MIDI</button>
            <button class="control-btn" id="muteBtn">Mute All</button>
        </div>
    </div>
    
    <!-- Legend -->
    <div class="legend">
        <div class="legend-title">Sections & Sound Banks</div>
        
        <div class="legend-item">
            <div class="legend-header">
                <div class="legend-color" style="background: #ff6b6b;"></div>
                <div class="legend-label">Drums</div>
            </div>
            <div class="legend-pads">Pads 1-7</div>
            <div class="bank-selector">
                <button class="bank-btn drums active" data-section="drums" data-bank="a">A</button>
                <button class="bank-btn drums" data-section="drums" data-bank="b">B</button>
                <button class="bank-btn drums" data-section="drums" data-bank="c">C</button>
            </div>
        </div>
        
        <div class="legend-item">
            <div class="legend-header">
                <div class="legend-color" style="background: #4ecdc4;"></div>
                <div class="legend-label">Piano</div>
            </div>
            <div class="legend-pads">Pads 8-14</div>
            <div class="bank-selector">
                <button class="bank-btn piano active" data-section="piano" data-bank="a">A</button>
                <button class="bank-btn piano" data-section="piano" data-bank="b">B</button>
                <button class="bank-btn piano" data-section="piano" data-bank="c">C</button>
            </div>
        </div>
        
        <div class="legend-item">
            <div class="legend-header">
                <div class="legend-color" style="background: #95e1d3;"></div>
                <div class="legend-label">Bass</div>
            </div>
            <div class="legend-pads">Pads 15-21</div>
            <div class="bank-selector">
                <button class="bank-btn bass active" data-section="bass" data-bank="a">A</button>
                <button class="bank-btn bass" data-section="bass" data-bank="b">B</button>
                <button class="bank-btn bass" data-section="bass" data-bank="c">C</button>
            </div>
        </div>
        
        <div class="legend-item">
            <div class="legend-header">
                <div class="legend-color" style="background: #f38181;"></div>
                <div class="legend-label">Instrument</div>
            </div>
            <div class="legend-pads">Pads 22-27</div>
            <div class="bank-selector">
                <button class="bank-btn instrument active" data-section="instrument" data-bank="a">A</button>
                <button class="bank-btn instrument" data-section="instrument" data-bank="b">B</button>
                <button class="bank-btn instrument" data-section="instrument" data-bank="c">C</button>
            </div>
        </div>
    </div>
    
    <div class="loading" id="loading">Loading samples...</div>

    <script>
        // Configuration
        const CONFIG = {
            username: 'Tom-Vulpes',
            repo: 'SpokeWebMidi',
            branch: 'main'
        };
        
        // SPOKE Notes (27 pads)
        const SPOKE_NOTES = [98, 96, 93, 91, 88, 86, 84, 81, 79, 76, 74, 72, 69, 67, 64, 62, 60, 57, 55, 52, 50, 48, 45, 43, 40, 38, 36];
        
        // Section configuration
        const SECTIONS = {
            drums: {
                name: 'Drums',
                folder: 'drums',
                prefix: 'd',
                color: '#ff6b6b',
                startPad: 0,
                endPad: 6,    // Pads 1-7
                startAngle: -Math.PI / 2,
                endAngle: 0,
                currentBank: 'a'
            },
            piano: {
                name: 'Piano',
                folder: 'piano',
                prefix: 'p',
                color: '#4ecdc4',
                startPad: 7,
                endPad: 13,   // Pads 8-14
                startAngle: 0,
                endAngle: Math.PI / 2,
                currentBank: 'a'
            },
            bass: {
                name: 'Bass',
                folder: 'bass',
                prefix: 'b',
                color: '#95e1d3',
                startPad: 14,
                endPad: 20,   // Pads 15-21
                startAngle: Math.PI / 2,
                endAngle: Math.PI,
                currentBank: 'a'
            },
            instrument: {
                name: 'Instrument',
                folder: 'instrument',
                prefix: 'i',
                color: '#f38181',
                startPad: 21,
                endPad: 26,   // Pads 22-27
                startAngle: Math.PI,
                endAngle: Math.PI * 3 / 2,
                currentBank: 'a'
            }
        };
        
        const SOUND_BANKS = ['a', 'b', 'c'];
        
        // Audio
        let audioContext, masterGain;
        const samples = new Map();
        const activeSources = new Map();
        let midiAccess = null;
        let muted = false;
        
        // Canvas
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        
        // Initialize audio
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.gain.value = 0.8;
                masterGain.connect(audioContext.destination);
            }
        }
        
        // Pad class
        class Pad {
            constructor(index, angle, midiNote, section) {
                this.index = index;
                this.angle = angle;
                this.midiNote = midiNote;
                this.section = section;
                this.sectionData = SECTIONS[section];
                
                const radius = Math.min(width, height) * 0.38;
                this.x = centerX + Math.cos(angle) * radius;
                this.y = centerY + Math.sin(angle) * radius;
                this.size = 25;
                
                this.active = false;
                this.activePulse = 0;
                
                // Sample number within section (1-7, 1-7, 1-7, 1-6)
                this.sampleNumber = index - this.sectionData.startPad + 1;
            }
            
            update() {
                if (this.active) {
                    this.activePulse += 0.15;
                    if (this.activePulse > Math.PI * 2) {
                        this.active = false;
                        this.activePulse = 0;
                    }
                }
            }
            
            draw() {
                // Glow when active
                if (this.active) {
                    const glowSize = this.size + Math.sin(this.activePulse) * 15;
                    const gradient = ctx.createRadialGradient(this.x, this.y, this.size * 0.3, this.x, this.y, glowSize);
                    gradient.addColorStop(0, this.sectionData.color + 'cc');
                    gradient.addColorStop(1, this.sectionData.color + '00');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Main pad
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.active ? this.sectionData.color : '#333';
                ctx.fill();
                ctx.strokeStyle = this.active ? '#fff' : this.sectionData.color;
                ctx.lineWidth = this.active ? 3 : 2;
                ctx.stroke();
                
                // Pad number
                ctx.fillStyle = this.active ? '#000' : '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.index + 1, this.x, this.y);
            }
            
            trigger() {
                this.active = true;
                this.activePulse = 0;
            }
        }
        
        // Create pads
        const pads = [];
        function createPads() {
            const angleStep = (Math.PI * 2) / SPOKE_NOTES.length;
            
            SPOKE_NOTES.forEach((midiNote, index) => {
                const angle = angleStep * index - Math.PI / 2;
                
                // Determine section
                let section = 'drums';
                if (index >= SECTIONS.piano.startPad && index <= SECTIONS.piano.endPad) {
                    section = 'piano';
                } else if (index >= SECTIONS.bass.startPad && index <= SECTIONS.bass.endPad) {
                    section = 'bass';
                } else if (index >= SECTIONS.instrument.startPad && index <= SECTIONS.instrument.endPad) {
                    section = 'instrument';
                }
                
                pads.push(new Pad(index, angle, midiNote, section));
            });
        }
        
        // Draw board
        function drawBoard() {
            // Clear
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);
            
            // Board background
            const boardRadius = Math.min(width, height) * 0.42;
            ctx.beginPath();
            ctx.arc(centerX, centerY, boardRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Section dividers and labels
            Object.values(SECTIONS).forEach(section => {
                // Quarter arc background
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, boardRadius - 5, section.startAngle, section.endAngle);
                ctx.closePath();
                ctx.fillStyle = section.color + '1a';
                ctx.fill();
                
                // Divider line
                const lineX = centerX + Math.cos(section.startAngle) * boardRadius;
                const lineY = centerY + Math.sin(section.startAngle) * boardRadius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(lineX, lineY);
                ctx.strokeStyle = section.color + '66';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Section label
                const labelAngle = (section.startAngle + section.endAngle) / 2;
                const labelRadius = boardRadius * 0.65;
                const labelX = centerX + Math.cos(labelAngle) * labelRadius;
                const labelY = centerY + Math.sin(labelAngle) * labelRadius;
                
                ctx.save();
                ctx.translate(labelX, labelY);
                
                // Rotate text to follow circle
                let textRotation = labelAngle + Math.PI / 2;
                if (labelAngle > Math.PI / 2 && labelAngle < Math.PI * 3 / 2) {
                    textRotation += Math.PI;
                }
                ctx.rotate(textRotation);
                
                ctx.fillStyle = section.color;
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(section.name.toUpperCase(), 0, 0);
                ctx.restore();
            });
            
            // Center circle
            const centerRadius = boardRadius * 0.25;
            ctx.beginPath();
            ctx.arc(centerX, centerY, centerRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0f';
            ctx.fill();
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // SPOKE text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SPOKE', centerX, centerY);
            
            // Draw pads
            pads.forEach(pad => {
                pad.update();
                pad.draw();
            });
        }
        
        // Animation loop
        function animate() {
            drawBoard();
            requestAnimationFrame(animate);
        }
        
        // Load sample
        async function loadSample(pad, bank = null) {
            initAudio();
            
            const section = pad.sectionData;
            const activeBank = bank || section.currentBank;
            const fileName = `${section.prefix}${activeBank}${pad.sampleNumber}`;
            const formats = ['wav', 'mp3'];
            
            // Create sample key: padIndex-bank (e.g., "0-a", "0-b")
            const sampleKey = `${pad.index}-${activeBank}`;
            
            for (const format of formats) {
                const url = `https://raw.githubusercontent.com/${CONFIG.username}/${CONFIG.repo}/${CONFIG.branch}/${section.folder}/${fileName}.${format}`;
                
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    samples.set(sampleKey, audioBuffer);
                    return true;
                } catch (error) {
                    console.error(`Failed ${fileName}.${format}:`, error.message);
                }
            }
            return false;
        }
        
        // Load all samples for all banks
        async function loadAllSamples() {
            const loadingDiv = document.getElementById('loading');
            let loadedCount = 0;
            let totalAttempts = 0;
            
            for (let pad of pads) {
                for (let bank of SOUND_BANKS) {
                    totalAttempts++;
                    if (await loadSample(pad, bank)) {
                        loadedCount++;
                    }
                }
            }
            
            loadingDiv.textContent = `Loaded ${loadedCount}/${totalAttempts} samples`;
            setTimeout(() => loadingDiv.style.display = 'none', 2000);
        }
        
        // Play sample
        function playSample(padIndex, velocity = 127) {
            if (muted) return;
            
            const pad = pads[padIndex];
            const section = pad.sectionData;
            const sampleKey = `${padIndex}-${section.currentBank}`;
            
            if (!samples.has(sampleKey)) return;
            
            initAudio();
            
            if (activeSources.has(padIndex)) {
                try { activeSources.get(padIndex).source.stop(); } catch (e) {}
                activeSources.delete(padIndex);
            }
            
            const source = audioContext.createBufferSource();
            const gainNode = audioContext.createGain();
            
            source.buffer = samples.get(sampleKey);
            gainNode.gain.value = velocity / 127;
            
            source.connect(gainNode);
            gainNode.connect(masterGain);
            source.start(0);
            
            activeSources.set(padIndex, { source, gainNode });
            
            pads[padIndex].trigger();
            
            source.onended = () => {
                if (activeSources.get(padIndex)?.source === source) {
                    activeSources.delete(padIndex);
                }
            };
        }
        
        // MIDI handling
        function handleMIDIMessage(message) {
            const [status, midiNote, velocity] = message.data;
            const command = status & 0xf0;
            
            if (command === 0x90 && velocity > 0) {
                const padIndex = SPOKE_NOTES.indexOf(midiNote);
                if (padIndex !== -1) {
                    playSample(padIndex, velocity);
                }
            }
        }
        
        // Connect MIDI
        async function connectMIDI() {
            try {
                midiAccess = await navigator.requestMIDIAccess();
                const inputs = Array.from(midiAccess.inputs.values());
                
                if (inputs.length === 0) {
                    alert('No MIDI devices found');
                    return;
                }
                
                inputs.forEach(input => input.onmidimessage = handleMIDIMessage);
                
                document.getElementById('connectBtn').textContent = 'MIDI Connected';
                document.getElementById('connectBtn').classList.add('connected');
                
            } catch (error) {
                alert('MIDI Error: ' + error.message);
            }
        }
        
        // Click pads to test
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            pads.forEach((pad) => {
                const dx = x - pad.x;
                const dy = y - pad.y;
                if (Math.sqrt(dx * dx + dy * dy) < pad.size) {
                    playSample(pad.index, 100);
                }
            });
        });
        
        // Mute toggle
        document.getElementById('muteBtn').addEventListener('click', () => {
            muted = !muted;
            document.getElementById('muteBtn').textContent = muted ? 'Unmute All' : 'Mute All';
            
            if (muted) {
                activeSources.forEach(({ source }) => {
                    try { source.stop(); } catch (e) {}
                });
                activeSources.clear();
            }
        });
        
        // Bank selector buttons
        document.querySelectorAll('.bank-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const section = btn.dataset.section;
                const bank = btn.dataset.bank;
                
                // Update section's current bank
                SECTIONS[section].currentBank = bank;
                
                // Update button states for this section
                document.querySelectorAll(`.bank-btn.${section}`).forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
            });
        });
        
        // Initialize
        createPads();
        animate();
        loadAllSamples();
        
        document.getElementById('connectBtn').addEventListener('click', connectMIDI);
        
        if (!navigator.requestMIDIAccess) {
            alert('Web MIDI not supported. Please use Chrome, Edge, or Opera.');
        }
    </script>
</body>
</html>
