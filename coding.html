<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOKE Learn</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c0c;--s1:#131313;--s2:#1a1a1a;--s3:#222;
  --b1:#2a2a2a;--b2:#383838;
  --t1:#e2e2e2;--t2:#888;--t3:#4a4a4a;
  --acc:#f97316;--acc2:#fb923c;
  --grn:#22c55e;--blu:#3b82f6;--red:#ef4444;--ylw:#eab308;--pur:#a855f7;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}

.bar{height:44px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--acc);letter-spacing:3px}
.sep{width:1px;height:18px;background:var(--b2)}
.crumb{font-family:var(--mono);font-size:11px;color:var(--t3)}
.crumb b{color:var(--t2);font-weight:400}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.prog-row{display:flex;align-items:center;gap:7px}
.prog-lbl{font-family:var(--mono);font-size:10px;color:var(--t3)}
.prog-track{width:100px;height:2px;background:var(--b2);border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:1px}
.btn{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 13px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;border-radius:2px;transition:all .12s}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.go{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.go:hover{background:var(--acc2)}
.btn:disabled{opacity:.25;cursor:not-allowed;pointer-events:none}
.midi-pill{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25);color:var(--pur);border-radius:2px}

.main{display:flex;flex:1;overflow:hidden}

.sidebar{width:196px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:0}
.mod-lbl{padding:14px 14px 5px;font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.sb-btn{display:flex;align-items:center;width:100%;padding:8px 14px;background:transparent;border:none;border-left:2px solid transparent;cursor:pointer;gap:9px;transition:all .1s;text-align:left}
.sb-btn:hover{background:var(--s2)}
.sb-btn.active{background:var(--s2);border-left-color:var(--acc)}
.sb-btn.done{border-left-color:var(--grn)}
.sb-n{font-family:var(--mono);font-size:9px;color:var(--t3);min-width:14px}
.sb-btn.active .sb-n{color:var(--acc)}
.sb-btn.done .sb-n{color:var(--grn)}
.sb-t{font-size:12px;color:var(--t2);line-height:1.25}
.sb-btn.active .sb-t{color:var(--t1)}
.tick{width:5px;height:5px;border-radius:50%;background:var(--grn);margin-left:auto;flex-shrink:0}

.content{flex:1;display:flex;overflow:hidden}

.lp{width:38%;min-width:280px;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.lp-body{flex:1;overflow-y:auto;padding:22px 22px 12px}
.lp-body::-webkit-scrollbar{width:0}
.ks{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);border:1px solid var(--b2);padding:2px 7px;border-radius:2px;margin-bottom:9px}
.lp h1{font-size:20px;font-weight:500;color:var(--t1);margin-bottom:4px;line-height:1.2}
.lp .sub{font-size:13px;color:var(--t2);margin-bottom:18px}
.card{background:var(--s2);border:1px solid var(--b1);border-radius:3px;padding:12px 14px;margin:10px 0}
.card-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.card.info .card-lbl{color:var(--blu)}.card.info{border-left:2px solid var(--blu)}
.card.task .card-lbl{color:var(--acc)}.card.task{border-left:2px solid var(--acc)}
.card.win .card-lbl{color:var(--grn)}.card.win{border-left:2px solid var(--grn)}
.card p{font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:5px}
.card p:last-child{margin-bottom:0}
.card p b{color:var(--t1);font-weight:500}
.ic{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--s3);padding:1px 5px;border-radius:2px;white-space:nowrap}
.lp-foot{padding:10px 22px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0}
.lp-foot .btn{flex:1;text-align:center;padding:8px}

.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.tabs{height:38px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0}
.tab{font-family:var(--mono);font-size:10px;letter-spacing:.5px;padding:5px 10px;background:transparent;border:1px solid transparent;color:var(--t3);cursor:pointer;border-radius:2px;transition:all .1s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t1);background:var(--s2);border-color:var(--b1)}
.tab-r{margin-left:auto;display:flex;gap:6px;align-items:center}

.guide-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.guide-top{padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:baseline;gap:10px;flex-shrink:0}
.guide-step{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0}
.guide-msg{font-size:12px;color:var(--t2);flex:1;line-height:1.4}
.guide-msg b{color:var(--t1);font-weight:500}

/* ── STEP EXPLAIN (left panel sync) ── */
.explain-block{margin:0;transition:opacity .2s}
.explain-block + .explain-block{margin-top:10px}
.explain-intro{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:14px}
.explain-intro b{color:var(--t1);font-weight:500}
.explain-intro .ic{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--s3);padding:1px 5px;border-radius:2px}
.step-card{background:var(--s2);border:1px solid var(--b1);border-left:2px solid var(--acc);border-radius:0 3px 3px 0;padding:11px 13px;margin:10px 0;transition:all .25s}
.step-card.dim{opacity:.35;border-left-color:var(--b2)}
.step-card.hi{border-left-color:var(--acc);background:rgba(249,115,22,.06)}
.step-card-n{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--acc);margin-bottom:4px}
.step-card.dim .step-card-n{color:var(--t3)}
.step-card-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:5px;line-height:1.3}
.step-card.dim .step-card-title{color:var(--t3)}
.step-card-body{font-size:12px;color:var(--t2);line-height:1.65}
.step-card-body b{color:var(--t1);font-weight:500}
.step-card-body .ic{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--s3);padding:1px 5px;border-radius:2px}
.step-card-code{font-family:var(--mono);font-size:11px;color:var(--t1);background:var(--s3);border:1px solid var(--b1);padding:7px 10px;border-radius:2px;margin-top:7px;white-space:pre}
.step-card-code .kw{color:#c678dd}.step-card-code .st{color:#98c379}.step-card-code .fn{color:#61afef}.step-card-code .co{color:var(--t3)}

.code-view{flex:1;overflow-y:auto;padding:14px 0;font-family:var(--mono);font-size:12px;line-height:1.9}
.code-view::-webkit-scrollbar{width:3px}
.code-view::-webkit-scrollbar-thumb{background:var(--b2)}

.code-row{display:flex;align-items:baseline;padding:0 16px;min-height:23px}
.ln-num{width:28px;color:var(--t3);flex-shrink:0;text-align:right;margin-right:14px;font-size:10px;user-select:none}
.code-tokens{display:flex;align-items:baseline;flex:1}
.kw{color:#c678dd}.fn{color:#61afef}.st{color:#98c379}.co{color:var(--t3);font-style:italic}.nm{color:#e06c75}.nu{color:#d19a66}.op{color:var(--t2)}.pl{color:var(--t1)}
.ctx{opacity:.5}

.type-row{display:flex;align-items:baseline;padding:0 16px;background:rgba(249,115,22,.06);border-left:2px solid var(--acc);margin:1px 0}
.type-row .ln-num{color:var(--acc)}
.type-prefix{font-family:var(--mono);font-size:12px;color:var(--t3);white-space:pre;flex-shrink:0;line-height:1.9}
.type-input{font-family:var(--mono);font-size:12px;color:var(--t1);background:transparent;border:none;outline:none;flex:1;caret-color:var(--acc);line-height:1.9;min-width:160px}
.type-input::placeholder{color:var(--t3);font-style:italic;font-size:11px}
.type-input.wrong{animation:shake .28s ease}
@keyframes shake{0%,100%{transform:translateX(0)}33%{transform:translateX(-5px)}66%{transform:translateX(5px)}}

.done-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 20px;text-align:center}
.done-icon{font-family:var(--mono);font-size:28px;color:var(--grn)}
.done-title{font-size:15px;font-weight:500;color:var(--t1)}
.done-sub{font-size:12px;color:var(--t2)}

.free-ed{flex:1;width:100%;padding:16px;background:transparent;color:var(--t1);border:none;outline:none;font-family:var(--mono);font-size:12px;line-height:1.9;resize:none;tab-size:4;display:none}
.free-ed::placeholder{color:var(--t3)}

.hint-bar{position:absolute;bottom:130px;left:0;right:0;background:rgba(234,179,8,.07);border-top:1px solid rgba(234,179,8,.18);padding:7px 16px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--ylw);transform:translateY(100%);transition:transform .18s ease;pointer-events:none}
.hint-bar.show{transform:translateY(0);pointer-events:all}
.hint-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(234,179,8,.45);flex-shrink:0}

.con{height:130px;background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
.con-head{padding:5px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;flex-shrink:0}
.con-dot{width:5px;height:5px;border-radius:50%;background:var(--t3)}
.con-dot.live{background:var(--grn);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.con-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
.con-body{flex:1;padding:7px 14px;overflow-y:auto;font-family:var(--mono);font-size:11px;line-height:1.6}
.con-body::-webkit-scrollbar{width:0}
.cl{margin-bottom:1px}
.cl.err{color:#f87171}.cl.ok{color:#4ade80}.cl.info{color:#60a5fa}.cl.warn{color:#fbbf24}.cl.dim{color:var(--t3)}

/* ── SETUP LESSON ── */
.setup-wrap{flex:1;overflow-y:auto;padding:20px 20px 32px;display:flex;flex-direction:column;gap:6px}
.setup-wrap::-webkit-scrollbar{width:0}
.setup-phase{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:14px 0 4px}
.setup-phase:first-child{padding-top:0}
.setup-step{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:3px;border:1px solid var(--b1);background:var(--s2);transition:all .2s;cursor:default}
.setup-step.done-step{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04)}
.setup-step.active-step{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.06)}
.setup-step.locked{opacity:.35}
.step-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;transition:all .2s}
.setup-step.done-step .step-check{border-color:var(--grn);background:rgba(34,197,94,.15);color:var(--grn)}
.setup-step.active-step .step-check{border-color:var(--acc);animation:pulse-ring 1.5s infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.4)}50%{box-shadow:0 0 0 4px rgba(249,115,22,0)}}
.step-body{flex:1;min-width:0}
.step-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px;line-height:1.3}
.setup-step.locked .step-title{color:var(--t3)}
.step-desc{font-size:12px;color:var(--t2);line-height:1.55;margin-bottom:6px}
.step-desc code{font-family:var(--mono);font-size:11px;color:var(--acc);background:var(--s3);padding:1px 5px;border-radius:2px}
.step-action{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border:1px solid var(--acc);color:var(--acc);background:transparent;border-radius:2px;cursor:pointer;transition:all .12s}
.step-action:hover{background:var(--acc);color:#fff}
.step-action.done-action{border-color:var(--grn);color:var(--grn);cursor:default}
.step-action.done-action:hover{background:transparent;color:var(--grn)}
.setup-done{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px;gap:10px;margin-top:10px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:3px}
.setup-done-icon{font-family:var(--mono);font-size:24px;color:var(--grn)}
.setup-done-title{font-size:14px;font-weight:500;color:var(--t1)}
.setup-done-sub{font-size:12px;color:var(--t2)}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">SPOKE</div>
  <div class="sep"></div>
  <div class="crumb" id="crumb">Module 1 / <b>Lesson 1</b></div>
  <div class="bar-r">
    <div class="prog-row">
      <div class="prog-lbl" id="progLbl">0 / 14</div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="sep"></div>
    <span class="midi-pill" id="midiPill" style="display:none">MIDI</span>
    <button class="btn" id="connectBtn" onclick="connectBoard()">Connect Board</button>
    <button class="btn go" id="runBtn" onclick="saveAndRun()" disabled>Save &amp; Run</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="lp">
      <div class="lp-body" id="lpBody"></div>
      <div class="lp-foot">
        <button class="btn" id="prevBtn" onclick="prevLesson()" disabled>← Back</button>
        <button class="btn go" id="nextBtn" onclick="completeNext()">Done — Next →</button>
      </div>
    </div>
    <div class="cp" id="cp">
      <div class="tabs">
        <button class="tab on" id="tabGuide" onclick="setTab('guide')">Exercise</button>
        <button class="tab" id="tabFree" onclick="setTab('free')">Free Edit</button>
        <div class="tab-r">
          <button class="btn" onclick="toggleHint()" style="font-size:9px;padding:4px 9px">Hint</button>
          <button class="btn" onclick="resetExercise()" style="font-size:9px;padding:4px 9px">Reset</button>
        </div>
      </div>
      <div class="guide-wrap" id="guideWrap">
        <div class="guide-top">
          <div class="guide-step" id="stepLbl">—</div>
          <div class="guide-msg" id="stepMsg">Load a lesson to begin</div>
        </div>
        <div class="code-view" id="codeView"></div>
      </div>
      <!-- SETUP LESSON PANEL (lesson 0 only) -->
      <div class="setup-wrap" id="setupWrap" style="display:none"></div>
      <textarea class="free-ed" id="freeEd" spellcheck="false" placeholder="# Write your own code here"></textarea>
      <div class="hint-bar" id="hintBar">
        <span class="hint-lbl">Hint</span>
        <span id="hintText">—</span>
      </div>
      <div class="con">
        <div class="con-head">
          <div class="con-dot" id="conDot"></div>
          <div class="con-lbl">Output</div>
          <button class="btn" style="margin-left:auto;font-size:9px;padding:3px 8px" onclick="clearCon()">Clear</button>
        </div>
        <div class="con-body" id="conBody">
          <div class="cl info">Connect your SPOKE board to begin</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── LESSON DATA ───────────────────────────────────────────────────────────────
// line types:
//   skip:true  → shown as dimmed context, never typed
//   prompt     → student types this line; answer is checked (prefix shown before cursor)
const L = {
1:{mod:'Module 1 — First Steps',title:'Light Up a Pad',sub:'Touch Pad 1 — see a green light',ks:'KS3 · Sequence · Selection',midi:false,
intro:`<p class="explain-intro">Your first program does something you can see and feel: touch <b>Pad 1</b> and a light turns green. Lift your finger and it turns off.</p>
<p class="explain-intro">To make that happen, you need to give the computer <b>exact instructions in the right order</b>. One wrong letter and it fails. That is not a flaw — that precision is what makes programming powerful.</p>
<p class="explain-intro">The greyed-out lines on the right are setup code (already done for you). You will write the <b>logic</b> — the part that decides what happens. Each card below explains the line you are about to type, and updates as you go.</p>`,
info:[
  {t:'task',l:'Your goal',p:'Type each line when prompted on the right. When all lines are written, click <b>Save & Run</b>, then touch Pad 1 with your finger.'},
],
challenge:{t:'task',l:'Challenge',p:'Change the colour to red — swap <ic>(0, 255, 0)</ic> for <ic>(255, 0, 0)</ic> in Free Edit.'},
lines:[
  {ln:1,skip:true,toks:[{c:'kw',v:'import'},{c:'pl',v:' board, touchio, neopixel'}]},
  {ln:2,skip:true,toks:[]},
  {ln:3,skip:true,toks:[{c:'pl',v:'touch1 = touchio.TouchIn(board.GP1)'}]},
  {ln:4,skip:true,toks:[{c:'pl',v:'pixels = neopixel.NeoPixel(board.GP0, 27, brightness=0.08, auto_write=False)'}]},
  {ln:5,skip:true,toks:[]},
  {ln:6,
   prompt:'Start the infinite loop — type: while True:',
   hint:'while True:',pfx:'',ans:'while True:',
   explain:{
     n:'Line 6 — the forever loop',
     title:'while True: — instructions that repeat forever',
     body:'<ic>while True:</ic> is a loop. Python runs everything inside it, then goes back to the top and runs it again — over and over, hundreds of times a second, until you unplug the board.<br><br><ic>True</ic> is always true, so the loop never stops. Without this, your code would run once and quit — nothing would respond to your touch.<br><br>Every interactive program starts this way.',
     code:'<span class="kw">while</span> True:  <span class="co"># keep doing this forever</span>'
   },
   toks:[{c:'kw',v:'while'},{c:'pl',v:' True:'}]},
  {ln:7,
   prompt:'Ask if Pad 1 is being touched — type: if touch1.value:  (4 spaces first)',
   hint:'    if touch1.value:',pfx:'    ',ans:'if touch1.value:',
   explain:{
     n:'Line 7 — asking a yes/no question',
     title:'if touch1.value: — is someone touching it?',
     body:'<ic>touch1.value</ic> is always either <b>True</b> (finger on pad) or <b>False</b> (nothing there). There is no "maybe".<br><br>The word <ic>if</ic> means: only run the next line if this is True. If it is False, skip it entirely and jump to <ic>else</ic>.<br><br>The <b>4 spaces</b> before <ic>if</ic> are critical — they tell Python this line lives <b>inside</b> the while loop. Python uses indentation (spaces) to understand structure, not brackets like some other languages.',
     code:'<span class="kw">while</span> True:
<span class="kw">    if</span> touch1.value:  <span class="co"># 4 spaces = inside the loop</span>'
   },
   toks:[{c:'pl',v:'    '},{c:'kw',v:'if'},{c:'pl',v:' touch1.value:'}]},
  {ln:8,
   prompt:'Set the light to green — type: pixels[0] = (0, 255, 0)  (8 spaces first)',
   hint:'        pixels[0] = (0, 255, 0)',pfx:'        ',ans:'pixels[0] = (0, 255, 0)',alt:['pixels[0]=(0,255,0)'],
   explain:{
     n:'Line 8 — choosing a colour',
     title:'pixels[0] = (0, 255, 0) — the green light',
     body:'<ic>pixels[0]</ic> is the first light. Computers start counting from <b>zero</b>, not one — so pad 1 is pixel 0, pad 2 is pixel 1, and so on.<br><br>Colours are written as <b>(Red, Green, Blue)</b>, each from 0 (none) to 255 (full). <ic>(0, 255, 0)</ic> means: no red, maximum green, no blue — a bright green.<br><br>The <b>8 spaces</b> mean this line is inside the <ic>if</ic>, which is inside the <ic>while</ic> — two levels deep.',
     code:'<span class="pl">        pixels[0] = (</span><span class="nu">0</span><span class="pl">, </span><span class="nu">255</span><span class="pl">, </span><span class="nu">0</span><span class="pl">)  </span><span class="co"># R=0 G=255 B=0</span>'
   },
   toks:[{c:'pl',v:'        pixels[0] = (0, 255, 0)'}]},
  {ln:9,
   prompt:'Handle when nothing is touching — type: else:  (4 spaces first)',

intro:`<p class="explain-intro">Last lesson you controlled one pad. Now you will control three — and here is the key insight: <b>the code for each pad is identical in structure</b>. Only the pad number and colour change.</p>
<p class="explain-intro">The computer runs your code from top to bottom, continuously. It checks Pad 1, then Pad 2, then Pad 3, then starts again. This is called <b>sequencing</b> — instructions executed in order. It happens so fast (hundreds of times per second) that touching two pads at once lights both simultaneously.</p>
<p class="explain-intro">As you write the three blocks, notice the pattern repeating. Recognising repetition is one of the most important skills in programming — in Lesson 5 you will learn how to eliminate it with loops.</p>`,

3:{mod:'Module 2 — Logic',title:'IF, ELIF, ELSE',sub:'One pad, one light, three possible colours',ks:'KS3 · Selection',midi:false,
intro:`<p class="explain-intro">So far every pad has had its own light. This lesson changes the structure: <b>one light, three possible colours</b> — which one you get depends on which pad you touch.</p>
<p class="explain-intro">You already know <ic>if</ic> and <ic>else</ic>. Now you will meet <b>elif</b> (short for "else if") — a way to check a second condition only if the first was false, then a third if the second was false, and so on.</p>
<p class="explain-intro">This is still selection — the program is choosing one path from several options. The important rule: Python checks the conditions <b>in order</b> and runs <b>only the first true one</b>. The rest are skipped entirely.</p>`,

],

     body:'Colours on a screen or LED work differently from paint. With light: Red + Green = Yellow. Green + Blue = Cyan. Red + Blue = Magenta. All three together = White.<br><br><ic>(255, 255, 0)</ic> means maximum red, maximum green, zero blue. The two channels add together to make yellow.<br><br>Guess: what would <ic>(255, 128, 0)</ic> look like? Full red, half green, no blue — that is orange.',
     code:'<span class="pl">        pixels[0] = (</span><span class="nu">255</span><span class="pl">, </span><span class="nu">255</span><span class="pl">, </span><span class="nu">0</span><span class="pl">)  </span><span class="co"># max red + max green = yellow</span>'
   },
   toks:[{c:'pl',v:'        pixels[0] = (255, 255, 0)'}]},
  {ln:8,
   prompt:'"Else if" Pad 2 is touched. 4 spaces, then: elif t2.value:',
   hint:'    elif t2.value:',pfx:'    ',ans:'elif t2.value:',
   explain:{
     n:'Line 8 — the second condition',
     title:'elif — short for "else if"',
     body:'<ic>elif</ic> is only evaluated if the previous <ic>if</ic> was False. So this line only runs if Pad 1 was <b>not</b> being touched.<br><br>Python reads down the chain in order: if → elif → elif → else. It stops at the first true condition and runs that block. It never goes back and runs another.<br><br>This is important: if you used separate <ic>if</ic> statements instead of <ic>elif</ic>, all of them would be checked and potentially all of them could change the light colour in the same loop cycle.',
     code:'<span class="kw">    elif</span> t2.value:  <span class="co"># only reached if t1.value was False</span>'
   },
   toks:[{c:'pl',v:'    '},{c:'kw',v:'elif'},{c:'pl',v:' t2.value:'}]},
  {ln:9,
   prompt:'Cyan for Pad 2. 8 spaces, then: pixels[0] = (0, 255, 255)',
   hint:'        pixels[0] = (0, 255, 255)',pfx:'        ',ans:'pixels[0] = (0, 255, 255)',alt:['pixels[0]=(0,255,255)'],
   explain:{
     n:'Line 9',
     title:'Cyan = green + blue',
     body:'<ic>(0, 255, 255)</ic> is zero red, full green, full blue — a bright cyan. Note we are setting <ic>pixels[0]</ic> again — the same light as before. That is fine because only one branch will ever run, so there is no conflict.',
     code:'<span class="pl">        pixels[0] = (</span><span class="nu">0</span><span class="pl">, </span><span class="nu">255</span><span class="pl">, </span><span class="nu">255</span><span class="pl">)  </span><span class="co"># cyan</span>'
   },
   toks:[{c:'pl',v:'        pixels[0] = (0, 255, 255)'}]},
  {ln:10,
   prompt:'"Else if" Pad 3. 4 spaces, then: elif t3.value:',
   hint:'    elif t3.value:',pfx:'    ',ans:'elif t3.value:',
   explain:{
     n:'Line 10 — chaining conditions',
     title:'A third elif — conditions checked in sequence',
     body:'You can have as many <ic>elif</ic> blocks as you need. Python checks them strictly in order, top to bottom. This third <ic>elif</ic> is only reached if Pad 1 <b>and</b> Pad 2 are both not being touched.<br><br>The chain works like a series of filters. Each one only gets a turn if all the ones above it were False.',
     code:'<span class="kw">    elif</span> t3.value:  <span class="co"># only reached if t1 and t2 were both False</span>'
   },
   toks:[{c:'pl',v:'    '},{c:'kw',v:'elif'},{c:'pl',v:' t3.value:'}]},
  {ln:11,
   prompt:'Magenta for Pad 3. 8 spaces, then: pixels[0] = (255, 0, 255)',
   hint:'        pixels[0] = (255, 0, 255)',pfx:'        ',ans:'pixels[0] = (255, 0, 255)',alt:['pixels[0]=(255,0,255)'],
   explain:{
     n:'Line 11',
     title:'Magenta = red + blue',
     body:'<ic>(255, 0, 255)</ic> is full red, zero green, full blue — a vivid magenta/purple. You are getting the complete picture of how light colour mixing works: the three primaries of light are Red, Green, and Blue — not red, yellow, and blue like paint.',
     code:'<span class="pl">        pixels[0] = (</span><span class="nu">255</span><span class="pl">, </span><span class="nu">0</span><span class="pl">, </span><span class="nu">255</span><span class="pl">)  </span><span class="co"># magenta</span>'
   },
   toks:[{c:'pl',v:'        pixels[0] = (255, 0, 255)'}]},
  {ln:12,
   prompt:'The final fallback — no pad touched. 4 spaces, then: else:',
   hint:'    else:',pfx:'    ',ans:'else:',
   explain:{
     n:'Lines 12–14 — the final fallback',
     title:'else: — the guaranteed catch-all',
     body:'<ic>else:</ic> has no condition of its own. It runs if and only if <b>every</b> condition above it was False — meaning no pad is being touched right now.<br><br>This is the guarantee of the <ic>if / elif / else</ic> structure: <b>exactly one branch always runs</b>. Never zero, never two. The light always has a defined state. This reliability is what makes selection useful in real programs.',
     code:'<span class="kw">    else</span>:  <span class="co"># all conditions above were False</span>\n        pixels[0] = (<span class="nu">0</span>, <span class="nu">0</span>, <span class="nu">0</span>)  <span class="co"># off</span>\n    pixels<span class="fn">.show</span>()'

],
free:`import board,touchio,neopixel\nt1=touchio.TouchIn(board.GP1);t2=touchio.TouchIn(board.GP2);t3=touchio.TouchIn(board.GP3)\npixels=neopixel.NeoPixel(board.GP0,27,brightness=0.08,auto_write=False)\nwhile True:\n    if t1.value:      pixels[0]=(255,255,0)\n    elif t2.value:    pixels[0]=(0,255,255)\n    elif t3.value:    pixels[0]=(255,0,255)\n    else:             pixels[0]=(0,0,0)\n    pixels.show()`},

4:{mod:'Module 2 — Logic',title:'Variables',sub:'Count how many times you touch a pad',ks:'KS3 · Variables',midi:false,
intro:`<p class="explain-intro">So far your programs have reacted to what is happening <b>right now</b>. Variables let you <b>remember things over time</b> — like how many times a pad has been pressed.</p>
<p class="explain-intro">A variable is a named storage box. You choose the name, you put a value in, and you can read or change it at any point in the program. This is one of the most fundamental ideas in all of programming.</p>`,
info:[
  {t:'info',l:'How variables work',p:'<ic>count = 0</ic> creates a box called "count" and puts 0 inside. <ic>count = count + 1</ic> reads what is in the box, adds 1, and puts the new value back in. The variable has been updated.'},
  {t:'info',l:'Why we need was_touched',p:'The while loop runs hundreds of times per second. Without a flag, a single half-second press would add 50+ to the count. <ic>was_touched</ic> records "we already counted this press" so it only counts once per touch, no matter how long you hold it.'},
],
challenge:{t:'task',l:'Challenge',p:'Make Pad 2 reset the count to 0. You need to set up <ic>t2</ic> and add <ic>if t2.value: count = 0</ic> inside the loop.'},

5:{mod:'Module 3 — Loops',title:'FOR Loops',sub:'Light all 27 pads without repeating yourself',ks:'KS3 · Iteration',midi:false,
intro:`<p class="explain-intro">SPOKE has 27 pads. If you wanted to light them all up, you could write <ic>pixels[0]=(0,255,0)</ic>, then <ic>pixels[1]=(0,255,0)</ic>... 27 times. That would be 27 lines that are nearly identical — bad code.</p>
<p class="explain-intro">A <b>for loop</b> solves this. It repeats a block of code a set number of times, with a counter variable that changes each time. Three lines replace 27.</p>`,
info:[
  {t:'info',l:'How a for loop works',p:'<ic>for i in range(27):</ic> runs the indented block 27 times. First time: i=0. Second time: i=1. Third time: i=2. Last time: i=26. The variable <ic>i</ic> is automatically updated each time — you just use it.'},
  {t:'info',l:'range() controls the count',p:'<ic>range(27)</ic> gives 0–26 (27 numbers). <ic>range(0,27,2)</ic> gives every other one: 0,2,4... <ic>range(27,0,-1)</ic> counts backwards from 26 down to 1. You are in control.'},
],
challenge:{t:'task',l:'Challenge',p:'Try changing <ic>range(27)</ic> to <ic>range(0,27,3)</ic> in Free Edit. What pattern do you get? Then try <ic>range(27,0,-1)</ic>.'},

6:{mod:'Module 3 — Loops',title:'Patterns with Loops',sub:'Use i to vary colours across pads',ks:'KS3 · Iteration',midi:false,
intro:`<p class="explain-intro">The loop counter <ic>i</ic> changes every iteration — that means you can use it to make <b>different things happen at different positions</b>. Instead of every pad being the same colour, you can create patterns.</p>
<p class="explain-intro">The key tool is the <b>modulo operator</b> <ic>%</ic> — it gives the remainder after division. This turns out to be incredibly useful for creating repeating patterns.</p>`,
info:[
  {t:'info',l:'What % (modulo) does',p:'<ic>i % 2</ic> divides i by 2 and gives the <b>remainder</b>. When i=0: 0÷2=0 remainder 0. When i=1: 1÷2=0 remainder 1. When i=2: 2÷2=1 remainder 0. The result alternates: 0,1,0,1,0,1... — perfect for "every other one".'},
  {t:'info',l:'if inside for',p:'You can put an <ic>if</ic> statement inside a <ic>for</ic> loop. Every time the loop runs, the condition is checked with the current value of <ic>i</ic>. So the colour you pick can depend on the position.'},
],
challenge:{t:'task',l:'Challenge',p:'Change the pattern: make every 3rd pad white using <ic>if i % 3 == 0</ic>. You will need three branches: 0, 1, and 2. What colours will you pick for each?'},

// Track setup state
let setupChecked = {} // id -> true
let setupConnectDone = false // file opened
let setupSerialDone  = false // serial connected
let hwStep = 0        // hello world typing step

function isSetupLesson(){ return cur === 0 }

function renderSetup(){
  const wrap = document.getElementById('setupWrap')
  wrap.innerHTML = ''

  // Check if all real steps done, show hello world exercise or full done state
  const allConnected = setupConnectDone && setupSerialDone

  SETUP_STEPS.forEach((phase, pi) => {
    const ph = document.createElement('div')
    ph.className = 'setup-phase'
    ph.textContent = phase.phase
    wrap.appendChild(ph)

    phase.steps.forEach(s => {
      const div = document.createElement('div')
      const isDone = isStepDone(s)
      const isActive = isStepActive(s, pi, phase)
      const isLocked = !isDone && !isActive

      div.className = 'setup-step' + (isDone?' done-step':'') + (isActive&&!isDone?' active-step':'') + (isLocked?' locked':'')
      div.id = 'ss-'+s.id

      const chk = document.createElement('div')
      chk.className = 'step-check'
      chk.textContent = isDone ? '✓' : ''

      const body = document.createElement('div')
      body.className = 'step-body'

      const title = document.createElement('div')
      title.className = 'step-title'
      title.textContent = s.title
      body.appendChild(title)

      const desc = document.createElement('div')
      desc.className = 'step-desc'
      desc.innerHTML = s.desc
      body.appendChild(desc)

      if(s.note){
        const note = document.createElement('div')
        note.style.cssText = 'font-size:11px;color:var(--t3);font-style:italic;margin-top:4px'
        note.textContent = s.note
        body.appendChild(note)
      }

      if(s.action && !isDone && isActive){
        const btn = document.createElement('button')
        btn.className = 'step-action'
        btn.textContent = s.action
        btn.onclick = ()=>{ window[s.actionFn]() }
        body.appendChild(btn)
      }

      if(s.check && isActive && !isDone){
        const btn = document.createElement('button')
        btn.className = 'step-action'
        btn.textContent = s.check + ' ✓'
        btn.onclick = ()=>{ setupChecked[s.id]=true; renderSetup(); checkSetupProgress() }
        body.appendChild(btn)
      }

      if(isDone && s.action){
        const tag = document.createElement('span')
        tag.className = 'step-action done-action'
        tag.textContent = 'Done ✓'
        body.appendChild(tag)
      }
      if(isDone && s.check){
        const tag = document.createElement('span')
        tag.className = 'step-action done-action'
        tag.textContent = s.check + ' ✓'
        body.appendChild(tag)
      }

      div.appendChild(chk)
      div.appendChild(body)
      wrap.appendChild(div)
    })
  })

  // Hello World exercise area
  if(allConnected){
    renderHWExercise(wrap)
  }

  // Final all-done
  if(allConnected && isSetupFullyDone()){
    const done = document.createElement('div')
    done.className = 'setup-done'
    done.innerHTML = `<div class="setup-done-icon">✓</div>
      <div class="setup-done-title">You're set up!</div>
      <div class="setup-done-sub">Click <b>Done — Next →</b> to start Lesson 1.</div>`
    wrap.appendChild(done)
  }
}

function isStepDone(s){
  if(s.id === 'openfile') return setupConnectDone
  if(s.id === 'serial')   return setupSerialDone
  if(s.id === 'helloworld') return hwStep >= HW_LINES.length
  if(s.id === 'interface') return setupChecked['interface']
  return !!setupChecked[s.id]
}

function isStepActive(s, pi, phase){
  // Check if all previous phases' steps are done
  for(let i=0;i<pi;i++){
    for(const ps of SETUP_STEPS[i].steps){
      if(!isStepDone(ps)) return false
    }
  }
  // Check all previous steps in same phase are done
  const idx = phase.steps.indexOf(s)
  for(let i=0;i<idx;i++){
    if(!isStepDone(phase.steps[i])) return false
  }
  return true
}

function isSetupFullyDone(){
  return SETUP_STEPS.every(ph => ph.steps.every(s => isStepDone(s)))
}

function checkSetupProgress(){
  if(isSetupFullyDone()) done.add(0)
  updateProg()
}

function renderHWExercise(wrap){
  const section = document.createElement('div')
  section.id = 'hw-section'

  const label = document.createElement('div')
  label.className = 'setup-phase'

  HW_LINES.forEach((row, ri) => {

      const ln = document.createElement('span');ln.className='ln-num';ln.textContent=row.ln

      const inp = document.createElement('input');inp.type='text';inp.className='type-input';inp.id='hw-inp'
      inp.placeholder='type here, press Enter…'
      inp.setAttribute('spellcheck','false');inp.setAttribute('autocomplete','off')
      inp.setAttribute('autocorrect','off');inp.setAttribute('autocapitalize','off')
      inp.onkeydown = hwKey
      r.appendChild(ln);r.appendChild(pre);r.appendChild(inp)
      codeBox.appendChild(r)

      // prompt bar
      const pb = document.createElement('div')
      pb.style.cssText = 'padding:8px 14px;background:var(--s1);border-top:1px solid var(--b1);display:flex;align-items:baseline;gap:10px'
      const sl = document.createElement('span');sl.style.cssText='font-family:var(--mono);font-size:9px;color:var(--t3);flex-shrink:0';sl.textContent=`Line ${ri+1}/${HW_LINES.length}`
      const sm = document.createElement('span');sm.style.cssText='font-size:12px;color:var(--t2)';sm.id='hw-msg';sm.textContent=row.prompt
      const hint = document.createElement('button');hint.className='btn';hint.style.cssText='font-size:9px;padding:3px 8px;margin-left:auto';hint.textContent='Hint'
      hint.onclick=()=>{sm.textContent=row.hint;sm.style.color='var(--ylw)'}
      pb.appendChild(sl);pb.appendChild(sm);pb.appendChild(hint)
      codeBox.appendChild(pb)
    }
    // future lines: not shown
  })

  if(hwStep >= HW_LINES.length){
    const done = document.createElement('div')
    done.style.cssText = 'padding:12px 14px;background:rgba(34,197,94,.06);border-top:1px solid rgba(34,197,94,.15);display:flex;align-items:center;gap:10px'
    done.innerHTML = `<span style="color:var(--grn);font-family:var(--mono);font-size:11px">✓ All lines written — click Save & Run to test it</span>`
    codeBox.appendChild(done)
    checkSetupProgress()
  }

  section.appendChild(codeBox)
  wrap.appendChild(section)

  // Focus
  setTimeout(()=>{const i=document.getElementById('hw-inp');if(i)i.focus()},40)
}

function hwKey(e){
  if(e.key==='Enter'){
    e.preventDefault()
    const val = e.target.value
    const row = HW_LINES[hwStep]
    const got = norm(val), exp = norm(row.ans), alts = (row.alt||[]).map(norm)
    if(got===exp||alts.includes(got)){
      hwStep++; renderSetup()
    } else {
      e.target.classList.add('wrong');e.target.style.color='var(--red)'
      const msg = document.getElementById('hw-msg')
      if(msg){const orig=msg.textContent;msg.innerHTML='<span style="color:var(--red)">Not quite — check spelling and brackets</span>';setTimeout(()=>{msg.textContent=orig;msg.style.color=''},2200)}
      setTimeout(()=>{e.target.classList.remove('wrong');e.target.style.color='';e.target.focus()},300)
    }
  } else if(e.key==='Tab'){
    e.preventDefault();const p=e.target.selectionStart
    e.target.value=e.target.value.slice(0,p)+'    '+e.target.value.slice(p)
    e.target.selectionStart=e.target.selectionEnd=p+4
  }
}

// Called by the Connect Board button when in setup lesson
async function doConnectFile(){
  try{
    if(!('showOpenFilePicker' in window)){
      log('Use Chrome or Edge for this feature','err')
      return
    }
    log('Opening code.py…','info')
    const [h] = await window.showOpenFilePicker({types:[{description:'Python',accept:{'text/x-python':['.py']}}]})
    fileHandle = h
    setupConnectDone = true
    log('code.py ready','ok')
    renderSetup()

    // Now serial
    if(!('serial' in navigator)){log('Web Serial not supported — use Chrome','err');return}
    log('Select your CircuitPython serial port…','info')
    serialPort = await navigator.serial.requestPort()
    await serialPort.open({baudRate:115200})
    isConn = true
    setupSerialDone = true
    document.getElementById('connectBtn').textContent = 'Connected ✓'
    document.getElementById('connectBtn').style.color = 'var(--grn)'
    document.getElementById('runBtn').disabled = false
    document.getElementById('conDot').classList.add('live')
    log('Serial connected — Output panel is live','ok')
    log('You should see CircuitPython output here as you run code','dim')
    renderSetup()
    readSerial()
  } catch(e){
    if(e.name!=='AbortError') log('Error: '+e.message,'err')
  }
}

// Sync explain cards to the current typed step
function syncExplain(){
  const l=L[cur]
  if(!l||!l.lines||!l.lines.some(r=>r.explain)) return
  const curr = step < typeable.length ? typeable[step] : null
  const currN = curr&&curr.explain ? curr.explain.n : '__done__'
  const seen=new Set(), order=[]
  l.lines.forEach(r=>{ if(r.explain&&!seen.has(r.explain.n)){seen.add(r.explain.n);order.push(r.explain.n)} })
  const activeIdx = order.indexOf(currN)
  order.forEach((n,i)=>{
    const c=document.getElementById('sc-'+i)
    if(!c) return
    if(i===activeIdx){ c.className='step-card hi'; c.scrollIntoView({behavior:'smooth',block:'nearest'}) }
    else { c.className='step-card dim' }
  })
}

           If it works: that is your first real program running on real hardware.
         </div>`
      : `<div class="done-icon">✓</div><div class="done-title">All lines complete</div><div class="done-sub">Click Save &amp; Run to upload to your board.</div>`
    d.innerHTML=doneMsg
    view.appendChild(d)
    document.getElementById('stepLbl').textContent='Done'
    document.getElementById('stepMsg').textContent= cur===1
      ? 'Click Save & Run, then touch Pad 1 — watch it glow green.'
      : 'Exercise finished. Save & Run or edit in Free Edit.'
    syncExplain()
    view.scrollTop=view.scrollHeight;return
  }

  // typing row
  const curr=typeable[step]
  const tr=document.createElement('div');tr.className='type-row'
  const ln=document.createElement('span');ln.className='ln-num';ln.textContent=curr.ln
  const pre=document.createElement('span');pre.className='type-prefix';pre.textContent=curr.pfx||''
  const inp=document.createElement('input');inp.type='text';inp.className='type-input';inp.id='ti'
  inp.placeholder='type here, press Enter…'
  inp.setAttribute('spellcheck','false');inp.setAttribute('autocomplete','off')
  inp.setAttribute('autocorrect','off');inp.setAttribute('autocapitalize','off')
  inp.onkeydown=handleKey
  tr.appendChild(ln);tr.appendChild(pre);tr.appendChild(inp)
  view.appendChild(tr)

  document.getElementById('stepLbl').textContent=`Line ${step+1} / ${typeable.length}`
  document.getElementById('stepMsg').textContent=curr.prompt||''
  document.getElementById('hintText').textContent=curr.hint||''
  if(hintVis) document.getElementById('hintBar').classList.add('show')
  syncExplain()

  view.scrollTop=view.scrollHeight
  setTimeout(()=>{const i=document.getElementById('ti');if(i)i.focus()},40)
}

function ctxRow(row){
  const div=document.createElement('div');div.className='code-row ctx'
  const ln=document.createElement('span');ln.className='ln-num';ln.textContent=row.ln
  const tok=document.createElement('span');tok.className='code-tokens'
  ;(row.toks||[]).forEach(t=>{const s=document.createElement('span');s.className=t.c;s.textContent=t.v;tok.appendChild(s)})
  div.appendChild(ln);div.appendChild(tok);return div
}

// ── KEY HANDLER ───────────────────────────────────────────────────────────────
function handleKey(e){
  if(e.key==='Enter'){e.preventDefault();checkLine(e.target.value)}
  else if(e.key==='Tab'){e.preventDefault();const p=e.target.selectionStart;e.target.value=e.target.value.slice(0,p)+'    '+e.target.value.slice(p);e.target.selectionStart=e.target.selectionEnd=p+4}
}

function norm(s){return s.trim().replace(/\s+/g,' ')}

function checkLine(val){
  const curr=typeable[step]
  const got=norm(val),exp=norm(curr.ans),alts=(curr.alt||[]).map(norm)
  if(got===exp||alts.includes(got)){
    step++;renderCode()
  } else {
    const inp=document.getElementById('ti')
    if(inp){inp.classList.add('wrong');inp.style.color='var(--red)';setTimeout(()=>{inp.classList.remove('wrong');inp.style.color='';inp.focus()},300)}
    const msg=document.getElementById('stepMsg'),orig=msg.textContent
    msg.innerHTML='<span style="color:var(--red)">Not quite — check spelling, spacing, and brackets</span>'
    setTimeout(()=>msg.textContent=orig,2200)
  }
}

function resetExercise(){step=0;hintVis=false;document.getElementById('hintBar').classList.remove('show');renderCode()}

// ── HINT ──────────────────────────────────────────────────────────────────────
function toggleHint(){hintVis=!hintVis;document.getElementById('hintBar').classList.toggle('show',hintVis)}

// ── TABS ──────────────────────────────────────────────────────────────────────
function setTab(t){
  tab=t
  document.getElementById('tabGuide').classList.toggle('on',t==='guide')
  document.getElementById('tabFree').classList.toggle('on',t==='free')
  document.getElementById('guideWrap').style.display=t==='guide'?'flex':'none'
  document.getElementById('freeEd').style.display=t==='free'?'block':'none'
  if(t==='guide') setTimeout(()=>{const i=document.getElementById('ti');if(i)i.focus()},40)
  if(t==='free') document.getElementById('freeEd').focus()
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function completeNext(){done.add(cur);if(cur<14)loadLesson(cur+1);else{buildSB();updateProg()}}
function prevLesson(){if(cur>0)loadLesson(cur-1)}
function updateProg(){
  const total=15 // lessons 0-14
  const p=(done.size/total)*100
  document.getElementById('progFill').style.width=p+'%'
  document.getElementById('progLbl').textContent=`${done.size} / ${total}`
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
async function saveAndRun(){
  if(!fileHandle){log('Connect your board first','warn');return}
  try{
    let code
    if(isSetupLesson()){
      // Build hello world code from typed lines
      code = HW_LINES.map(r=>(r.pfx||'')+r.toks.map(t=>t.v).join('')).join('\n')
    } else if(tab==='free'){
      code=document.getElementById('freeEd').value
    } else {
      code=buildExCode()
    }
    const w=await fileHandle.createWritable();await w.write(code);await w.close()
    log('Saved — board restarting…','ok')
    if(isSetupLesson()) log('Watch for "Hello from SPOKE!" in the output below','info')
  }catch(e){log('Save error: '+e.message,'err')}
}

function buildExCode(){
  const l=L[cur]
  return l.lines.map(r=>(r.pfx||'')+(r.toks||[]).map(t=>t.v).join('')).join('\n')
}

async function readSerial(){
  try{
    const dec=new TextDecoderStream();serialPort.readable.pipeTo(dec.writable)
    const r=dec.readable.getReader()
    while(true){const{value,done}=await r.read();if(done)break;if(value){const err=value.includes('Traceback')||value.includes('Error:');value.split('\n').forEach(l=>{if(l.trim())log(l.trim(),err?'err':'ok')})}}
  }catch(e){log('Serial disconnected','warn')}
}

function log(m,t='dim'){
  const b=document.getElementById('conBody');const d=document.createElement('div');d.className='cl '+t;d.textContent=m
  b.appendChild(d);b.scrollTop=b.scrollHeight;while(b.children.length>300)b.removeChild(b.firstChild)
}
function clearCon(){document.getElementById('conBody').innerHTML=''}

async function connectBoard(){
  // If in setup lesson, hand off to the setup-specific function
  if(isSetupLesson()){ doConnectFile(); return }
  // Already connected — save and run
  if(isConn){ saveAndRun(); return }
  // Normal connection (re-connecting from a regular lesson)
  try{
    if(!('showOpenFilePicker' in window)){alert('Use Chrome or Edge');return}
    log('Opening code.py…','info')
    const [h]=await window.showOpenFilePicker({types:[{description:'Python',accept:{'text/x-python':['.py']}}]})
    fileHandle=h;log('code.py ready','ok')
    if(!('serial' in navigator)){log('Web Serial not available — use Chrome','err');return}
    log('Select your SPOKE serial port…','info')
    serialPort=await navigator.serial.requestPort()
    await serialPort.open({baudRate:115200})
    isConn=true;setupConnectDone=true;setupSerialDone=true
    document.getElementById('connectBtn').textContent='Connected ✓'
    document.getElementById('connectBtn').style.color='var(--grn)'
    document.getElementById('runBtn').disabled=false
    document.getElementById('conDot').classList.add('live')
    log('Connected — click Save & Run to upload','ok')
    readSerial()
  }catch(e){if(e.name!=='AbortError')log('Error: '+e.message,'err')}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSB();loadLesson(0)
</script>
