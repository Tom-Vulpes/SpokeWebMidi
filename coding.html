<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOKE Learn</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0e0e0e; --s1:#161616; --s2:#1d1d1d; --s3:#252525;
  --b1:#2e2e2e; --b2:#3d3d3d;
  --t1:#ececec; --t2:#a8a8a8; --t3:#717171;
  --acc:#f97316; --acc2:#fb923c;
  --grn:#22c55e; --blu:#60a5fa; --red:#f87171; --ylw:#fbbf24; --pur:#c084fc;
  --mono:'Space Mono',monospace;
  --sans:'DM Sans',sans-serif;
}

body{
  font-family:var(--sans);
  background:var(--bg);color:var(--t1);
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
:focus{outline:none}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:2px}

/* ── TOP BAR ── */
.bar{
  height:50px;background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;
}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--acc);letter-spacing:3px}
.sep{width:1px;height:22px;background:var(--b2)}
.crumb{font-family:var(--mono);font-size:11px;color:var(--t3)}
.crumb b{color:var(--t2);font-weight:400}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-lbl{font-family:var(--mono);font-size:11px;color:var(--t2)}
.prog-track{width:110px;height:3px;background:var(--b2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:2px}
.btn{
  font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:0.5px;text-transform:uppercase;
  padding:8px 16px;border:1px solid var(--b2);
  background:transparent;color:var(--t2);
  cursor:pointer;border-radius:3px;transition:all .12s;
}
.btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(249,115,22,.07)}
.btn.go{background:var(--acc);border-color:var(--acc);color:#0d0d0d;font-weight:700}
.btn.go:hover{background:var(--acc2);border-color:var(--acc2);color:#0d0d0d}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.midi-pill{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;background:rgba(192,132,252,.12);
  border:1px solid rgba(192,132,252,.3);color:var(--pur);border-radius:3px;
}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:210px;background:var(--s1);border-right:1px solid var(--b1);
  overflow-y:auto;flex-shrink:0;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.mod-lbl{
  padding:14px 14px 6px;
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--t3);
}
.sb-btn{
  display:flex;align-items:center;width:100%;
  padding:10px 14px;background:transparent;border:none;
  border-left:3px solid transparent;cursor:pointer;gap:10px;
  transition:background .1s;text-align:left;
}
.sb-btn:hover{background:var(--s2)}
.sb-btn.active{background:var(--s2);border-left-color:var(--acc)}
.sb-btn.done{border-left-color:var(--grn)}
.sb-n{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:16px;flex-shrink:0}
.sb-btn.active .sb-n{color:var(--acc)}
.sb-btn.done .sb-n{color:var(--grn)}
.sb-t{font-size:13px;color:var(--t2);line-height:1.35}
.sb-btn.active .sb-t{color:var(--t1)}
.tick{width:6px;height:6px;border-radius:50%;background:var(--grn);margin-left:auto;flex-shrink:0}

/* ── CONTENT ── */
.content{flex:1;display:flex;overflow:hidden}

/* ── LEFT PANEL ── */
.lp{
  width:42%;min-width:300px;border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
}

/* Static lesson header — always visible */
.lp-header{
  padding:22px 24px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;
}
.ks{
  display:inline-block;font-family:var(--mono);font-size:10px;
  letter-spacing:1px;text-transform:uppercase;color:var(--t3);
  border:1px solid var(--b2);padding:3px 8px;border-radius:3px;margin-bottom:12px;
}
.lp-header h1{font-size:24px;font-weight:500;color:var(--t1);margin-bottom:4px;line-height:1.2}
.lp-header .sub{font-size:15px;color:var(--t2);line-height:1.5}

/* Dynamic explanation area — fills remaining height */
.lp-explain{
  flex:1;overflow-y:auto;padding:20px 24px 16px;
  display:flex;flex-direction:column;gap:14px;
}
.lp-explain::-webkit-scrollbar{width:4px}
.lp-explain::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* The BIG active step explanation */
.explain-active{
  background:var(--s2);border:1px solid var(--b1);
  border-left:4px solid var(--acc);border-radius:0 6px 6px 0;
  padding:18px 20px;
}
.explain-tag{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--acc);margin-bottom:10px;
}
.explain-title{font-size:18px;font-weight:600;color:var(--t1);margin-bottom:12px;line-height:1.3}
.explain-body{font-size:15px;color:var(--t2);line-height:1.8}
.explain-body b{color:var(--t1);font-weight:500}
.explain-code{
  font-family:var(--mono);font-size:13px;color:var(--t1);
  background:var(--s3);border:1px solid var(--b2);
  padding:12px 14px;border-radius:4px;margin-top:14px;
  white-space:pre;line-height:1.8;
}
.explain-code .kw{color:#c678dd}
.explain-code .st{color:#98c379}
.explain-code .fn{color:#61afef}
.explain-code .co{color:var(--t3)}

/* Inline code */
.ic{
  font-family:var(--mono);font-size:13px;color:var(--acc);
  background:var(--s3);padding:2px 7px;border-radius:3px;white-space:nowrap;
}

/* Static cards (info, task, win) — used in setup + non-explain lessons */
.card{
  background:var(--s2);border:1px solid var(--b1);
  border-radius:4px;padding:16px 18px;
}
.card-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;
}
.card.info{border-left:3px solid var(--blu)}.card.info .card-lbl{color:var(--blu)}
.card.task{border-left:3px solid var(--acc)}.card.task .card-lbl{color:var(--acc)}
.card.win{border-left:3px solid var(--grn)}.card.win .card-lbl{color:var(--grn)}
.card p{font-size:14px;color:var(--t2);line-height:1.75;margin-bottom:6px}
.card p:last-child{margin-bottom:0}
.card p b{color:var(--t1);font-weight:500}

/* Intro paragraphs */
.intro-p{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:10px}
.intro-p b{color:var(--t1);font-weight:500}

.lp-foot{padding:14px 24px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0}
.lp-foot .btn{flex:1;text-align:center;padding:10px}

/* ── RIGHT / CODE PANEL ── */
.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

.tabs{
  height:42px;background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;
}
.tab{
  font-family:var(--mono);font-size:11px;letter-spacing:.5px;
  padding:6px 12px;background:transparent;border:1px solid transparent;
  color:var(--t3);cursor:pointer;border-radius:3px;transition:all .1s;
}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t1);background:var(--s2);border-color:var(--b1)}
.tab-r{margin-left:auto;display:flex;gap:7px;align-items:center}

.guide-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── INSTRUCTION BANNER — the most prominent element ── */
.instr-banner{
  padding:16px 20px;background:var(--s1);border-bottom:2px solid var(--b1);
  flex-shrink:0;
}
.instr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.instr-step{
  font-family:var(--mono);font-size:11px;color:var(--t3);
  background:var(--s3);padding:3px 9px;border-radius:12px;
}
.instr-text{font-size:15px;color:var(--t1);line-height:1.5;font-weight:500}
.instr-sub{font-size:13px;color:var(--t2);margin-top:4px;line-height:1.5}

/* ── CODE VIEW ── */
.code-view{
  flex:1;overflow-y:auto;padding:14px 0;
  font-family:var(--mono);font-size:14px;line-height:2.0;
}
.code-view::-webkit-scrollbar{width:4px}
.code-view::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.code-row{display:flex;align-items:baseline;padding:0 20px;min-height:28px}
.ln-num{
  width:32px;color:var(--t3);flex-shrink:0;text-align:right;
  margin-right:18px;font-size:11px;user-select:none;padding-top:2px;
}
.code-tokens{display:flex;align-items:baseline;flex:1;flex-wrap:wrap}
.kw{color:#c678dd}.fn{color:#61afef}.st{color:#98c379}
.co{color:var(--t3);font-style:italic}.pl{color:var(--t1)}
.ctx{opacity:.4}

/* ── TYPING ROW ── */
.type-row{
  display:flex;align-items:baseline;padding:0 20px;
  background:rgba(249,115,22,.08);
  border-left:4px solid var(--acc);margin:2px 0;
}
.type-row .ln-num{color:var(--acc)}
.type-prefix{
  font-family:var(--mono);font-size:14px;color:var(--t3);
  white-space:pre;flex-shrink:0;line-height:2.0;
}
.type-input{
  font-family:var(--mono);font-size:14px;color:var(--t1);
  background:transparent;border:none;outline:none;
  flex:1;caret-color:var(--acc);line-height:2.0;min-width:200px;
}
.type-input::placeholder{color:var(--t3);font-style:italic;font-size:13px}
.type-input.wrong{animation:shake .28s ease}
@keyframes shake{0%,100%{transform:translateX(0)}33%{transform:translateX(-6px)}66%{transform:translateX(6px)}}

/* ── DONE STATE ── */
.done-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:40px 32px;text-align:center;
}
.done-icon{font-family:var(--mono);font-size:36px;color:var(--grn)}
.done-title{font-size:20px;font-weight:500;color:var(--t1)}
.done-sub{font-size:14px;color:var(--t2);line-height:1.9;max-width:340px}
.done-sub b{color:var(--t1);font-weight:500}

/* ── FREE EDITOR ── */
.free-ed{
  flex:1;width:100%;padding:20px;background:transparent;color:var(--t1);
  border:none;outline:none;font-family:var(--mono);font-size:14px;
  line-height:2.0;resize:none;tab-size:4;display:none;
}
.free-ed::placeholder{color:var(--t3)}

/* ── HINT BAR ── */
.hint-bar{
  position:absolute;bottom:132px;left:0;right:0;
  background:rgba(251,191,36,.09);border-top:1px solid rgba(251,191,36,.22);
  padding:10px 20px;display:flex;align-items:center;gap:12px;
  font-family:var(--mono);font-size:13px;color:var(--ylw);
  transform:translateY(100%);transition:transform .18s ease;pointer-events:none;
}
.hint-bar.show{transform:translateY(0);pointer-events:all}
.hint-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(251,191,36,.5);flex-shrink:0}

/* ── CONSOLE ── */
.con{height:132px;background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
.con-head{padding:6px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;flex-shrink:0}
.con-dot{width:7px;height:7px;border-radius:50%;background:var(--t3)}
.con-dot.live{background:var(--grn);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.con-lbl{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3)}
.con-body{flex:1;padding:8px 18px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:1.8}
.con-body::-webkit-scrollbar{width:4px}
.con-body::-webkit-scrollbar-thumb{background:var(--b2)}
.cl{margin-bottom:1px}
.cl.err{color:#fca5a5}.cl.ok{color:#86efac}.cl.info{color:#93c5fd}.cl.warn{color:#fcd34d}.cl.dim{color:var(--t3)}

/* ── SETUP LESSON ── */
.setup-wrap{flex:1;overflow-y:auto;padding:20px 20px 32px;display:flex;flex-direction:column;gap:8px}
.setup-wrap::-webkit-scrollbar{width:4px}
.setup-wrap::-webkit-scrollbar-thumb{background:var(--b2)}
.setup-phase{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);padding:14px 0 6px}
.setup-step{display:flex;align-items:flex-start;gap:14px;padding:14px 14px;border-radius:4px;border:1px solid var(--b1);background:var(--s2);transition:all .2s}
.setup-step.done-step{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.setup-step.active-step{border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.06)}
.setup-step.locked{opacity:.35}
.step-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:12px}
.setup-step.done-step .step-check{border-color:var(--grn);background:rgba(34,197,94,.15);color:var(--grn)}
.setup-step.active-step .step-check{border-color:var(--acc);animation:pulse-ring 1.5s infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.4)}50%{box-shadow:0 0 0 5px rgba(249,115,22,0)}}
.step-body{flex:1;min-width:0}
.step-title{font-size:15px;font-weight:500;color:var(--t1);margin-bottom:4px;line-height:1.4}
.setup-step.locked .step-title{color:var(--t3)}
.step-desc{font-size:14px;color:var(--t2);line-height:1.75;margin-bottom:8px}
.step-desc code{font-family:var(--mono);font-size:13px;color:var(--acc);background:var(--s3);padding:2px 7px;border-radius:3px}
.step-action{
  display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;
  padding:7px 16px;border:1px solid var(--acc);color:var(--acc);
  background:transparent;border-radius:3px;cursor:pointer;transition:all .12s;
}
.step-action:hover{background:var(--acc);color:#0d0d0d}
.step-action.done-action{border-color:var(--grn);color:var(--grn);cursor:default}
.step-action.done-action:hover{background:transparent}
.hw-box{background:var(--s2);border:1px solid var(--b1);border-radius:4px;overflow:hidden;margin-top:4px}
.hw-prompt{padding:10px 18px;background:var(--s1);border-top:1px solid var(--b1);display:flex;align-items:baseline;gap:12px}
.hw-step-lbl{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0}
.hw-step-msg{font-size:14px;color:var(--t2);flex:1;line-height:1.5}
.hw-done{padding:12px 18px;background:rgba(34,197,94,.06);border-top:1px solid rgba(34,197,94,.2);font-family:var(--mono);font-size:12px;color:var(--grn)}
</style>
</head>
<body>
<div class="bar">
  <div class="logo">SPOKE</div>
  <div class="sep"></div>
  <div class="crumb" id="crumb">Getting Started</div>
  <div class="bar-r">
    <div class="prog-row">
      <div class="prog-lbl" id="progLbl">0 / 15</div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="sep"></div>
    <span class="midi-pill" id="midiPill" style="display:none">MIDI</span>
    <button class="btn" id="connectBtn" onclick="connectBoard()">Connect Board</button>
    <button class="btn go" id="runBtn" onclick="saveAndRun()" disabled>Save &amp; Run</button>
  </div>
</div>
<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="lp">
      <div class="lp-header" id="lpHeader">
        <div class="ks" id="lpKs"></div>
        <h1 id="lpTitle">SPOKE Learn</h1>
        <div class="sub" id="lpSub"></div>
      </div>
      <div class="lp-explain" id="lpExplain"></div>
      <div class="lp-foot">
        <button class="btn" id="prevBtn" onclick="prevLesson()" disabled>&#8592; Back</button>
        <button class="btn go" id="nextBtn" onclick="completeNext()">Done &#8212; Next &#8594;</button>
      </div>
    </div>
    <div class="cp">
      <div class="tabs">
        <button class="tab on" id="tabGuide" onclick="setTab('guide')">Exercise</button>
        <button class="tab" id="tabFree" onclick="setTab('free')">Free Edit</button>
        <div class="tab-r">
          <button class="btn" onclick="toggleHint()" style="font-size:9px;padding:4px 9px">Hint</button>
          <button class="btn" onclick="resetExercise()" style="font-size:9px;padding:4px 9px">Reset</button>
        </div>
      </div>
      <div class="guide-wrap" id="guideWrap">
        <div class="instr-banner" id="instrBanner">
          <div class="instr-top">
            <span class="instr-step" id="stepLbl">—</span>
          </div>
          <div class="instr-text" id="stepMsg">Select a lesson to begin</div>
          <div class="instr-sub" id="stepSub"></div>
        </div>
        <div class="code-view" id="codeView"></div>
      </div>
      <div class="setup-wrap" id="setupWrap" style="display:none"></div>
      <textarea class="free-ed" id="freeEd" spellcheck="false" placeholder="# Write your own code here"></textarea>
      <div class="hint-bar" id="hintBar">
        <span class="hint-lbl">Hint</span>
        <span id="hintText">—</span>
      </div>
      <div class="con">
        <div class="con-head">
          <div class="con-dot" id="conDot"></div>
          <div class="con-lbl">Output</div>
          <button class="btn" style="margin-left:auto;font-size:9px;padding:3px 8px" onclick="clearCon()">Clear</button>
        </div>
        <div class="con-body" id="conBody">
          <div class="cl info">Connect your SPOKE board to begin</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// ── LESSON DATA ───────────────────────────────────────────────────────────────
// Each lesson has: mod, title, sub, ks, midi, intro (html string), info[], challenge, lines[], free
// Each line: {ln, skip, toks} OR {ln, prompt, hint, pfx, ans, alt[], explain{n,title,body,code}, toks}

const L = {};

L[0] = {
  mod:'Getting Started', title:'Setup & Hello World',
  sub:'Connect your board and run your first program',
  ks:'', midi:false,
  setupLesson:true,
  info:[], lines:[], free:''
};

L[1] = {
  mod:'Module 1 — First Steps', title:'Light Up a Pad',
  sub:'Touch Pad 1 and see a green light',
  ks:'KS3 · Sequence · Selection', midi:false,
  intro:[
    'Your first program does something you can see and feel: touch <b>Pad 1</b> and a light turns green. Lift your finger and it turns off.',
    'To make that happen you need to give the computer <b>exact instructions in the right order</b>. One wrong letter and it fails — that precision is what makes programming powerful.',
    'The greyed-out lines on the right are setup code already written for you. You will write the <b>logic</b> — the part that decides what happens. Each card on the left explains the line you are about to type and updates as you go.'
  ],
  info:[
    {t:'task', l:'Your goal', p:'Type each line when prompted. When all lines are written, click <b>Save & Run</b>, then touch Pad 1.'}
  ],
  challenge:{t:'task', l:'Challenge', p:'Change the colour to red in Free Edit — swap <ic>(0, 255, 0)</ic> for <ic>(255, 0, 0)</ic>.'},
  lines:[
    {ln:1, skip:true, toks:[{c:'kw',v:'import'},{c:'pl',v:' board, touchio, neopixel'}]},
    {ln:2, skip:true, toks:[]},
    {ln:3, skip:true, toks:[{c:'pl',v:'touch1 = touchio.TouchIn(board.GP1)'}]},
    {ln:4, skip:true, toks:[{c:'pl',v:'pixels = neopixel.NeoPixel(board.GP0, 27, brightness=0.08, auto_write=False)'}]},
    {ln:5, skip:true, toks:[]},
    {ln:6,
      prompt:'Type this line exactly, then press Enter',
      sub:'Start the forever loop — include the colon at the end',
      hint:'while True:', pfx:'', ans:'while True:',
      explain:{
        n:'Step 1 of 6',
        title:'while True: — the forever loop',

      note:'This lets you see print() output from your board in real time.' }
  ]},
  { phase:'Part 4 — Hello World', steps:[
    { id:'helloworld', title:'Type your first program',
      desc:'Type the five lines of code in the panel on the right, one at a time. When done, click <code>Save & Run</code> — your board restarts and you will see output appear in the Output panel below.',
      note:'Every time you save, CircuitPython restarts and runs your code from the top.' }
  ]},
  { phase:'Part 5 — Understand the interface', steps:[
    { id:'interface', title:'What each panel does',
      desc:'<b>Left panel</b> — lesson instructions.<br><b>Exercise tab</b> — type code line by line, press Enter to check each line.<br><b>Free Edit tab</b> — write or edit code freely.<br><b>Save &amp; Run</b> — saves to the board and restarts it.<br><b>Output panel</b> — shows everything your board prints, plus errors.',
      check:'Got it — ready to code' }
  ]}
];

const HW_LINES = [
  { ln:1, prompt:'Import the time library — you will use it in almost every program', hint:'import time', pfx:'', ans:'import time',
    toks:[{c:'kw',v:'import'},{c:'pl',v:' time'}] },
  { ln:2, prompt:'Print a welcome message. Use print() with text inside quotes', hint:'print("Hello from SPOKE!")', pfx:'', ans:'print("Hello from SPOKE!")', alt:["print('Hello from SPOKE!')"],
    toks:[{c:'fn',v:'print'},{c:'pl',v:'('},{c:'st',v:'"Hello from SPOKE!"'},{c:'pl',v:')'}] },
  { ln:3, prompt:'Start the infinite loop', hint:'while True:', pfx:'', ans:'while True:',
    toks:[{c:'kw',v:'while'},{c:'pl',v:' True:'}] },
  { ln:4, prompt:'Print a message every loop — 4 spaces then: print("Running...")', hint:'    print("Running...")', pfx:'    ', ans:'print("Running...")', alt:["print('Running...')"],
    toks:[{c:'pl',v:'    '},{c:'fn',v:'print'},{c:'pl',v:'('},{c:'st',v:'"Running..."'},{c:'pl',v:')'}] },
  { ln:5, prompt:'Pause for 1 second — 4 spaces then: time.sleep(1)', hint:'    time.sleep(1)', pfx:'    ', ans:'time.sleep(1)',
    toks:[{c:'pl',v:'    time.sleep(1)'}] }
];

let setupChecked={}, setupConnectDone=false, setupSerialDone=false, hwStep=0;

// ── APP STATE ─────────────────────────────────────────────────────────────────
let cur=0, done=new Set(), tab='guide', step=0, typeable=[], hintVis=false;
let fileHandle=null, serialPort=null, isConn=false;

const MODS = [
  {n:'Getting Started', ls:[0]},
  {n:'Module 1 — First Steps', ls:[1,2,3]},
  {n:'Module 2 — Logic', ls:[4]},
  {n:'Module 3 — Loops', ls:[5,6,7]},
  {n:'Module 4 — Functions', ls:[8,9]},
  {n:'Module 5 — MIDI', ls:[10,11,12]},
  {n:'Module 6 — Project', ls:[13,14]}
];

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSB() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  MODS.forEach(m => {
    const h = document.createElement('div');
    h.className = 'mod-lbl';
    h.textContent = m.n;
    sb.appendChild(h);
    m.ls.forEach(n => {
      const l = L[n], b = document.createElement('button');
      b.className = 'sb-btn' + (n===cur?' active':'') + (done.has(n)?' done':'');
      b.onclick = () => loadLesson(n);
      const num = n===0 ? '★' : String(n);
      b.innerHTML = '<span class="sb-n">'+num+'</span><span class="sb-t">'+l.title+'</span>'+(done.has(n)?'<span class="tick"></span>':'');
      sb.appendChild(b);
    });
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function ic(s) { return '<code class="ic">'+s+'</code>'; }
function card(c) {
  const p = c.p.replace(/<ic>(.*?)<\/ic>/g, (_, s) => ic(s));
  return '<div class="card '+c.t+'"><div class="card-lbl">'+c.l+'</div><p>'+p+'</p></div>';
}
function norm(s) { return s.trim().replace(/\s+/g,' '); }

// ── LOAD LESSON ───────────────────────────────────────────────────────────────
function loadLesson(n) {
  cur = n;
  const l = L[n];
  document.getElementById('crumb').innerHTML = l.mod + (l.title ? ' / <b>'+l.title+'</b>' : '');
  document.getElementById('midiPill').style.display = l.midi ? '' : 'none';
  document.getElementById('prevBtn').disabled = (n===0);
  document.getElementById('nextBtn').textContent = n===14 ? 'Complete ✓' : 'Done — Next →';

  // Setup lesson — uses its own full-right-panel layout
  if (l.setupLesson) {
    document.getElementById('lpKs').textContent = 'Getting Started';
    document.getElementById('lpKs').style.cssText = 'color:var(--acc);border-color:rgba(249,115,22,.3)';
    document.getElementById('lpTitle').textContent = 'Setup & Hello World';
    document.getElementById('lpSub').textContent = 'Connect your board and run your first program';
    let ex = '';
    ex += card({t:'info',l:'What this lesson does',p:'Connect your SPOKE board step by step, then type a Hello World program and see it run live on the board.'});
    ex += card({t:'task',l:'You will need',p:'• Your SPOKE board and USB cable<br>• <b>Chrome or Edge</b> browser (not Firefox or Safari)<br>• This page open on your computer'});
    ex += card({t:'info',l:'How it works',p:'<b>Left panel</b> — instructions that guide you. <b>Right panel</b> — where you type code. <b>Output panel</b> — live output from your board. <b>Save & Run</b> — saves your code and restarts the board.'});
    document.getElementById('lpExplain').innerHTML = ex;
    document.getElementById('setupWrap').style.display = 'flex';
    document.getElementById('guideWrap').style.display = 'none';
    document.getElementById('freeEd').style.display = 'none';
    document.getElementById('tabGuide').style.display = 'none';
    document.getElementById('tabFree').style.display = 'none';
    document.getElementById('hintBar').style.display = 'none';
    renderSetup();
    buildSB(); updateProg(); return;
  }

  // Normal lesson — restore tabs
  document.getElementById('tabGuide').style.display = '';
  document.getElementById('tabFree').style.display = '';
  document.getElementById('hintBar').style.display = '';
  document.getElementById('setupWrap').style.display = 'none';

  // Populate left panel header
  document.getElementById('lpKs').textContent = l.ks || '';
  document.getElementById('lpKs').style.cssText = '';
  document.getElementById('lpTitle').textContent = l.title;
  document.getElementById('lpSub').textContent = l.sub;

  // Build explain area content (will be updated by syncExplain as student types)
  // For lessons WITH explain data: start empty, syncExplain fills it
  // For lessons WITHOUT explain data: show intro + info + challenge
  const hasEx = l.lines && l.lines.some(r => r.explain);
  if (!hasEx) {
    let ex = '';
    if (l.intro) l.intro.forEach(p => { ex += '<p class="intro-p">'+p.replace(/<ic>(.*?)<\/ic>/g,(_, s)=>ic(s))+'</p>'; });
    l.info.forEach(c => { ex += card(c); });
    if (l.challenge) ex += card(l.challenge);
    document.getElementById('lpExplain').innerHTML = ex;
  } else {
    document.getElementById('lpExplain').innerHTML = '';
  }

  document.getElementById('freeEd').value = l.free || '';
  step = 0;
  typeable = (l.lines || []).filter(r => !r.skip);
  hintVis = false;
  document.getElementById('hintBar').classList.remove('show');
  renderCode();
  setTab(tab==='free' ? 'free' : 'guide');
  buildSB(); updateProg();
}

// ── EXPLAIN SYNC ─────────────────────────────────────────────────────────────
// Updates the left panel to show ONLY the current step explanation
function syncExplain() {
  const l = L[cur];
  if (!l || !l.lines || !l.lines.some(r => r.explain)) return;
  const curr = step < typeable.length ? typeable[step] : null;
  const ex = curr && curr.explain ? curr.explain : null;
  const exEl = document.getElementById('lpExplain');
  if (!exEl) return;

  if (!ex) {
    // Exercise done — show challenge card if available
    exEl.innerHTML = l.challenge ? card(l.challenge) : '';
    return;
  }

  // Show ONLY the current step explanation — big and clear
  const bodyHtml = ex.body
    .replace(/<ic>(.*?)<\/ic>/g, (_, s) => ic(s))
    .replace(/\n/g, '<br>');
  const codeHtml = ex.code
    ? '<div class="explain-code">'+ex.code+'</div>' : '';

  exEl.innerHTML =
    '<div class="explain-active">' +
      '<div class="explain-tag">'+ex.n+'</div>' +
      '<div class="explain-title">'+ex.title+'</div>' +
      '<div class="explain-body">'+bodyHtml+'</div>' +
      codeHtml +
    '</div>';
}

// ── RENDER CODE VIEW ─────────────────────────────────────────────────────────
function renderCode() {
  const view = document.getElementById('codeView');
  view.innerHTML = '';
  const l = L[cur];
  if (!l || !l.lines) return;

  l.lines.forEach(row => {
    if (row.skip) { view.appendChild(ctxRow(row)); return; }
    const ti = typeable.indexOf(row);
    if (ti < step) view.appendChild(ctxRow(row));
  });

  if (step >= typeable.length) {
    const d = document.createElement('div');
    d.className = 'done-wrap';
    if (cur === 1) {
      d.innerHTML = '<div class="done-icon">✓</div><div class="done-title">Code written — now test it</div>'
        + '<div class="done-sub">Click <b>Save &amp; Run</b> above. Your board will restart briefly.<br><br>'
        + 'Then <b>touch Pad 1</b> with your finger.<br>You should see a green light while you touch it, and it turns off when you lift your finger.<br><br>'
        + 'That is your first real program running on real hardware.</div>';
    } else {
      d.innerHTML = '<div class="done-icon">✓</div><div class="done-title">All lines complete</div>'
        + '<div class="done-sub">Click <b>Save &amp; Run</b> to upload to your board.</div>';
    }
    view.appendChild(d);
    document.getElementById('stepLbl').textContent = 'All done';
    document.getElementById('stepMsg').textContent = cur===1
      ? 'Click Save & Run above, then touch Pad 1 with your finger.'
      : 'Exercise complete — click Save & Run to test on your board.';
    document.getElementById('stepSub').textContent = '';
    syncExplain();
    view.scrollTop = view.scrollHeight;
    return;
  }

  const curr = typeable[step];
  const tr = document.createElement('div');
  tr.className = 'type-row';
  const lnEl = document.createElement('span'); lnEl.className='ln-num'; lnEl.textContent=curr.ln;
  const pre = document.createElement('span'); pre.className='type-prefix'; pre.textContent=curr.pfx||'';
  const inp = document.createElement('input'); inp.type='text'; inp.className='type-input'; inp.id='ti';
  inp.placeholder = 'type here, press Enter…';
  inp.setAttribute('spellcheck','false'); inp.setAttribute('autocomplete','off');
  inp.setAttribute('autocorrect','off'); inp.setAttribute('autocapitalize','off');
  inp.onkeydown = handleKey;
  tr.appendChild(lnEl); tr.appendChild(pre); tr.appendChild(inp);
  view.appendChild(tr);

  document.getElementById('stepLbl').textContent = 'Line '+(step+1)+' of '+typeable.length;
  document.getElementById('stepMsg').textContent = curr.prompt || '';
  document.getElementById('stepSub').textContent = curr.sub || '';
  document.getElementById('hintText').textContent = curr.hint || '';
  if (hintVis) document.getElementById('hintBar').classList.add('show');
  syncExplain();
  view.scrollTop = view.scrollHeight;
  setTimeout(() => { const i=document.getElementById('ti'); if(i) i.focus(); }, 40);
}

function ctxRow(row) {
  const div = document.createElement('div'); div.className='code-row ctx';
  const ln = document.createElement('span'); ln.className='ln-num'; ln.textContent=row.ln;
  const tok = document.createElement('span'); tok.className='code-tokens';
  (row.toks||[]).forEach(t => { const s=document.createElement('span'); s.className=t.c; s.textContent=t.v; tok.appendChild(s); });
  div.appendChild(ln); div.appendChild(tok); return div;
}

function handleKey(e) {
  if (e.key==='Enter') { e.preventDefault(); checkLine(e.target.value); }
  else if (e.key==='Tab') {
    e.preventDefault();
    const p = e.target.selectionStart;
    e.target.value = e.target.value.slice(0,p) + '    ' + e.target.value.slice(p);
    e.target.selectionStart = e.target.selectionEnd = p+4;
  }
}

function checkLine(val) {
  const curr = typeable[step];
  const got = norm(val), exp = norm(curr.ans), alts = (curr.alt||[]).map(norm);
  if (got===exp || alts.includes(got)) {
    step++; renderCode();
  } else {
    const inp = document.getElementById('ti');
    if (inp) { inp.classList.add('wrong'); inp.style.color='var(--red)'; setTimeout(()=>{inp.classList.remove('wrong'); inp.style.color=''; inp.focus();}, 300); }
    const msg = document.getElementById('stepMsg'), orig = msg.textContent;
    msg.innerHTML = '<span style="color:var(--red)">Not quite — check spelling, spacing, and brackets</span>';
    setTimeout(() => { msg.textContent=orig; }, 2200);
  }
}

function resetExercise() { step=0; hintVis=false; document.getElementById('hintBar').classList.remove('show'); renderCode(); }
function toggleHint() { hintVis=!hintVis; document.getElementById('hintBar').classList.toggle('show',hintVis); }

// ── TABS ──────────────────────────────────────────────────────────────────────
function setTab(t) {
  tab = t;
  document.getElementById('tabGuide').classList.toggle('on', t==='guide');
  document.getElementById('tabFree').classList.toggle('on', t==='free');
  document.getElementById('guideWrap').style.display = t==='guide' ? 'flex' : 'none';
  document.getElementById('freeEd').style.display = t==='free' ? 'block' : 'none';
  if (t==='guide') setTimeout(()=>{const i=document.getElementById('ti'); if(i) i.focus();}, 40);
  if (t==='free') document.getElementById('freeEd').focus();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function completeNext() { done.add(cur); if(cur<14) loadLesson(cur+1); else { buildSB(); updateProg(); } }
function prevLesson() { if(cur>0) loadLesson(cur-1); }
function updateProg() {
  const p = (done.size/15)*100;
  document.getElementById('progFill').style.width = p+'%';
  document.getElementById('progLbl').textContent = done.size+' / 15';
}

// ── SETUP LESSON RENDERING ────────────────────────────────────────────────────
function isStepDone(s) {
  if (s.id==='openfile') return setupConnectDone;
  if (s.id==='serial') return setupSerialDone;
  if (s.id==='helloworld') return hwStep >= HW_LINES.length;
  return !!setupChecked[s.id];
}

function isStepActive(s, pi, phase) {
  for (let i=0; i<pi; i++) for (const ps of SETUP_STEPS[i].steps) if (!isStepDone(ps)) return false;
  const idx = phase.steps.indexOf(s);
  for (let i=0; i<idx; i++) if (!isStepDone(phase.steps[i])) return false;
  return true;
}

function isSetupFullyDone() { return SETUP_STEPS.every(ph => ph.steps.every(s => isStepDone(s))); }

function renderSetup() {
  const wrap = document.getElementById('setupWrap');
  wrap.innerHTML = '';
  const allConn = setupConnectDone && setupSerialDone;

  SETUP_STEPS.forEach((phase, pi) => {
    const ph = document.createElement('div'); ph.className='setup-phase'; ph.textContent=phase.phase; wrap.appendChild(ph);
    phase.steps.forEach(s => {
      const isDone = isStepDone(s), isActive = isStepActive(s,pi,phase), isLocked = !isDone && !isActive;
      const div = document.createElement('div');
      div.className = 'setup-step' + (isDone?' done-step':'') + (isActive&&!isDone?' active-step':'') + (isLocked?' locked':'');
      const chk = document.createElement('div'); chk.className='step-check'; chk.textContent=isDone?'✓':'';
      const body = document.createElement('div'); body.className='step-body';
      const title = document.createElement('div'); title.className='step-title'; title.textContent=s.title; body.appendChild(title);
      const desc = document.createElement('div'); desc.className='step-desc'; desc.innerHTML=s.desc; body.appendChild(desc);
      if (s.note) { const n=document.createElement('div'); n.style.cssText='font-size:11px;color:var(--t3);font-style:italic;margin-top:4px'; n.textContent=s.note; body.appendChild(n); }
      if (s.action && !isDone && isActive) {
        const btn=document.createElement('button'); btn.className='step-action'; btn.textContent=s.action;
        btn.onclick=()=>window[s.actionFn](); body.appendChild(btn);
      }
      if (s.check && isActive && !isDone) {
        const btn=document.createElement('button'); btn.className='step-action'; btn.textContent=s.check+' ✓';
        btn.onclick=()=>{ setupChecked[s.id]=true; renderSetup(); }; body.appendChild(btn);
      }
      if (isDone && (s.action||s.check)) {
        const tag=document.createElement('span'); tag.className='step-action done-action'; tag.textContent='Done ✓'; body.appendChild(tag);
      }
      div.appendChild(chk); div.appendChild(body); wrap.appendChild(div);
    });
  });

  if (allConn) renderHWExercise(wrap);

  if (isSetupFullyDone()) {
    const fin=document.createElement('div'); fin.style.cssText='text-align:center;padding:20px;margin-top:8px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:3px';
    fin.innerHTML='<div style="font-family:var(--mono);font-size:22px;color:var(--grn);margin-bottom:8px">✓</div><div style="font-size:14px;font-weight:500;color:var(--t1);margin-bottom:4px">You\'re set up!</div><div style="font-size:12px;color:var(--t2)">Click <b>Done — Next →</b> to start Lesson 1.</div>';
    wrap.appendChild(fin);
    done.add(0); updateProg(); buildSB();
  }
}

function renderHWExercise(wrap) {
  const section = document.createElement('div');
  const label = document.createElement('div'); label.className='setup-phase'; label.textContent='Hello World — type it to prove everything works';
  section.appendChild(label);

  const box = document.createElement('div'); box.className='hw-box';
  HW_LINES.forEach((row, ri) => {
    if (ri < hwStep) {
      const r = document.createElement('div'); r.className='code-row ctx'; r.style.padding='0 14px';
      const ln=document.createElement('span'); ln.className='ln-num'; ln.textContent=row.ln;
      const tok=document.createElement('span'); tok.className='code-tokens';
      row.toks.forEach(t=>{const s=document.createElement('span');s.className=t.c;s.textContent=t.v;tok.appendChild(s);});
      r.appendChild(ln); r.appendChild(tok); box.appendChild(r);
    } else if (ri === hwStep) {
      const r=document.createElement('div'); r.className='type-row'; r.style.cssText='padding:0 14px;margin:0';
      const ln=document.createElement('span'); ln.className='ln-num'; ln.textContent=row.ln;
      const pre=document.createElement('span'); pre.className='type-prefix'; pre.textContent=row.pfx||'';
      const inp=document.createElement('input'); inp.type='text'; inp.className='type-input'; inp.id='hw-inp';
      inp.placeholder='type here, press Enter…';
      inp.setAttribute('spellcheck','false'); inp.setAttribute('autocomplete','off');
      inp.setAttribute('autocorrect','off'); inp.setAttribute('autocapitalize','off');
      inp.onkeydown = hwKey;
      r.appendChild(ln); r.appendChild(pre); r.appendChild(inp); box.appendChild(r);

      const pb=document.createElement('div'); pb.className='hw-prompt';
      const sl=document.createElement('span'); sl.className='hw-step-lbl'; sl.textContent='Line '+(ri+1)+'/'+HW_LINES.length;
      const sm=document.createElement('span'); sm.className='hw-step-msg'; sm.id='hw-msg'; sm.textContent=row.prompt;
      const hb=document.createElement('button'); hb.className='btn'; hb.style.cssText='font-size:9px;padding:3px 8px;margin-left:auto'; hb.textContent='Hint';
      hb.onclick=()=>{ sm.textContent=row.hint; sm.style.color='var(--ylw)'; };
      pb.appendChild(sl); pb.appendChild(sm); pb.appendChild(hb); box.appendChild(pb);
    }
  });

  if (hwStep >= HW_LINES.length) {
    const fin=document.createElement('div'); fin.className='hw-done'; fin.textContent='✓ All lines written — click Save & Run to test on your board'; box.appendChild(fin);
    setupChecked['helloworld']=true;
  }

  section.appendChild(box); wrap.appendChild(section);
  setTimeout(()=>{ const i=document.getElementById('hw-inp'); if(i) i.focus(); }, 40);
}

function hwKey(e) {
  if (e.key==='Enter') {
    e.preventDefault();
    const row=HW_LINES[hwStep], got=norm(e.target.value), exp=norm(row.ans), alts=(row.alt||[]).map(norm);
    if (got===exp || alts.includes(got)) { hwStep++; renderSetup(); }
    else {
      e.target.classList.add('wrong'); e.target.style.color='var(--red)';
      const msg=document.getElementById('hw-msg');
      if (msg) { const orig=msg.textContent; msg.innerHTML='<span style="color:var(--red)">Not quite — check spelling and brackets</span>'; setTimeout(()=>{msg.textContent=orig;msg.style.color='';},2200); }
      setTimeout(()=>{ e.target.classList.remove('wrong'); e.target.style.color=''; e.target.focus(); }, 300);
    }
  } else if (e.key==='Tab') {
    e.preventDefault(); const p=e.target.selectionStart;
    e.target.value=e.target.value.slice(0,p)+'    '+e.target.value.slice(p);
    e.target.selectionStart=e.target.selectionEnd=p+4;
  }
}

async function doConnectFile() {
  try {
    if (!('showOpenFilePicker' in window)) { log('Use Chrome or Edge','err'); return; }
    log('Opening code.py…','info');
    const [h] = await window.showOpenFilePicker({types:[{description:'Python',accept:{'text/x-python':['.py']}}]});
    fileHandle = h; setupConnectDone = true; log('code.py ready','ok'); renderSetup();
    if (!('serial' in navigator)) { log('Web Serial not available — use Chrome','err'); return; }
    log('Select your CircuitPython serial port…','info');
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({baudRate:115200});
    isConn = true; setupSerialDone = true;
    document.getElementById('connectBtn').textContent='Connected ✓';
    document.getElementById('connectBtn').style.color='var(--grn)';
    document.getElementById('runBtn').disabled=false;
    document.getElementById('conDot').classList.add('live');
    log('Serial connected — Output panel is live','ok');
    renderSetup(); readSerial();
  } catch(e) { if (e.name!=='AbortError') log('Error: '+e.message,'err'); }
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
async function connectBoard() {
  if (cur===0) { doConnectFile(); return; }
  if (isConn) { saveAndRun(); return; }
  try {
    if (!('showOpenFilePicker' in window)) { alert('Use Chrome or Edge'); return; }
    log('Opening code.py…','info');
    const [h] = await window.showOpenFilePicker({types:[{description:'Python',accept:{'text/x-python':['.py']}}]});
    fileHandle=h; log('code.py ready','ok');
    if (!('serial' in navigator)) { log('Web Serial not available','err'); return; }
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({baudRate:115200});
    isConn=true; setupConnectDone=true; setupSerialDone=true;
    document.getElementById('connectBtn').textContent='Connected ✓';
    document.getElementById('connectBtn').style.color='var(--grn)';
    document.getElementById('runBtn').disabled=false;
    document.getElementById('conDot').classList.add('live');
    log('Connected — click Save & Run','ok'); readSerial();
  } catch(e) { if (e.name!=='AbortError') log('Error: '+e.message,'err'); }
}

async function saveAndRun() {
  if (!fileHandle) { log('Connect your board first','warn'); return; }
  try {
    let code;
    if (cur===0) {
      code = HW_LINES.map(r => (r.pfx||'') + r.toks.map(t=>t.v).join('')).join('\n');
    } else if (tab==='free') {
      code = document.getElementById('freeEd').value;
    } else {
      const l = L[cur];
      code = (l.lines||[]).map(r => (r.pfx||'') + (r.toks||[]).map(t=>t.v).join('')).join('\n');
    }
    const w = await fileHandle.createWritable();
    await w.write(code); await w.close();
    log('Saved — board restarting…','ok');
    if (cur===0) log('Watch for "Hello from SPOKE!" in the output below','info');
  } catch(e) { log('Save error: '+e.message,'err'); }
}

async function readSerial() {
  try {
    const dec = new TextDecoderStream();
    serialPort.readable.pipeTo(dec.writable);
    const r = dec.readable.getReader();
    while (true) {
      const {value, done} = await r.read();
      if (done) break;
      if (value) {
        const err = value.includes('Traceback') || value.includes('Error:');
        value.split('\n').forEach(l => { if(l.trim()) log(l.trim(), err?'err':'ok'); });
      }
    }
  } catch(e) { log('Serial disconnected','warn'); }
}

function log(m, t='dim') {
  const b=document.getElementById('conBody');
  const d=document.createElement('div'); d.className='cl '+t; d.textContent=m;
  b.appendChild(d); b.scrollTop=b.scrollHeight;
  while (b.children.length>300) b.removeChild(b.firstChild);
}
function clearCon() { document.getElementById('conBody').innerHTML=''; }
